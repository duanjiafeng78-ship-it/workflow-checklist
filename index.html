    </div>
    ${rec.scenes ? `<div style="margin-bottom: 18px;"><div style="color: #8a7b4f; font-size: 12px; letter-spacing: 2px; margin-bottom: 6px;">今日场次</div><div style="font-size: 16px; padding: 10px 14px; background: #fff; border: 1px solid #e3d7af; border-radius: 6px;">${esc(rec.scenes)}</div></div>` : ''}
    ${crewLines.length ? `<div style="margin-bottom: 18px;"><div style="color: #8a7b4f; font-size: 12px; letter-spacing: 2px; margin-bottom: 6px;">通告人员</div><div style="display: flex; flex-wrap: wrap; gap: 8px;">${crewLines.map(c => `<span style="padding: 4px 12px; background: #fff; border: 1px solid #e3d7af; border-radius: 14px; font-size: 14px;">${esc(c)}</span>`).join('')}</div></div>` : ''}
    ${rec.note ? `<div style="margin-bottom: 18px;"><div style="color: #8a7b4f; font-size: 12px; letter-spacing: 2px; margin-bottom: 6px;">备注</div><div style="font-size: 14px; line-height: 1.6; padding: 10px 14px; background: #fff; border: 1px solid #e3d7af; border-radius: 6px; white-space: pre-wrap;">${esc(rec.note)}</div></div>` : ''}
    <div style="border-top: 1px solid #e3d7af; padding-top: 12px; font-size: 11px; color: #a89668; text-align: center; letter-spacing: 1px;">
      Generated by 工作流检查单 · ${new Date().toLocaleString('zh-CN')}
    </div>
  `;
  document.body.appendChild(node);
  try {
    const canvas = await html2canvas(node, { scale: 2, backgroundColor: '#fdf8ec', logging: false });
    canvas.toBlob((blob) => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `通告_${rec.project||'未命名'}_${rec.date||todayISO()}.png`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });
  } catch (e) {
    alert('导出失败：' + e.message);
  } finally {
    document.body.removeChild(node);
  }
}

function renderStarBar(rating, recId) {
  const r = Math.max(0, Math.min(5, Number(rating) || 0));
  const pct = (r / 5) * 100;
  return `<div class="star-bar" data-rec="${recId}" data-rating="${r}" title="点击设置评分（左半=半星，右半=整星，再点同位置=清除）">
    <span class="star-bar-bg">★★★★★</span>
    <span class="star-bar-fg" style="width: ${pct}%">★★★★★</span>
    ${r ? `<span class="star-num">${r.toFixed(1)}</span>` : ''}
  </div>`;
}

function suggestAmountForRating(rec, rating) {
  if (!rating || rating <= 0) return null;
  const recs = state.archive?.records || [];
  const sim = recs.filter(o => o.id !== rec.id && Math.abs((Number(o.rating)||0) - rating) <= 0.5 && o.amount && Number(o.amount) > 0);
  if (sim.length === 0) return null;
  const sum = sim.reduce((s, o) => s + Number(o.amount), 0);
  const avg = Math.round(sum / sim.length);
  return { avg, count: sim.length };
}

function renderArchive() {
  const fmtAmount = (v) => (v === null || v === undefined || v === '') ? '<span style="color:var(--text-muted)">—</span>' : `¥${Number(v).toLocaleString()}`;
  const statusPill = (s) => {
    const cls = s === '已收款' ? 'paid' : (s === '部分收款' ? 'partial' : 'unpaid');
    return `<span class="status-pill ${cls}">${esc(s || '未收款')}</span>`;
  };
  renderGrid({
    wrapId: 'archiveWrap',
    store: state.archive,
    columns: [
      { key: 'name', label: '项目名称', type: 'text' },
      { key: 'amount', label: '金额', type: 'number', align: 'right', render: (v) => `<span style="font-weight:600; color:var(--accent)">${fmtAmount(v)}</span>`, afterSet: (rec, nv) => { if (nv !== null && nv !== '' && Number(nv) > 0) rec.status = '已收款'; } },
      { key: 'rating', label: '评分', edit: false, width: '170px',
        render: (v, rec) => renderStarBar(v, rec.id) },
      { key: 'status', label: '状态', type: 'select', options: ['已收款', '未收款', '部分收款', '待开票'], render: statusPill },
      { key: 'date', label: '日期', type: 'date' },
      { key: 'client', label: '客户', type: 'text' },
      { key: 'type', label: '类型', type: 'text' },
      { key: 'note', label: '备注', type: 'text' },
    ],
    statsFn: (recs) => {
      // Apply current filters to stats so stats reflect the filtered view
      const f = gridFilters.archive;
      const filtered = recs.filter(r => {
        if (f.year !== 'all') {
          const y = (r.date || '').slice(0,4);
          if (y !== f.year) return false;
        }
        if (f.client !== 'all' && (r.client || '') !== f.client) return false;
        return true;
      });
      const total = filtered.reduce((s, r) => s + (Number(r.amount) || 0), 0);
      const paid = filtered.filter(r => r.status === '已收款');
      const unpaid = filtered.filter(r => r.status !== '已收款');
      const paidSum = paid.reduce((s, r) => s + (Number(r.amount) || 0), 0);
      const rated = filtered.filter(r => Number(r.rating) > 0);
      const avgRating = rated.length ? (rated.reduce((s, r) => s + Number(r.rating), 0) / rated.length) : 0;
      const scope = f.year !== 'all' ? `${f.year}年` : (f.client !== 'all' ? f.client : '全部');
      return [
        { label: `${scope}·收款总额`, value: `¥${total.toLocaleString()}`, color: 'accent' },
        { label: '项目数', value: filtered.length },
        { label: '已收款', value: `${paid.length} <span style="font-size:13px; color:var(--text-muted); font-weight:normal">/ ¥${paidSum.toLocaleString()}</span>`, color: 'success' },
        { label: '未收款', value: unpaid.length, color: 'danger' },
        { label: '平均评分', value: rated.length ? `${avgRating.toFixed(1)} <span style="font-size:11px; color:var(--text-muted); font-weight:normal">★ / ${rated.length}条</span>` : '<span style="color:var(--text-muted); font-size:14px">未评分</span>' },
      ];
    },
    filters: gridFilters.archive,
    matchFn: (r, f) => {
      const q = (f.q||'').trim().toLowerCase();
      if (q && !['name','client','type','note'].some(k => (r[k]||'').toLowerCase().includes(q))) return false;
      if (f.status === 'paid' && r.status !== '已收款') return false;
      if (f.status === 'unpaid' && r.status === '已收款') return false;
      if (f.year !== 'all') { const y = (r.date || '').slice(0,4); if (y !== f.year) return false; }
      if (f.client !== 'all' && (r.client || '') !== f.client) return false;
      return true;
    },
    header: { icon: '📊', title: '项目档案', subtitle: '历史项目与收款记录汇总。点击任意单元格直接编辑。', addLabel: '+ 新增记录' },
    addNew: () => {
      state.archive.records.unshift({ id: genId(), name: '新项目', amount: null, status: '未收款', date: todayISO(), client: '', type: '', note: '', rating: 0 });
      saveState();
      render();
    },
    extraToolbar: (() => {
      const years = new Set(); const clients = new Set();
      (state.archive?.records || []).forEach(r => { if (r.date) years.add(r.date.slice(0,4)); if (r.client) clients.add(r.client); });
      const yArr = [...years].sort().reverse();
      const cArr = [...clients].sort();
      return `<select class="archive-filter" data-filter="status">
        <option value="all" ${gridFilters.archive.status==='all'?'selected':''}>全部状态</option>
        <option value="paid" ${gridFilters.archive.status==='paid'?'selected':''}>已收款</option>
        <option value="unpaid" ${gridFilters.archive.status==='unpaid'?'selected':''}>未收款</option>
      </select>
      <select class="archive-filter" data-filter="year">
        <option value="all" ${gridFilters.archive.year==='all'?'selected':''}>全部年份</option>
        ${yArr.map(y => `<option value="${y}" ${gridFilters.archive.year===y?'selected':''}>${y}</option>`).join('')}
      </select>
      <select class="archive-filter" data-filter="client">
        <option value="all" ${gridFilters.archive.client==='all'?'selected':''}>全部客户</option>
        ${cArr.map(c => `<option value="${esc(c)}" ${gridFilters.archive.client===c?'selected':''}>${esc(c)}</option>`).join('')}
      </select>`;
    })(),
  });
  ['status','year','client'].forEach(k => {
    const sel = document.querySelector(`#archiveWrap select[data-filter="${k}"]`);
    if (sel) sel.addEventListener('change', (e) => { gridFilters.archive[k] = e.target.value; render(); });
  });
}

let calendarMonth = null; // { y, m } 1-indexed month
function renderCalendar() {
  const wrap = document.getElementById('calendarWrap');
  const today = new Date();
  if (!calendarMonth) calendarMonth = { y: today.getFullYear(), m: today.getMonth() + 1 };
  const { y, m } = calendarMonth;

  // Collect events per date
  const events = new Map();
  const addEvt = (date, type, label, color) => {
    if (!date) return;
    if (!events.has(date)) events.set(date, []);
    events.get(date).push({ type, label, color });
  };
  (state.callsheets?.records || []).forEach(r => addEvt(r.date, 'call', `📅 ${r.project || '通告'} · ${r.location || ''}`, 'var(--accent)'));
  (state.archive?.records || []).forEach(r => { if (r.status === '已收款') addEvt(r.date, 'paid', `💰 ${r.name} ¥${Number(r.amount||0).toLocaleString()}`, 'var(--success)'); });
  (state.projects || []).forEach(p => { if (p.deadline) addEvt(p.deadline, 'deadline', `⏰ 截止：${p.title}`, 'var(--danger)'); });

  // Build grid: first Monday of view to last Sunday
  const first = new Date(y, m - 1, 1);
  const startDow = (first.getDay() + 6) % 7; // monday = 0
  const last = new Date(y, m, 0);
  const daysInMonth = last.getDate();
  const cells = [];
  for (let i = 0; i < startDow; i++) {
    const d = new Date(y, m - 1, -startDow + i + 1);
    cells.push({ date: d, inMonth: false });
  }
  for (let i = 1; i <= daysInMonth; i++) cells.push({ date: new Date(y, m - 1, i), inMonth: true });
  while (cells.length % 7 !== 0) {
    const d = cells[cells.length - 1].date;
    cells.push({ date: new Date(d.getFullYear(), d.getMonth(), d.getDate() + 1), inMonth: false });
  }
  const todayStr = todayISO();
  const fmt = (d) => d.toISOString().split('T')[0];

  wrap.innerHTML = `
    <div class="archive-header">
      <div>
        <div class="archive-title">🗓️ 日历</div>
        <div class="archive-title-sub">📅 通告 · 💰 收款 · ⏰ 项目截止 都汇总在这里。</div>
      </div>
    </div>
    <div class="cal-toolbar">
      <button class="archive-btn" id="calPrev">← 上月</button>
      <div class="cal-title">${y}年${m}月</div>
      <button class="archive-btn" id="calToday">今天</button>
      <button class="archive-btn" id="calNext">下月 →</button>
    </div>
    <div class="cal-grid">
      ${['一','二','三','四','五','六','日'].map(w => `<div class="cal-dow">${w}</div>`).join('')}
      ${cells.map(c => {
        const ds = fmt(c.date);
        const evs = events.get(ds) || [];
        const isToday = ds === todayStr;
        return `<div class="cal-cell ${c.inMonth?'':'cal-muted'} ${isToday?'cal-today':''}" data-date="${ds}">
          <div class="cal-day">${c.date.getDate()}</div>
          <div class="cal-events">
            ${evs.slice(0,3).map(e => `<div class="cal-event" style="border-left-color:${e.color}" title="${esc(e.label)}">${esc(e.label)}</div>`).join('')}
            ${evs.length > 3 ? `<div class="cal-event-more">+${evs.length-3} 更多</div>` : ''}
          </div>
        </div>`;
      }).join('')}
    </div>
    <div id="calDayPanel" style="display:none; margin-top: 16px; padding: 16px; background: var(--bg-elev); border-radius: 8px; border: 1px solid var(--border);"></div>
  `;

  document.getElementById('calPrev').addEventListener('click', () => { calendarMonth.m--; if (calendarMonth.m < 1) { calendarMonth.m = 12; calendarMonth.y--; } render(); });
  document.getElementById('calNext').addEventListener('click', () => { calendarMonth.m++; if (calendarMonth.m > 12) { calendarMonth.m = 1; calendarMonth.y++; } render(); });
  document.getElementById('calToday').addEventListener('click', () => { const t = new Date(); calendarMonth = { y: t.getFullYear(), m: t.getMonth()+1 }; render(); });

  wrap.querySelectorAll('.cal-cell').forEach(cell => {
    cell.addEventListener('click', () => {
      const ds = cell.dataset.date;
      const evs = events.get(ds) || [];
      const panel = document.getElementById('calDayPanel');
      if (evs.length === 0) { panel.style.display = 'none'; return; }
      panel.style.display = 'block';
      panel.innerHTML = `<div style="font-weight:600; color:var(--accent); margin-bottom:8px;">${ds}</div>` +
        evs.map(e => `<div style="padding:6px 0; border-bottom:1px dashed var(--border)">${esc(e.label)}</div>`).join('');
    });
  });
}

// ===== Knowledge Base (知识库) =====
let kbState = { selectedId: null, editMode: false, filter: '', catFilter: 'all', eqFilter: null };

function kbCreateNew() {
  state.view = 'kb';
  const now = new Date().toISOString();
  const newArt = { id: genId(), title: '未命名文章', category: '其他', equipmentId: null, content: '# 新文章\n\n在这里写内容...', createdAt: now, updatedAt: now };
  state.knowledge.articles.unshift(newArt);
  kbState.selectedId = newArt.id;
  kbState.editMode = true;
  saveState();
  render();
}

function renderKB() {
  const wrap = document.getElementById('kbWrap');
  const arts = state.knowledge?.articles || [];

  // Apply filters
  let filtered = arts.slice();
  if (kbState.filter) {
    const q = kbState.filter.toLowerCase();
    filtered = filtered.filter(a => (a.title||'').toLowerCase().includes(q) || (a.content||'').toLowerCase().includes(q));
  }
  if (kbState.catFilter !== 'all') filtered = filtered.filter(a => a.category === kbState.catFilter);
  if (kbState.eqFilter) filtered = filtered.filter(a => a.equipmentId === kbState.eqFilter || a.equipmentName === kbState.eqFilter);

  // Group by category
  const groups = new Map();
  filtered.forEach(a => {
    const c = a.category || '其他';
    if (!groups.has(c)) groups.set(c, []);
    groups.get(c).push(a);
  });
  const sortedCats = KB_CATEGORIES.filter(c => groups.has(c)).concat([...groups.keys()].filter(c => !KB_CATEGORIES.includes(c)));

  const current = arts.find(a => a.id === kbState.selectedId) || filtered[0] || arts[0] || null;
  if (current && !kbState.selectedId) kbState.selectedId = current.id;

  const eqRecords = state.equipment?.records || [];

  // Sidebar
  const sidebarHtml = `
    <div class="kb-sidebar">
      <div class="kb-sidebar-header">
        <div class="kb-title">📚 知识库</div>
        <div class="kb-title-sub">${arts.length} 篇文章 · ${new Set(arts.map(a => a.category)).size} 个分类</div>
      </div>
      <div class="kb-search-box">
        <input type="text" class="kb-search-input" id="kbSearch" placeholder="🔍 搜索文章..." value="${esc(kbState.filter)}">
        ${kbState.eqFilter ? `<div style="margin-top:8px; font-size:11px; color: var(--accent);">📘 筛选：${esc(kbState.eqFilter)} <button class="kb-btn" id="kbClearEq" style="padding:2px 6px; font-size:10px; margin-left:6px">清除</button></div>` : ''}
      </div>
      <div class="kb-cat-list">
        ${sortedCats.map(cat => `
          <div class="kb-cat-group">
            <div class="kb-cat-header">${esc(cat)}<span class="kb-cat-count">${groups.get(cat).length}</span></div>
            ${groups.get(cat).map(a => `
              <div class="kb-article-item ${a.id === kbState.selectedId ? 'active' : ''}" data-id="${a.id}">
                <div class="kb-article-title">${esc(a.title || '无标题')}</div>
                <div class="kb-article-meta">${(a.updatedAt || '').slice(0,10)}${a.equipmentName ? ' · ' + esc(a.equipmentName) : ''}</div>
              </div>
            `).join('')}
          </div>
        `).join('')}
        ${filtered.length === 0 ? '<div style="padding:20px; text-align:center; color:var(--text-muted); font-size:12px;">没有匹配的文章</div>' : ''}
      </div>
      <div class="kb-sidebar-footer">
        <button class="kb-btn primary" id="kbNewBtn" style="width:100%">+ 新建文章</button>
      </div>
    </div>
  `;

  // Main pane
  let mainHtml = '';
  if (!current) {
    mainHtml = `<div class="kb-main"><div class="kb-empty-state">
      <div style="font-size: 48px; margin-bottom: 12px;">📚</div>
      <div style="font-size: 16px; color: var(--text);">知识库是空的</div>
      <div style="margin-top: 6px;">点击左下角 "+ 新建文章" 开始积累你的拍摄经验</div>
    </div></div>`;
  } else {
    const eqOpts = ['<option value="">（不关联器材）</option>']
      .concat(eqRecords.map(r => `<option value="${esc(r.id)}" ${current.equipmentId === r.id ? 'selected' : ''}>${esc(r.name || '(未命名)')}</option>`)).join('');
    const catOpts = KB_CATEGORIES.map(c => `<option value="${c}" ${current.category === c ? 'selected' : ''}>${c}</option>`).join('');
    mainHtml = `
      <div class="kb-main">
        <div class="kb-main-header">
          ${kbState.editMode
            ? `<input type="text" class="kb-article-title-input" id="kbTitle" value="${esc(current.title)}">`
            : `<div class="kb-article-title-display">${esc(current.title || '无标题')}</div>`}
          <div class="kb-btn-group">
            ${kbState.editMode
              ? `<button class="kb-btn primary" id="kbSaveBtn">💾 保存</button>
                 <button class="kb-btn" id="kbCancelBtn">取消</button>`
              : `<button class="kb-btn" id="kbEditBtn">✏️ 编辑</button>
                 <button class="kb-btn" id="kbExportBtn">📥 导出MD</button>
                 <button class="kb-btn danger" id="kbDeleteBtn">🗑</button>`}
          </div>
        </div>
        <div class="kb-meta-bar">
          <span>分类：</span>
          ${kbState.editMode
            ? `<select id="kbCategory">${catOpts}</select>`
            : `<span style="color:var(--accent); font-weight:500">${esc(current.category || '其他')}</span>`}
          <span style="margin-left:16px">关联器材：</span>
          ${kbState.editMode
            ? `<select id="kbEquipment">${eqOpts}</select>`
            : `<span>${current.equipmentId ? esc((eqRecords.find(r => r.id === current.equipmentId)||{}).name || '—') : (current.equipmentName ? esc(current.equipmentName) : '—')}</span>`}
          <span style="margin-left: auto; color: var(--text-muted); font-size: 11px;">
            更新于 ${(current.updatedAt || '').slice(0,16).replace('T',' ')}
          </span>
        </div>
        <div class="kb-body">
          ${kbState.editMode
            ? `<textarea class="kb-textarea" id="kbContent">${esc(current.content || '')}</textarea>
               <div style="margin-top: 10px; color: var(--text-muted); font-size: 11px;">
                 支持 Markdown：# 标题 · **加粗** · - 列表 · | 表格 | · > 引用
               </div>`
            : `<div class="kb-rendered" id="kbRendered">${(typeof marked !== 'undefined') ? marked.parse(current.content || '') : esc(current.content || '').replace(/\\n/g, '<br>')}</div>`}
        </div>
      </div>
    `;
  }

  wrap.innerHTML = sidebarHtml + mainHtml;

  // Wire events
  const searchEl = document.getElementById('kbSearch');
  if (searchEl) {
    searchEl.addEventListener('input', (e) => {
      kbState.filter = e.target.value;
      render();
      const s = document.getElementById('kbSearch');
      if (s) { s.focus(); s.setSelectionRange(s.value.length, s.value.length); }
    });
  }
  const clearEq = document.getElementById('kbClearEq');
  if (clearEq) clearEq.addEventListener('click', () => { kbState.eqFilter = null; render(); });

  wrap.querySelectorAll('.kb-article-item').forEach(el => {
    el.addEventListener('click', () => {
      kbState.selectedId = el.dataset.id;
      kbState.editMode = false;
      render();
    });
  });
  const newBtn = document.getElementById('kbNewBtn');
  if (newBtn) newBtn.addEventListener('click', kbCreateNew);

  const editBtn = document.getElementById('kbEditBtn');
  if (editBtn) editBtn.addEventListener('click', () => { kbState.editMode = true; render(); });
  const cancelBtn = document.getElementById('kbCancelBtn');
  if (cancelBtn) cancelBtn.addEventListener('click', () => { kbState.editMode = false; render(); });
  const saveBtn = document.getElementById('kbSaveBtn');
  if (saveBtn) saveBtn.addEventListener('click', () => {
    if (!current) return;
    current.title = document.getElementById('kbTitle').value.trim() || '无标题';
    current.category = document.getElementById('kbCategory').value;
    const eqId = document.getElementById('kbEquipment').value;
    current.equipmentId = eqId || null;
    current.equipmentName = eqId ? (eqRecords.find(r => r.id === eqId)||{}).name : '';
    current.content = document.getElementById('kbContent').value;
    current.updatedAt = new Date().toISOString();
    kbState.editMode = false;
    saveState();
    render();
  });
  const delBtn = document.getElementById('kbDeleteBtn');
  if (delBtn) delBtn.addEventListener('click', () => {
    if (!current) return;
    if (!confirm(`确认删除「${current.title}」？此操作不可撤销。`)) return;
    state.knowledge.articles = state.knowledge.articles.filter(a => a.id !== current.id);
    kbState.selectedId = null;
    saveState();
    render();
  });
  const exportBtn = document.getElementById('kbExportBtn');
  if (exportBtn) exportBtn.addEventListener('click', () => {
    if (!current) return;
    const md = `# ${current.title}\n\n> 分类：${current.category}${current.equipmentName ? ' · 器材：' + current.equipmentName : ''}\n\n${current.content}`;
    const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `${current.title}.md`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });
}

// ===== Links (快捷链接) =====
const LINK_COLORS = ['#c8a44e', '#5a9cff', '#f27059', '#7ac96e', '#b976d8', '#ef6b8b', '#4fd1c5', '#d4a373'];
function faviconFor(url) {
  try { const u = new URL(url); return `https://www.google.com/s2/favicons?sz=64&domain=${u.hostname}`; } catch(e) { return ''; }
}
function renderLinks() {
  const wrap = document.getElementById('linksWrap');
  const recs = state.links?.records || [];
  // Group by category (empty → "其他")
  const groups = new Map();
  recs.forEach(r => {
    const c = r.category || '其他';
    if (!groups.has(c)) groups.set(c, []);
    groups.get(c).push(r);
  });
  const catOrder = ['作品集', '社交', '工具', '参考', '其他'];
  const sortedCats = [...groups.keys()].sort((a, b) => {
    const ai = catOrder.indexOf(a), bi = catOrder.indexOf(b);
    return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
  });

  wrap.innerHTML = `
    <div class="archive-header">
      <div>
        <div class="archive-title">🔗 常用链接</div>
        <div class="archive-title-sub">把常去的网站、工具、作品集做成按钮一键直达。点击卡片打开，右上角编辑。</div>
      </div>
    </div>
    <div class="archive-toolbar">
      <button class="archive-btn primary" id="linksAddBtn">+ 新增链接</button>
    </div>
    ${recs.length === 0 ? '<div class="archive-empty">还没有链接，点击右上 "+" 添加第一个</div>' : ''}
    <div class="links-groups">
      ${sortedCats.map(cat => `
        <div class="links-group">
          <div class="links-group-title">${esc(cat)} <span class="links-group-count">${groups.get(cat).length}</span></div>
          <div class="links-grid" data-cat="${esc(cat)}">
            ${groups.get(cat).map(r => {
              const color = r.color || '#c8a44e';
              const iconHtml = r.icon && !/^https?:/i.test(r.icon)
                ? `<span class="link-emoji">${esc(r.icon)}</span>`
                : `<img class="link-fav" src="${esc(r.icon || faviconFor(r.url))}" alt="">`;
              return `<div class="link-card" data-id="${r.id}" style="--link-color: ${color}">
                <button class="link-edit-btn" data-act="edit" title="编辑">⋯</button>
                <a class="link-body" href="${esc(r.url)}" target="_blank" rel="noopener noreferrer">
                  <div class="link-icon">${iconHtml}</div>
                  <div class="link-title">${esc(r.title)}</div>
                  ${r.description ? `<div class="link-desc">${esc(r.description)}</div>` : ''}
                  <div class="link-host">${esc((() => { try { return new URL(r.url).hostname; } catch(e) { return r.url; } })())}</div>
                </a>
              </div>`;
            }).join('')}
          </div>
        </div>
      `).join('')}
    </div>
  `;

  document.getElementById('linksAddBtn').addEventListener('click', () => openLinkEditor(null));
  wrap.querySelectorAll('.link-edit-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault(); e.stopPropagation();
      const id = btn.closest('.link-card').dataset.id;
      openLinkEditor(id);
    });
  });
}

// Link editor modal — uses prompt for simplicity
function openLinkEditor(id) {
  const rec = id ? state.links.records.find(r => r.id === id) : null;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay active';
  overlay.innerHTML = `
    <div class="modal" style="max-width: 480px;">
      <h3>${rec ? '编辑链接' : '新增链接'}</h3>
      <div class="archive-form">
        <label>标题 *</label>
        <input type="text" id="lnkTitle" placeholder="如：作品集" value="${rec?esc(rec.title||''):''}">
        <label>链接地址 *</label>
        <input type="url" id="lnkUrl" placeholder="https://..." value="${rec?esc(rec.url||''):''}">
        <div class="archive-form-row">
          <div><label>图标（emoji 或留空自动取 favicon）</label>
            <input type="text" id="lnkIcon" placeholder="📸" value="${rec?esc(rec.icon||''):''}"></div>
          <div><label>分类</label>
            <select id="lnkCat">
              ${['作品集','社交','工具','参考','其他'].map(c => `<option value="${c}" ${rec?.category===c?'selected':''}>${c}</option>`).join('')}
            </select></div>
        </div>
        <label>描述（可选）</label>
        <input type="text" id="lnkDesc" placeholder="一句话描述" value="${rec?esc(rec.description||''):''}">
        <label>颜色</label>
        <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:4px;">
          ${LINK_COLORS.map(c => `<button type="button" class="lnk-color" data-color="${c}" style="width:28px; height:28px; border-radius:50%; border: 2px solid ${rec?.color===c?'var(--text)':'transparent'}; background: ${c}; cursor: pointer;"></button>`).join('')}
        </div>
      </div>
      <div class="modal-actions" style="margin-top:16px;">
        ${rec?'<button class="cancel-btn" id="lnkDelete" style="color: var(--danger); margin-right: auto;">删除</button>':''}
        <button class="cancel-btn" id="lnkCancel">取消</button>
        <button class="confirm-btn" id="lnkSave">保存</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  let selectedColor = rec?.color || '#c8a44e';
  overlay.querySelectorAll('.lnk-color').forEach(b => {
    b.addEventListener('click', () => {
      selectedColor = b.dataset.color;
      overlay.querySelectorAll('.lnk-color').forEach(x => x.style.borderColor = 'transparent');
      b.style.borderColor = 'var(--text)';
    });
  });
  const close = () => overlay.remove();
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
  overlay.querySelector('#lnkCancel').addEventListener('click', close);
  if (rec) overlay.querySelector('#lnkDelete').addEventListener('click', () => {
    if (!confirm(`确认删除「${rec.title}」？`)) return;
    state.links.records = state.links.records.filter(r => r.id !== rec.id);
    saveState(); render(); close();
  });
  overlay.querySelector('#lnkSave').addEventListener('click', () => {
    const title = overlay.querySelector('#lnkTitle').value.trim();
    let url = overlay.querySelector('#lnkUrl').value.trim();
    if (!title || !url) { alert('标题和链接地址都必填'); return; }
    if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
    const payload = {
      title,
      url,
      icon: overlay.querySelector('#lnkIcon').value.trim(),
      category: overlay.querySelector('#lnkCat').value,
      description: overlay.querySelector('#lnkDesc').value.trim(),
      color: selectedColor,
    };
    if (rec) Object.assign(rec, payload);
    else state.links.records.unshift({ id: genId(), ...payload });
    saveState(); render(); close();
  });
}


function renderMain() {
  const project = getActiveProject();
  const metaEl = document.getElementById('projectMeta');
  const tabsEl = document.getElementById('moduleTabsBar');
  const header = document.getElementById('mainHeader');
  const content = document.getElementById('content');

  if (!project) {
    metaEl.innerHTML = '';
    tabsEl.innerHTML = '';
    header.innerHTML = '';
    content.innerHTML = `
      <div class="empty-module-hint">
        <div class="hint-icon">📋</div>
        <div>还没有项目</div>
        <button class="hint-btn" id="emptyNewProject">+ 新建第一个项目</button>
      </div>
    `;
    const btn = document.getElementById('emptyNewProject');
    if (btn) btn.addEventListener('click', openWizard);
    return;
  }

  renderProjectMeta(project);
  renderModuleTabs(project);

  const module = getActiveModule(project);
  if (!module) {
    header.innerHTML = '';
    content.innerHTML = `
      <div class="empty-module-hint">
        <div class="hint-icon">📂</div>
        <div>这个项目还没有任何工作流板块</div>
        <button class="hint-btn" id="emptyAddModule">+ 添加板块</button>
      </div>
    `;

  }

  renderModuleContent(project, module);
}

function renderProjectMeta(project) {
  const metaEl = document.getElementById('projectMeta');

  // Overall progress across all modules
  let total = 0, done = 0;
  (project.modules || []).forEach(m => {
    m.sections.forEach(sec => {
      total += sec.steps.length;
      done += sec.steps.filter(st => st.done).length;
    });
  });
  const pct = total ? Math.round(done / total * 100) : 0;

  const fmtDate = d => d || '—';
  const fmtField = v => v || '<span class="meta-value empty">未填写</span>';

  metaEl.innerHTML = `
    <div class="project-meta-inner">
      <div class="project-meta-top">
        <div class="project-meta-title" title="双击编辑项目名">${esc(project.title)}</div>
        <div class="project-meta-actions">
          <span class="status-badge" data-status="${esc(project.status)}">${esc(project.status)}</span>
          ${project.status === '已完成' || project.status === '已归档'
            ? '<button class="reopen-project-btn" id="reopenProjectBtn">重新开启</button>'
            : '<button class="complete-project-btn" id="completeProjectBtn">✓ 完成项目</button>'}
          <button class="icon-btn" id="editProjectBtn">⚙ 项目信息</button>
        </div>
      </div>
      <div class="project-meta-grid">
        <div class="meta-field"><span class="meta-label">类型</span><span class="meta-value">${fmtField(esc(project.projectType))}</span></div>
        <div class="meta-field"><span class="meta-label">题材</span><span class="meta-value">${fmtField(esc(project.genre))}</span></div>
        <div class="meta-field"><span class="meta-label">导演</span><span class="meta-value">${fmtField(esc(project.director))}</span></div>
        <div class="meta-field"><span class="meta-label">制片</span><span class="meta-value">${fmtField(esc(project.producer))}</span></div>
        <div class="meta-field"><span class="meta-label">出品</span><span class="meta-value">${fmtField(esc(project.client))}</span></div>
        <div class="meta-field"><span class="meta-label">预算</span><span class="meta-value">${fmtField(esc(project.budget))}</span></div>
        <div class="meta-field"><span class="meta-label">开机</span><span class="meta-value">${esc(fmtDate(project.shootingStart))}</span></div>
        <div class="meta-field"><span class="meta-label">关机</span><span class="meta-value">${esc(fmtDate(project.shootingEnd))}</span></div>
        <div class="meta-field"><span class="meta-label">交付</span><span class="meta-value">${esc(fmtDate(project.deliveryDate))}</span></div>
        <div class="meta-field"><span class="meta-label">片长</span><span class="meta-value">${fmtField(esc(project.runtime))}</span></div>
        <div class="meta-field"><span class="meta-label">建档</span><span class="meta-value">${esc(fmtDate(project.createdDate))}</span></div>
      </div>
      <div class="overall-progress">
        <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        <div class="progress-text">总进度 ${done} / ${total} (${pct}%)</div>
      </div>
    </div>
  `;

  // Editable title
  const titleEl = metaEl.querySelector('.project-meta-title');
  makeEditable(titleEl, val => { project.title = val || '未命名项目'; saveState(); renderSidebar(); });

  // Edit button
  metaEl.querySelector('#editProjectBtn').addEventListener('click', () => openProjectSettings(project));

  // Complete / Reopen button
  const completeBtn = metaEl.querySelector('#completeProjectBtn');
  if (completeBtn) {
    completeBtn.addEventListener('click', () => {
      if (!confirm(`确定将「${project.title}」标记为已完成吗？`)) return;
      project.status = '已完成';
      SFX.sectionComplete();
      launchConfetti();
      // Offer to create an archive record
      const existing = (state.archive?.records || []).find(r => r.name === project.title);
      if (!existing) {
        setTimeout(() => {
          const amtStr = prompt(`项目「${project.title}」已完成！\n\n是否要录入收款档案？请输入金额（支持 1w / 1.5k 格式），留空跳过：`);
          if (amtStr !== null && amtStr.trim() !== '') {
            const amt = parseAmount(amtStr);
            state.archive.records.unshift({
              id: genId(),
              name: project.title,
              amount: amt,
              status: (amt && amt > 0) ? '已收款' : '未收款',
              date: todayISO(),
              client: project.client || '',
              type: project.category || '',
              note: '',
            });
            saveState();
            render();
          } else {
            saveState();
          }
        }, 400);
      } else {
        saveState();
      }
      render();
    });
  }
  const reopenBtn = metaEl.querySelector('#reopenProjectBtn');
  if (reopenBtn) {
    reopenBtn.addEventListener('click', () => {
      if (!confirm(`确定重新开启「${project.title}」吗？`)) return;
      project.status = '进行中';
      SFX.click();
      saveState();
      render();
    });
  }
}

function renderModuleTabs(project) {
  const bar = document.getElementById('moduleTabsBar');
  bar.innerHTML = '';

  (project.modules || []).forEach(mod => {
    const total = mod.sections.reduce((s, sec) => s + sec.steps.length, 0);
    const done = mod.sections.reduce((s, sec) => s + sec.steps.filter(st => st.done).length, 0);
    const complete = total > 0 && done === total;

    const tab = document.createElement('div');
    tab.className = 'module-tab' + (mod.id === project.activeModuleId ? ' active' : '') + (complete ? ' complete' : '');
    tab.innerHTML = `
      <span>${esc(MODULE_SHORT_NAMES[mod.key] || mod.title)}</span>
      <span class="module-tab-progress">${done}/${total}</span>
      <button class="module-tab-delete" title="移除此板块">×</button>
    `;
    tab.addEventListener('click', (e) => {
      if (e.target.closest('.module-tab-delete')) return;
      project.activeModuleId = mod.id;
      SFX.click();
      render();
    });
    tab.querySelector('.module-tab-delete').addEventListener('click', (e) => {
      e.stopPropagation();
      if (!confirm(`确定移除「${MODULE_SHORT_NAMES[mod.key] || mod.title}」板块？所有进度将丢失。`)) return;
      project.modules = project.modules.filter(m => m.id !== mod.id);
      if (project.activeModuleId === mod.id) {
        project.activeModuleId = project.modules[0] ? project.modules[0].id : null;
      }
      render();
    });
    bar.appendChild(tab);
  });

  // Add module button (only if not all modules added)
  const existingKeys = (project.modules || []).map(m => m.key);
  const canAdd = MODULE_KEYS.some(k => !existingKeys.includes(k));
  if (canAdd) {
    const addBtn = document.createElement('button');
    addBtn.className = 'module-tab-add';
    addBtn.textContent = '+ 添加板块';
    addBtn.addEventListener('click', () => openModulePicker(project));
    bar.appendChild(addBtn);
  }
}

function renderModuleContent(project, module) {
  const header = document.getElementById('mainHeader');
  const content = document.getElementById('content');

  const totalSteps = module.sections.reduce((s, sec) => s + sec.steps.length, 0);
  const doneSteps = module.sections.reduce((s, sec) => s + sec.steps.filter(st => st.done).length, 0);
  const pct = totalSteps ? Math.round(doneSteps / totalSteps * 100) : 0;

  header.innerHTML = `
    <div class="category">${esc(module.category || '')}</div>
    <h1>${esc(module.title)}</h1>
    <div class="subtitle">${esc(module.subtitle || '')} · 共 ${totalSteps} 个步骤</div>
    <div class="progress-bar-wrapper">
      <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="progress-text">${doneSteps} / ${totalSteps} 已完成</div>
    </div>
  `;

  const catEl = header.querySelector('.category');
  makeEditable(catEl, val => { module.category = val; saveState(); });
  const h1El = header.querySelector('h1');
  makeEditable(h1El, val => { module.title = val || '未命名'; saveState(); render(); });
  const subEl = header.querySelector('.subtitle');
  makeEditable(subEl, val => { module.subtitle = val; saveState(); });

  content.innerHTML = '';

  module.sections.forEach((sec, si) => {
    const secEl = document.createElement('div');
    secEl.className = 'section' + (sec.collapsed ? ' collapsed' : '');
    secEl.dataset.sectionId = sec.id;
    secEl.draggable = false; // handled by drag handle

    const doneInSec = sec.steps.filter(st => st.done).length;
    const secComplete = sec.steps.length > 0 && doneInSec === sec.steps.length;
    if (secComplete) secEl.classList.add('section-complete');

    secEl.innerHTML = `
      <div class="section-header">
        <div class="section-header-left">
          <span class="section-drag-handle" draggable="true" title="拖拽排序">⠿</span>
          <div class="section-titles">
            <div class="section-label">${esc(sec.label)}</div>
            <div class="section-title">${esc(sec.title)}${secComplete ? '<span class="section-complete-badge">已完成</span>' : ''}</div>
          </div>
        </div>
        <div class="section-header-right">
          <button class="section-delete" title="删除分组">×</button>
          <span class="section-count">${doneInSec}/${sec.steps.length}</span>
          <span class="section-toggle">▼</span>
        </div>
      </div>
      <div class="section-body"></div>
    `;

    // Toggle collapse
    const toggleArea = secEl.querySelector('.section-header');
    toggleArea.addEventListener('click', (e) => {
      if (e.target.closest('.section-drag-handle') || e.target.closest('.section-delete') ||
          e.target.closest('[contenteditable="true"]')) return;
      sec.collapsed = !sec.collapsed;
      render();
    });

    // Editable labels
    const labelEl = secEl.querySelector('.section-label');
    makeEditable(labelEl, val => { sec.label = val; saveState(); });

    const titleEl = secEl.querySelector('.section-title');
    makeEditable(titleEl, val => { sec.title = val; saveState(); });

    // Delete section
    secEl.querySelector('.section-delete').addEventListener('click', (e) => {
      e.stopPropagation();
      if (!confirm(`确定删除「${sec.title}」及其所有步骤？`)) return;
      module.sections.splice(si, 1);
      render();
    });

    // Section drag
    const secDragHandle = secEl.querySelector('.section-drag-handle');
    secDragHandle.addEventListener('dragstart', (e) => {
      e.stopPropagation();
      e.dataTransfer.setData('text/plain', JSON.stringify({ type: 'section', sectionId: sec.id }));
      e.dataTransfer.effectAllowed = 'move';
      secEl.style.opacity = '0.4';
    });
    secDragHandle.addEventListener('dragend', () => { secEl.style.opacity = ''; });

    secEl.addEventListener('dragover', (e) => {
      e.preventDefault();
      try {
        // We can't read data during dragover, so just show indicator
        secEl.classList.add('dragging-over');
      } catch(err) {}
    });
    secEl.addEventListener('dragleave', () => { secEl.classList.remove('dragging-over'); });
    secEl.addEventListener('drop', (e) => {
      e.preventDefault();
      secEl.classList.remove('dragging-over');
      try {
        const data = JSON.parse(e.dataTransfer.getData('text/plain'));
        if (data.type === 'section' && data.sectionId !== sec.id) {
          const fromIdx = module.sections.findIndex(s => s.id === data.sectionId);
          const toIdx = module.sections.findIndex(s => s.id === sec.id);
          if (fromIdx !== -1 && toIdx !== -1) {
            const [moved] = module.sections.splice(fromIdx, 1);
            module.sections.splice(toIdx, 0, moved);
            render();
          }
        }
      } catch(err) {}
    });

    // Steps
    const body = secEl.querySelector('.section-body');
    sec.steps.forEach((step, sti) => {
      const stepEl = document.createElement('div');
      stepEl.className = 'step' + (step.done ? ' completed' : '');
      stepEl.dataset.stepId = step.id;

      stepEl.innerHTML = `
        <span class="step-drag-handle" draggable="true" title="拖拽排序">⠿</span>
        <div class="checkbox ${step.done ? 'checked' : ''}"></div>
        <div class="step-text">
          <div class="step-name">${esc(step.name)}</div>
          <div class="step-desc">${esc(step.desc)}</div>
        </div>
        <button class="step-delete" title="删除步骤">×</button>
      `;

      // Checkbox
      stepEl.querySelector('.checkbox').addEventListener('click', (e) => {
        e.stopPropagation();
        const wasDone = step.done;
        step.done = !step.done;
        if (step.done) {
          SFX.check();
          // Check if this completes the section
          const allDone = sec.steps.every(st => st.done);
          if (allDone) {
            setTimeout(() => { SFX.sectionComplete(); launchConfetti(); }, 200);
          }
        } else {
          SFX.uncheck();
        }
        render();
        // Animate checkbox
        const cb = document.querySelector(`[data-step-id="${step.id}"] .checkbox`);
        if (cb) { cb.classList.add('pop'); setTimeout(() => cb.classList.remove('pop'), 300); }
        // Glow progress bar
        const fill = document.querySelector('.progress-bar-fill');
        if (fill) { fill.classList.add('glow'); setTimeout(() => fill.classList.remove('glow'), 800); }
      });

      // Editable name & desc
      const nameEl = stepEl.querySelector('.step-name');
      makeEditable(nameEl, val => { step.name = val; saveState(); });

      const descEl = stepEl.querySelector('.step-desc');
      makeEditable(descEl, val => { step.desc = val; saveState(); });

      // Delete step
      stepEl.querySelector('.step-delete').addEventListener('click', (e) => {
        e.stopPropagation();
        sec.steps.splice(sti, 1);
        render();
      });

      // Step drag
      const stepDragHandle = stepEl.querySelector('.step-drag-handle');
      stepDragHandle.addEventListener('dragstart', (e) => {
        e.stopPropagation();
        e.dataTransfer.setData('text/plain', JSON.stringify({ type: 'step', sectionId: sec.id, stepId: step.id }));
        e.dataTransfer.effectAllowed = 'move';
        stepEl.classList.add('dragging');
      });
      stepDragHandle.addEventListener('dragend', () => { stepEl.classList.remove('dragging'); });

      stepEl.addEventListener('dragover', (e) => {
        e.preventDefault();
        // Remove drag-over from siblings
        body.querySelectorAll('.step.drag-over').forEach(el => el.classList.remove('drag-over'));
        stepEl.classList.add('drag-over');
      });
      stepEl.addEventListener('dragleave', () => { stepEl.classList.remove('drag-over'); });
      stepEl.addEventListener('drop', (e) => {
        e.preventDefault();
        e.stopPropagation();
        stepEl.classList.remove('drag-over');
        try {
          const data = JSON.parse(e.dataTransfer.getData('text/plain'));
          if (data.type === 'step') {
            // Find source
            const srcSec = module.sections.find(s => s.id === data.sectionId);
            if (!srcSec) return;
            const srcIdx = srcSec.steps.findIndex(st => st.id === data.stepId);
            if (srcIdx === -1) return;
            const [moved] = srcSec.steps.splice(srcIdx, 1);
            // Insert at target position
            const tgtIdx = sec.steps.findIndex(st => st.id === step.id);
            sec.steps.splice(tgtIdx, 0, moved);
            render();
          }
        } catch(err) {}
      });

      body.appendChild(stepEl);
    });

    // Add step button
    const addStepBtn = document.createElement('button');
    addStepBtn.className = 'add-step-btn';
    addStepBtn.textContent = '+ 添加步骤';
    addStepBtn.addEventListener('click', () => {
      sec.steps.push({ id: genId(), name: '新步骤', desc: '描述', done: false });
      sec.collapsed = false;
      SFX.addStep();
      render();
    });
    body.appendChild(addStepBtn);

    content.appendChild(secEl);
  });

  // Add section button
  const addSecBtn = document.createElement('button');
  addSecBtn.className = 'add-section-btn';
  addSecBtn.textContent = '+ 添加分组';
  addSecBtn.addEventListener('click', () => {
    module.sections.push({
      id: genId(),
      label: 'NEW SECTION',
      title: '新分组',
      collapsed: false,
      steps: [{ id: genId(), name: '新步骤', desc: '描述', done: false }]
    });
    SFX.addStep();
    render();
  });
  content.appendChild(addSecBtn);

  // Notes area
  if (!module.notes) module.notes = [];
  const notesArea = document.createElement('div');
  notesArea.className = 'notes-area';

  const NOTE_TYPES = [
    { key: 'note', label: '备注' },
    { key: 'warning', label: '警告' },
    { key: 'danger', label: '危险' },
    { key: 'info', label: '提示' },
    { key: 'success', label: '成功' },
  ];
  const TYPE_LABELS = { note: '备注', warning: '警告', danger: '危险', info: '提示', success: '成功' };

  module.notes.forEach((note, ni) => {
    const noteEl = document.createElement('div');
    noteEl.className = 'note-box';
    noteEl.dataset.type = note.type || 'note';
    noteEl.innerHTML = `
      <div class="note-header">
        <button class="note-type-btn">${TYPE_LABELS[note.type] || '备注'}</button>
        <div class="note-title">${esc(note.title)}</div>
        <button class="note-delete" title="删除备注">×</button>
      </div>
      <div class="note-text">${esc(note.text)}</div>
    `;

    // Cycle note type
    noteEl.querySelector('.note-type-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      const keys = NOTE_TYPES.map(t => t.key);
      const idx = keys.indexOf(note.type || 'note');
      note.type = keys[(idx + 1) % keys.length];
      SFX.click();
      saveState();
      render();
    });

    // Editable title
    const titleEl = noteEl.querySelector('.note-title');
    makeEditable(titleEl, val => { note.title = val || '备注'; saveState(); });

    // Editable text
    const textEl = noteEl.querySelector('.note-text');
    makeEditable(textEl, val => { note.text = val; saveState(); });

    // Delete note
    noteEl.querySelector('.note-delete').addEventListener('click', (e) => {
      e.stopPropagation();
      module.notes.splice(ni, 1);
      SFX.click();
      render();
    });

    notesArea.appendChild(noteEl);
  });

  // Add note button
  const addNoteBtn = document.createElement('button');
  addNoteBtn.className = 'add-note-btn';
  addNoteBtn.textContent = '+ 添加备注';
  addNoteBtn.addEventListener('click', () => {
    module.notes.push({ id: genId(), type: 'note', title: '备注', text: '在这里写内容' });
    SFX.click();
    render();
  });
  notesArea.appendChild(addNoteBtn);
  content.appendChild(notesArea);

  // Crossfade animation
  content.classList.remove('main-fade');
  void content.offsetWidth;
  content.classList.add('main-fade');
}

// ===== Utilities =====
function esc(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function selectAll(el) {
  const range = document.createRange();
  range.selectNodeContents(el);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}

function makeEditable(el, onSave) {
  el.addEventListener('dblclick', (e) => {
    e.stopPropagation();
    el.contentEditable = 'true';
    el.focus();
    selectAll(el);
  });
  el.addEventListener('blur', () => {
    el.contentEditable = 'false';
    onSave(el.textContent.trim());
  });
  el.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
  });
}

// ===== Project Wizard (new project + edit settings) =====
// Wizard supports two "modes":
//   - mode = 'create': step 1 metadata -> step 2 pick modules -> create project
//   - mode = 'edit'  : step 1 metadata only, updates the given project
let wizardState = {
  mode: 'create',
  step: 1,
  targetProject: null, // used in edit mode
  meta: {},
  selectedModuleKeys: ['preproduction', 'shooting', 'editing', 'distribution'],
};

const MODULE_DESCRIPTIONS = {
  preproduction: { icon: '📝', label: '前期筹备', desc: '剧本、预算、选角、勘景、场务等开机前准备' },
  shooting:      { icon: '🎬', label: '拍摄',     desc: '开机、现场执行、每日收工、杀青等现场工作' },
  editing:       { icon: '✂️', label: '剪辑',     desc: '素材整理、粗剪、精剪、声音、调色、终审' },
  distribution:  { icon: '📢', label: '宣发',     desc: '物料、发行、首映、媒体、复盘等宣发工作' },

function openWizard(mode, project) {
  wizardState.mode = mode || 'create';
  wizardState.step = 1;
  wizardState.targetProject = project || null;

  if (wizardState.mode === 'edit' && project) {
    wizardState.meta = {
      title: project.title,
      createdDate: project.createdDate,
      projectType: project.projectType,
      genre: project.genre,
      director: project.director,
      producer: project.producer,
      client: project.client,
      budget: project.budget,
      shootingStart: project.shootingStart,
      shootingEnd: project.shootingEnd,
      deliveryDate: project.deliveryDate,
      runtime: project.runtime,
      status: project.status,
      description: project.description,
    };
  } else {
    wizardState.meta = {
      title: '',
      createdDate: todayISO(),
      projectType: '',
      genre: '',
      director: '',
      producer: '',
      client: '',
      budget: '',
      shootingStart: '',
      shootingEnd: '',
      deliveryDate: '',
      runtime: '',
      status: '筹备中',
      description: '',
    };
    wizardState.selectedModuleKeys = ['preproduction', 'shooting', 'editing', 'distribution'];
  }

  document.getElementById('wizardOverlay').classList.add('active');
  renderWizard();
}

function closeWizard() {
  document.getElementById('wizardOverlay').classList.remove('active');
}

// ===== Sound Effects (Web Audio API) =====
const SFX = (() => {
  let ctx;
  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    return ctx;
  }

  function playTone(freq, duration, type = 'sine', gain = 0.15, decay = true) {
    const c = getCtx();
    const osc = c.createOscillator();
    const g = c.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, c.currentTime);
    g.gain.setValueAtTime(gain, c.currentTime);
    if (decay) g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + duration);
    osc.connect(g).connect(c.destination);
    osc.start(c.currentTime);
    osc.stop(c.currentTime + duration);
  }

  function playChime(freqs, interval, duration, type = 'sine', gain = 0.12) {
    freqs.forEach((f, i) => {
      setTimeout(() => playTone(f, duration, type, gain), i * interval);
    });
  }

  return {
    // Checkbox checked — bright short ding
    check() {
      playTone(880, 0.15, 'sine', 0.12);
      setTimeout(() => playTone(1320, 0.12, 'sine', 0.08), 60);
    },
    // Checkbox unchecked — soft low tone
    uncheck() {
      playTone(440, 0.12, 'sine', 0.06);
    },
    // Section complete — celebratory ascending chime (bell-like)
    sectionComplete() {
      playChime([523, 659, 784, 1047], 100, 0.4, 'sine', 0.15);
      // Add shimmer overtone
      setTimeout(() => playChime([1568, 2093], 80, 0.5, 'sine', 0.06), 350);
    },
    // Generic click — subtle tick
    click() {
      playTone(660, 0.06, 'sine', 0.05);
    },
    // Add step — quick ascending pair
    addStep() {
      playTone(600, 0.08, 'sine', 0.07);
      setTimeout(() => playTone(800, 0.08, 'sine', 0.07), 60);
    },
  };
})();

// ===== Confetti =====
function launchConfetti() {
  const canvas = document.createElement('canvas');
  canvas.className = 'confetti-canvas';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  document.body.appendChild(canvas);
  const ctx2 = canvas.getContext('2d');

  const colors = ['#c8a44e', '#2ecc71', '#3498db', '#e67e22', '#e74c3c', '#9b59b6', '#f1c40f'];
  const particles = Array.from({ length: 60 }, () => ({
    x: Math.random() * canvas.width,
    y: -20 - Math.random() * 80,
    w: 4 + Math.random() * 6,
    h: 3 + Math.random() * 4,
    vx: (Math.random() - 0.5) * 4,
    vy: 2 + Math.random() * 4,
    rot: Math.random() * Math.PI * 2,
    rotV: (Math.random() - 0.5) * 0.2,
    color: colors[Math.floor(Math.random() * colors.length)],
    life: 1,
  }));

  let frame = 0;
  function draw() {
    ctx2.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    particles.forEach(p => {
      if (p.life <= 0) return;
      alive = true;
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.08;
      p.rot += p.rotV;
      p.life -= 0.008;
      ctx2.save();
      ctx2.globalAlpha = Math.max(0, p.life);
      ctx2.translate(p.x, p.y);
      ctx2.rotate(p.rot);
      ctx2.fillStyle = p.color;
      ctx2.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx2.restore();
    });
    frame++;
    if (alive && frame < 180) {
      requestAnimationFrame(draw);
    } else {
      canvas.remove();
    }
  }
  requestAnimationFrame(draw);
}

// ===== Cloud Sync (Firebase) =====
const SYNC_CONFIG_KEY = 'workflow-sync-config';
const SYNC_DEVICE_ID_KEY = 'workflow-sync-device-id';
const CLOUD_SCHEMA_VERSION = 2;
const CLOUD_STATE_PATH = 'checklistData';
let syncDb = null;
let syncRef = null;
let syncConnectionRef = null;
let syncListener = null;
let syncConnectionListener = null;
let syncStatus = 'disconnected'; // disconnected | connected | syncing | receiving | error
let syncReady = false;
let syncPushTimer = null;
let queuedCloudPush = false;
let lastCloudSnapshotJson = '';
let lastRemoteMeta = null;
let isApplyingRemoteState = false;
const syncDeviceId = getOrCreateSyncDeviceId();
const syncClientId = `${syncDeviceId}-${Math.random().toString(36).slice(2, 8)}`;

function getOrCreateSyncDeviceId() {
  try {
    let id = localStorage.getItem(SYNC_DEVICE_ID_KEY);
    if (!id) {
      id = `device-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
      localStorage.setItem(SYNC_DEVICE_ID_KEY, id);
    }
    return id;
  } catch(e) {
    return `device-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
  }
}

function getSyncConfig() {
  try { return JSON.parse(localStorage.getItem(SYNC_CONFIG_KEY)); } catch(e) { return null; }
}

function setSyncConfig(cfg) {
  localStorage.setItem(SYNC_CONFIG_KEY, JSON.stringify(cfg));
}

function clearSyncConfig() {
  localStorage.removeItem(SYNC_CONFIG_KEY);
}

function updateSyncStatus(status, detail = '') {
  syncStatus = status;
  const el = document.getElementById('syncStatus');
  if (!el) return;
  const labels = {
    disconnected: '离线',
    connected: '已同步',
    syncing: '同步中…',
    receiving: '接收更新…',
    error: '同步失败',
  };
  const suffix = detail ? ` · ${esc(detail)}` : '';
  el.innerHTML = `<div class="sync-status"><span class="sync-dot ${status}"></span>${labels[status] || ''}${suffix}</div>`;
}

function getCloudStateSnapshot() {
  const copy = JSON.parse(JSON.stringify(state || {}));
  // View position is local-only so devices do not drag each other between tabs/projects.
  delete copy.view;
  delete copy.activeProjectId;
  (copy.projects || []).forEach(project => delete project.activeModuleId);
  return copy;
}

function getCloudSnapshotJson() {
  return JSON.stringify(getCloudStateSnapshot());
}

function extractRemoteState(value) {
  if (!value) return { data: null, meta: null };
  if (value.schemaVersion && value.data) {
    return {
      data: value.data,
      meta: {
        schemaVersion: value.schemaVersion,
        updatedAt: value.updatedAt || value.clientUpdatedAt || 0,
        clientUpdatedAt: value.clientUpdatedAt || 0,
        updatedBy: value.updatedBy || '',
        deviceId: value.deviceId || '',
        isLegacy: false,
      },
    };
  }
  // Backward compatibility for the previous raw-state Firebase shape.
  return {
    data: value,
    meta: { schemaVersion: 1, updatedAt: 0, clientUpdatedAt: 0, updatedBy: 'legacy', deviceId: '', isLegacy: true },
  };
}

function hasUsableRemoteData(remoteState) {
  if (!remoteState || typeof remoteState !== 'object') return false;
  return Array.isArray(remoteState.projects) ||
    !!remoteState.archive ||
    !!remoteState.callsheets ||
    !!remoteState.shotlogs ||
    !!remoteState.equipment ||
    !!remoteState.shotlists ||
    !!remoteState.links ||
    !!remoteState.knowledge;
}

function hasProjectList(data) {
  return Array.isArray(data?.projects);
}

function isKnownView(view) {
  return ['workflow', 'archive', 'callsheet', 'shotlog', 'equipment', 'shotlist', 'calendar', 'links', 'kb'].includes(view);
}

function applyRemoteState(remoteState) {
  const localView = isKnownView(state?.view) ? state.view : 'workflow';
  const localActiveProjectId = state?.activeProjectId || null;
  const localActiveModules = new Map((state?.projects || []).map(project => [project.id, project.activeModuleId]));
  state = JSON.parse(JSON.stringify(remoteState || {}));
  if (!Array.isArray(state.projects)) state.projects = [];
  state.projects.forEach(p => {
    migrateProject(p);
    const localActiveModuleId = localActiveModules.get(p.id);
    if (localActiveModuleId && p.modules?.some(module => module.id === localActiveModuleId)) {
      p.activeModuleId = localActiveModuleId;
    } else if (!p.activeModuleId && p.modules?.length) {
      p.activeModuleId = p.modules[0].id;
    }
  });
  state.view = localView;
  if (localActiveProjectId && state.projects.some(p => p.id === localActiveProjectId)) {
    state.activeProjectId = localActiveProjectId;
  } else if (!state.activeProjectId && state.projects.length > 0) {
    state.activeProjectId = state.projects[0].id;
  } else if (state.activeProjectId && !state.projects.some(p => p.id === state.activeProjectId)) {
    state.activeProjectId = state.projects[0]?.id || null;
  }
  ensureArchive();
}

function rememberRemoteSnapshot(meta = null) {
  lastCloudSnapshotJson = getCloudSnapshotJson();
  lastRemoteMeta = meta;
}

function formatSyncTime(meta) {
  const ts = Number(meta?.updatedAt || meta?.clientUpdatedAt || 0);
  if (!ts) return '';
  const diff = Date.now() - ts;
  if (diff < 60_000) return '刚刚';
  const minutes = Math.round(diff / 60_000);
  if (minutes < 60) return `${minutes} 分钟前`;
  return new Date(ts).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}

function scheduleCloudPush(delay = 450) {
  if (!syncRef || isApplyingRemoteState) return;
  const snapshotJson = getCloudSnapshotJson();
  if (snapshotJson === lastCloudSnapshotJson) return;
  if (!syncReady) {
    queuedCloudPush = true;
    return;
  }
  queuedCloudPush = false;
  clearTimeout(syncPushTimer);
  syncPushTimer = setTimeout(() => pushToCloud(), delay);
}

function teardownFirebase(clearConfig = false) {
  clearTimeout(syncPushTimer);
  syncPushTimer = null;
  queuedCloudPush = false;
  syncReady = false;
  if (syncListener && syncRef) syncRef.off('value', syncListener);
  if (syncConnectionListener && syncConnectionRef) syncConnectionRef.off('value', syncConnectionListener);
  syncListener = null;
  syncConnectionListener = null;
  syncRef = null;
  syncConnectionRef = null;
  syncDb = null;
  try { firebase.app().delete(); } catch(e) {}
  if (clearConfig) clearSyncConfig();
}

function connectFirebase(config) {
  try {
    if (syncDb) teardownFirebase(false);
    const app = firebase.initializeApp(config);
    syncDb = firebase.database();
    syncRef = syncDb.ref(CLOUD_STATE_PATH);
    syncConnectionRef = syncDb.ref('.info/connected');
    syncReady = false;
    updateSyncStatus('syncing', '连接云端');

    // Listen for remote changes
    syncListener = syncRef.on('value', (snap) => {
      const { data: remoteState, meta } = extractRemoteState(snap.val());
      syncReady = true;

      if (!hasUsableRemoteData(remoteState)) {
        updateSyncStatus('connected', '云端为空');
        scheduleCloudPush(0);
        renderSyncModal();
        return;
      }

      if (!hasProjectList(remoteState) && hasProjectList(state) && state.projects.length > 0) {
        updateSyncStatus('syncing', '补全云端项目');
        scheduleCloudPush(0);
        renderSyncModal();
        return;
      }

      if (meta?.isLegacy && !hasProjectList(remoteState)) {
        if ((state.projects || []).length > 0) {
          updateSyncStatus('syncing', '上传本机项目');
          scheduleCloudPush(0);
        } else {
          updateSyncStatus('connected', '云端待初始化');
        }
        renderSyncModal();
        return;
      }

      if (meta?.updatedBy === syncClientId) {
        rememberRemoteSnapshot(meta);
        updateSyncStatus('connected', formatSyncTime(meta));
        renderSyncModal();
        return;
      }

      updateSyncStatus('receiving');
      isApplyingRemoteState = true;
      try {
        applyRemoteState(remoteState);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        render();
        rememberRemoteSnapshot(meta);
      } finally {
        isApplyingRemoteState = false;
      }
      updateSyncStatus('connected', formatSyncTime(meta));
      renderSyncModal();
      if (queuedCloudPush) scheduleCloudPush(700);
    }, (err) => {
      console.error('Sync error:', err);
      updateSyncStatus('error');
    });

    // Monitor connection state
    syncConnectionListener = syncConnectionRef.on('value', (snap) => {
      if (snap.val()) updateSyncStatus(syncReady ? 'connected' : 'syncing');
      else updateSyncStatus('disconnected');
    });

    setSyncConfig(config);
    return true;
  } catch(e) {
    console.error('Firebase init error:', e);
    updateSyncStatus('error');
    return false;
  }
}

function disconnectFirebase() {
  teardownFirebase(true);
  updateSyncStatus('disconnected');
}

function pushToCloud(options = {}) {
  if (!syncRef) return;
  const force = !!options.force;
  const snapshot = getCloudStateSnapshot();
  const snapshotJson = JSON.stringify(snapshot);
  if (!force && snapshotJson === lastCloudSnapshotJson) {
    updateSyncStatus('connected', formatSyncTime(lastRemoteMeta));
    return;
  }
  updateSyncStatus('syncing');
  const now = Date.now();
  const payload = {
    schemaVersion: CLOUD_SCHEMA_VERSION,
    updatedAt: firebase.database.ServerValue.TIMESTAMP,
    clientUpdatedAt: now,
    updatedBy: syncClientId,
    deviceId: syncDeviceId,
    data: snapshot,
  };
  syncRef.set(payload).then(() => {
    lastCloudSnapshotJson = snapshotJson;
    lastRemoteMeta = { ...payload, updatedAt: now };
    updateSyncStatus('connected', '刚刚');
    renderSyncModal();
  }).catch((err) => {
    console.error('Push error:', err);
    updateSyncStatus('error');
  });
}

// Patch saveState to also push to cloud
const _origSaveState = saveState;
saveState = function(options = {}) {
  _origSaveState();
  if (options.sync !== false) scheduleCloudPush();
};

// ===== Star rating delegated handler =====
document.addEventListener('click', (e) => {
  const bar = e.target.closest('.star-bar[data-rec]');
  if (!bar) return;
  e.stopPropagation();
  const recId = bar.dataset.rec;
  const rec = state.archive?.records?.find(r => r.id === recId);
  if (!rec) return;
  const rect = bar.getBoundingClientRect();
  const x = e.clientX - rect.left;
  // 5 stars take roughly first ~90% of bar width (last ~10% may be the number); compute on stars area only
  const starsEl = bar.querySelector('.star-bar-bg');
  const sr = starsEl.getBoundingClientRect();
  const sx = e.clientX - sr.left;
  const frac = Math.max(0, Math.min(1, sx / sr.width));
  let r = Math.round(frac * 10) / 2; // nearest 0.5 step
  if (r > 5) r = 5;
  if (r < 0.5) r = 0.5;
  // Toggle off if clicking same value
  if (Math.abs((Number(rec.rating)||0) - r) < 0.01) r = 0;
  const oldAmount = rec.amount;
  rec.rating = r;
  // Smart amount suggestion when rating > 0 and amount is empty
  if (r > 0 && (oldAmount === null || oldAmount === undefined || oldAmount === '' || Number(oldAmount) === 0)) {
    const suggestion = suggestAmountForRating(rec, r);
    if (suggestion) {
      if (confirm(`${r}★ 项目历史均价约 ¥${suggestion.avg.toLocaleString()}（参考 ${suggestion.count} 条）。\n\n要把它填到「金额」吗？`)) {
        rec.amount = suggestion.avg;
        rec.status = '已收款';
      }
    }
  }
  saveState();
  render();
});

// ===== Global search =====
function globalSearch(q) {
  q = q.trim().toLowerCase();
  const results = [];
  if (!q) return results;
  (state.projects || []).forEach(p => {
    if ((p.title||'').toLowerCase().includes(q)) results.push({ view: 'workflow', label: `📋 ${p.title}`, sub: '项目', action: () => { state.activeProjectId = p.id; state.view = 'workflow'; render(); } });
  });
  (state.archive?.records || []).forEach(r => {
    const hit = ['name','client','type','note'].some(k => (r[k]||'').toLowerCase().includes(q));
    if (hit) results.push({ view: 'archive', label: `📊 ${r.name}`, sub: `档案 · ¥${Number(r.amount||0).toLocaleString()}`, action: () => { state.view='archive'; render(); } });
  });
  (state.callsheets?.records || []).forEach(r => {
    const hit = ['project','location','scenes','crew','note'].some(k => (r[k]||'').toLowerCase().includes(q));
    if (hit) results.push({ view: 'callsheet', label: `📅 ${r.project || '通告'}`, sub: `通告 · ${r.date||''} ${r.location||''}`, action: () => { state.view='callsheet'; render(); } });
  });
  (state.shotlogs?.records || []).forEach(r => {
    const hit = ['project','scene','shot','frame','lens','note'].some(k => (r[k]||'').toString().toLowerCase().includes(q));
    if (hit) results.push({ view: 'shotlog', label: `🎬 ${r.project||'场记'} S${r.scene}/${r.shot}`, sub: `场记 · ${r.date||''} ${r.take_ok||''}`, action: () => { state.view='shotlog'; render(); } });
  });
  (state.equipment?.records || []).forEach(r => {
    const hit = ['name','category','brand','serial','note'].some(k => (r[k]||'').toLowerCase().includes(q));
    if (hit) results.push({ view: 'equipment', label: `🎥 ${r.name}`, sub: `器材 · ${r.category||''} ${r.brand||''}`, action: () => { state.view='equipment'; render(); } });
  });
  (state.shotlists?.records || []).forEach(r => {
    const hit = ['project','scene','shot','description'].some(k => (r[k]||'').toString().toLowerCase().includes(q));
    if (hit) results.push({ view: 'shotlist', label: `📝 ${r.project||''} S${r.scene}/${r.shot}`, sub: `镜头 · ${r.description||''}`, action: () => { state.view='shotlist'; render(); } });
  });
  return results.slice(0, 30);
}
const gs = document.getElementById('globalSearch');
const gsr = document.getElementById('globalSearchResults');
gs.addEventListener('input', () => {
  const results = globalSearch(gs.value);
  if (results.length === 0) { gsr.style.display = 'none'; return; }
  gsr.innerHTML = results.map((r, i) => `<div class="gs-item" data-i="${i}" style="padding: 8px 12px; cursor: pointer; border-bottom: 1px solid var(--border);">
    <div style="font-size: 13px; color: var(--text);">${esc(r.label)}</div>
    <div style="font-size: 11px; color: var(--text-muted); margin-top: 2px;">${esc(r.sub)}</div>
  </div>`).join('');
  gsr.style.display = 'block';
  gsr.querySelectorAll('.gs-item').forEach(el => {
    el.addEventListener('mouseenter', () => { el.style.background = 'rgba(200,164,78,0.1)'; });
    el.addEventListener('mouseleave', () => { el.style.background = ''; });
    el.addEventListener('click', () => {
      const r = results[+el.dataset.i];
      r.action();
      gs.value = ''; gsr.style.display = 'none';
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('active');
    });
  });
});
gs.addEventListener('blur', () => { setTimeout(() => { gsr.style.display = 'none'; }, 200); });
gs.addEventListener('focus', () => { if (gs.value) gs.dispatchEvent(new Event('input')); });
document.getElementById('syncModalClose').addEventListener('click', closeSyncSettings);
