<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="检查单">
<meta name="theme-color" content="#111111">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>工作流检查单</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@11.1.0/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #111111;
  --sidebar-bg: #181818;
  --card-bg: #1e1e1e;
  --border: #2a2a2a;
  --text: #e5e5e5;
  --text-dim: #888;
  --text-muted: #555;
  --accent: #c8a44e;
  --accent-dim: rgba(200,164,78,0.15);
  --danger: #e74c3c;
  --success: #2ecc71;
  --hover: #252525;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
}

/* ===== Sidebar ===== */
.sidebar {
  width: 260px;
  min-width: 260px;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  transition: transform 0.3s;
  z-index: 100;
}

.sidebar-header {
  padding: 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.sidebar-header h2 {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
}

.sidebar-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.sidebar-item {
  padding: 12px 16px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2px;
  transition: background 0.15s;
}

.sidebar-item:hover { background: var(--hover); }
.sidebar-item.active { background: var(--accent-dim); color: var(--accent); }

.sidebar-item .project-name {
  flex: 1;
  font-size: 14px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.sidebar-item .project-name[contenteditable="true"] {
  outline: none;
  border-bottom: 1px solid var(--accent);
}

.sidebar-item .delete-project {
  opacity: 0;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 16px;
  padding: 2px 6px;
  border-radius: 4px;
  transition: opacity 0.15s, color 0.15s;
}

.sidebar-item:hover .delete-project { opacity: 1; }
.sidebar-item .delete-project:hover { color: var(--danger); }

.sidebar-group-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 12px 16px 4px;
  user-select: none;
}
.sidebar-group-label:first-child { padding-top: 8px; }

.sidebar-item.completed-project .project-name {
  color: var(--text-muted);
  text-decoration: line-through;
  text-decoration-color: rgba(200,164,78,0.3);
}

.sidebar-footer {
  padding: 12px;
  border-top: 1px solid var(--border);
}

.sidebar-footer .btn + .btn { margin-top: 6px; }

.sync-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-muted);
  padding: 6px 12px 0;
}
.sync-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #888;
  flex-shrink: 0;
}
.sync-dot.connected { background: #2ecc71; }
.sync-dot.syncing { background: #f1c40f; animation: pulse-dot 1s infinite; }
.sync-dot.receiving { background: #3498db; animation: pulse-dot 1s infinite; }
.sync-dot.error { background: #e74c3c; }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Sync modal form */
.sync-form label { display: block; font-size: 12px; color: var(--text-muted); margin: 10px 0 4px; }
.sync-form input[type="text"] {
  width: 100%; padding: 8px 10px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 13px;
}
.sync-form input[type="text"]:focus { outline: none; border-color: var(--accent); }
.sync-form .hint { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
.sync-instructions {
  background: rgba(200,164,78,0.08); border: 1px solid rgba(200,164,78,0.2);
  border-radius: 8px; padding: 12px 14px; margin-bottom: 12px; font-size: 12px; line-height: 1.7;
  color: var(--text-dim);
}
.sync-instructions b { color: var(--accent); }
.sync-instructions ol { padding-left: 18px; }
.sync-connected-info {
  text-align: center; padding: 16px 0;
}
.sync-connected-info .big-check { font-size: 40px; margin-bottom: 8px; }
.sync-connected-info .connected-text { color: #2ecc71; font-size: 15px; font-weight: 600; }
.sync-connected-info .db-url { font-size: 11px; color: var(--text-muted); margin-top: 6px; word-break: break-all; }
.sync-disconnect-btn {
  margin-top: 14px; padding: 8px 20px; border-radius: 6px;
  border: 1px solid rgba(231,76,60,0.4); background: none; color: #e74c3c;
  cursor: pointer; font-size: 13px; transition: all 0.2s;
}
.sync-disconnect-btn:hover { background: rgba(231,76,60,0.15); }

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  padding: 10px;
  border: 1px dashed var(--border);
  border-radius: 8px;
  background: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
}

.btn:hover { border-color: var(--accent); color: var(--accent); }

/* ===== Main ===== */
.main {
  flex: 1;
  overflow-y: auto;
  height: 100vh;
}

.main-header {
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 50;
  padding: 24px 32px 16px;
  border-bottom: 1px solid var(--border);
}

.main-header .category {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.main-header .category[contenteditable="true"] {
  outline: none;
  border-bottom: 1px solid var(--accent);
  color: var(--text-dim);
}

.main-header h1 {
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 6px;
}

.main-header h1[contenteditable="true"] {
  outline: none;
  border-bottom: 1px solid var(--accent);
}

.main-header .subtitle {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 12px;
}

.main-header .subtitle[contenteditable="true"] {
  outline: none;
  border-bottom: 1px solid var(--accent);
}

.progress-bar-wrapper {
  display: flex;
  align-items: center;
  gap: 12px;
}

.progress-bar-track {
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s ease;
  width: 0%;
}

.progress-text {
  font-size: 13px;
  color: var(--text-dim);
  white-space: nowrap;
}

/* ===== Content ===== */
.content {
  padding: 0 32px 80px;
}

/* ===== Section ===== */
.section {
  margin-top: 24px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
}

.section.dragging-over { border-top: 2px solid var(--accent); }

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  cursor: pointer;
  user-select: none;
}

.section-header-left {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
  min-width: 0;
}

.section-drag-handle {
  cursor: grab;
  color: var(--text-muted);
  font-size: 14px;
  padding: 4px;
  opacity: 0;
  transition: opacity 0.15s;
}

.section:hover .section-drag-handle { opacity: 1; }
.section-drag-handle:active { cursor: grabbing; }

.section-titles {
  flex: 1;
  min-width: 0;
}

.section-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.section-label[contenteditable="true"] {
  outline: none;
  border-bottom: 1px solid var(--accent);
  color: var(--text-dim);
}

.section-title {
  font-size: 18px;
  font-weight: 600;
}

.section-title[contenteditable="true"] {
  outline: none;
  border-bottom: 1px solid var(--accent);
}

.section-header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.section-count {
  font-size: 14px;
  color: var(--text-dim);
}

.section-toggle {
  font-size: 12px;
  color: var(--text-muted);
  transition: transform 0.2s;
}

.section.collapsed .section-toggle { transform: rotate(-90deg); }
.section.collapsed .section-body { display: none; }

.section-delete {
  opacity: 0;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
  padding: 4px 6px;
  border-radius: 4px;
  transition: opacity 0.15s, color 0.15s;
}

.section:hover .section-delete { opacity: 1; }
.section-delete:hover { color: var(--danger); }

/* ===== Step ===== */
.step {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 8px;
  border-radius: 8px;
  transition: background 0.15s;
  position: relative;
}

.step:hover { background: var(--hover); }
.step.completed .step-text .step-name { color: var(--text-muted); text-decoration: line-through; }
.step.completed .step-text .step-desc { color: var(--text-muted); }

.step-drag-handle {
  cursor: grab;
  color: var(--text-muted);
  font-size: 12px;
  padding: 4px 2px;
  opacity: 0;
  transition: opacity 0.15s;
  margin-top: 2px;
}

.step:hover .step-drag-handle { opacity: 1; }
.step-drag-handle:active { cursor: grabbing; }

.step.dragging { opacity: 0.4; }
.step.drag-over { border-top: 2px solid var(--accent); margin-top: -2px; }

/* Checkbox */
.checkbox {
  width: 22px;
  height: 22px;
  min-width: 22px;
  border: 2px solid var(--text-muted);
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  margin-top: 1px;
}

.checkbox:hover { border-color: var(--accent); }

.checkbox.checked {
  background: var(--accent);
  border-color: var(--accent);
}

.checkbox.checked::after {
  content: '✓';
  color: #111;
  font-size: 14px;
  font-weight: 700;
}

.step-text {
  flex: 1;
  min-width: 0;
}

.step-name {
  font-size: 14px;
  color: var(--text);
  line-height: 1.5;
}

.step-name[contenteditable="true"] {
  outline: none;
  border-bottom: 1px solid var(--accent);
}

.step-desc {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 2px;
  line-height: 1.5;
}

.step-desc[contenteditable="true"] {
  outline: none;
  border-bottom: 1px solid var(--accent);
}

.step-delete {
  opacity: 0;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
  padding: 4px 6px;
  border-radius: 4px;
  transition: opacity 0.15s, color 0.15s;
  margin-top: 1px;
}

.step:hover .step-delete { opacity: 1; }
.step-delete:hover { color: var(--danger); }

/* Add buttons */
.add-step-btn, .add-section-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  margin: 8px 0;
  border: 1px dashed var(--border);
  border-radius: 8px;
  background: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
  width: 100%;
}

.add-step-btn:hover, .add-section-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.add-section-btn {
  margin-top: 24px;
}

/* Note box */
.notes-area { margin-top: 24px; }

.note-box {
  margin-bottom: 12px;
  padding: 16px 20px;
  border-radius: 8px;
  border-left: 3px solid var(--accent);
  background: rgba(200,164,78,0.08);
  position: relative;
  transition: opacity 0.3s, transform 0.3s;
}

.note-box[data-type="warning"] { border-left-color: #e67e22; background: rgba(230,126,34,0.08); }
.note-box[data-type="danger"]  { border-left-color: #e74c3c; background: rgba(231,76,60,0.08); }
.note-box[data-type="info"]    { border-left-color: #3498db; background: rgba(52,152,219,0.08); }
.note-box[data-type="success"] { border-left-color: #2ecc71; background: rgba(46,204,113,0.08); }
.note-box[data-type="note"]    { border-left-color: #c8a44e; background: rgba(200,164,78,0.08); }

.note-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.note-type-btn {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: none;
  cursor: pointer;
  color: var(--text-dim);
  transition: all 0.15s;
}

.note-type-btn:hover { border-color: var(--text-dim); color: var(--text); }

.note-box .note-title {
  font-size: 14px;
  font-weight: 600;
  flex: 1;
}

.note-box[data-type="warning"] .note-title { color: #e67e22; }
.note-box[data-type="danger"]  .note-title { color: #e74c3c; }
.note-box[data-type="info"]    .note-title { color: #3498db; }
.note-box[data-type="success"] .note-title { color: #2ecc71; }
.note-box[data-type="note"]    .note-title { color: #c8a44e; }

.note-box .note-title[contenteditable="true"] {
  outline: none;
  border-bottom: 1px solid currentColor;
}

.note-delete {
  opacity: 0;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
  padding: 2px 6px;
  border-radius: 4px;
  transition: opacity 0.15s, color 0.15s;
}

.note-box:hover .note-delete { opacity: 1; }
.note-delete:hover { color: var(--danger); }

.note-box .note-text {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.7;
}

.note-box .note-text[contenteditable="true"] {
  outline: none;
  border-bottom: 1px solid var(--text-muted);
}

.add-note-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  margin: 8px 0;
  border: 1px dashed var(--border);
  border-radius: 8px;
  background: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
  width: 100%;
}

.add-note-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Section complete celebration */
.section.section-complete .section-header {
  background: linear-gradient(90deg, rgba(200,164,78,0.08), rgba(46,204,113,0.08));
  border-radius: 8px;
  padding-left: 8px;
  padding-right: 8px;
}

.section.section-complete .section-count { color: var(--success); }

.section-complete-badge {
  display: inline-block;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  background: rgba(46,204,113,0.15);
  color: var(--success);
  margin-left: 8px;
  font-weight: 600;
}

/* Progress bar glow */
.progress-bar-fill.glow {
  box-shadow: 0 0 12px rgba(200,164,78,0.6);
}

/* Celebration overlay */
.confetti-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 9999;
}

/* Crossfade transition */
.main-fade {
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Checkbox pop animation */
.checkbox.pop {
  animation: checkPop 0.3s ease;
}

@keyframes checkPop {
  0% { transform: scale(1); }
  40% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

/* Mobile hamburger */
.hamburger {
  display: none;
  position: fixed;
  top: 16px;
  left: 16px;
  z-index: 200;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
  color: var(--text);
  cursor: pointer;
  font-size: 18px;
}

.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 90;
}

/* New project modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 300;
  align-items: center;
  justify-content: center;
}

.modal-overlay.active { display: flex; }

.modal {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  width: 380px;
  max-width: 90vw;
}

.modal h3 {
  font-size: 18px;
  margin-bottom: 16px;
}

.modal input {
  width: 100%;
  padding: 10px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 14px;
  margin-bottom: 12px;
  outline: none;
}

.modal input:focus { border-color: var(--accent); }

.modal-template-list {
  margin-bottom: 16px;
}

.modal-template-item {
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 6px;
  font-size: 13px;
  color: var(--text-dim);
  transition: all 0.15s;
}

.modal-template-item:hover { border-color: var(--accent); color: var(--text); }
.modal-template-item.selected { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

.modal-actions button {
  padding: 8px 20px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-size: 13px;
}

.modal-actions .cancel-btn {
  background: var(--border);
  color: var(--text-dim);
}

.modal-actions .confirm-btn {
  background: var(--accent);
  color: #111;
  font-weight: 600;
}

/* ===== Project Metadata Card ===== */
.project-meta {
  padding: 20px 32px 0;
  background: var(--bg);
}

.project-meta-inner {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
}

.project-meta-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.project-meta-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
}

.project-meta-title[contenteditable="true"] {
  outline: none;
  border-bottom: 1px solid var(--accent);
}

.project-meta-actions {
  display: flex;
  gap: 8px;
}

.icon-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
}

.icon-btn:hover { border-color: var(--accent); color: var(--accent); }

.project-meta-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 6px 20px;
}

.meta-field {
  font-size: 12px;
  display: flex;
  align-items: baseline;
  gap: 6px;
  white-space: nowrap;
  overflow: hidden;
}

.meta-field .meta-label {
  color: var(--text-muted);
  flex-shrink: 0;
}

.meta-field .meta-value {
  color: var(--text-dim);
  overflow: hidden;
  text-overflow: ellipsis;
}

.meta-field .meta-value.empty { color: var(--text-muted); font-style: italic; }

.status-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
}
.status-badge[data-status="筹备中"] { background: rgba(52,152,219,0.15); color: #3498db; }
.status-badge[data-status="拍摄中"] { background: rgba(230,126,34,0.15); color: #e67e22; }
.status-badge[data-status="后期中"] { background: rgba(155,89,182,0.15); color: #9b59b6; }
.status-badge[data-status="已交付"] { background: rgba(46,204,113,0.15); color: #2ecc71; }
.status-badge[data-status="已搁置"] { background: rgba(127,127,127,0.15); color: #888; }
.status-badge[data-status="宣发中"] { background: rgba(241,196,15,0.15); color: #f1c40f; }
.status-badge[data-status="已完成"] { background: rgba(46,204,113,0.15); color: #2ecc71; }
.status-badge[data-status="已归档"] { background: rgba(127,127,127,0.15); color: #888; }

.complete-project-btn {
  background: none;
  border: 1px solid rgba(46,204,113,0.4);
  color: #2ecc71;
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
}
.complete-project-btn:hover {
  background: rgba(46,204,113,0.15);
  border-color: #2ecc71;
}
.reopen-project-btn {
  background: none;
  border: 1px solid rgba(230,126,34,0.4);
  color: #e67e22;
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
}
.reopen-project-btn:hover {
  background: rgba(230,126,34,0.15);
  border-color: #e67e22;
}

.overall-progress {
  margin-top: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.overall-progress .progress-bar-track { flex: 1; }

/* ===== Module Tabs ===== */
.module-tabs-bar {
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 40;
  padding: 16px 32px 0;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 4px;
  overflow-x: auto;
}

.module-tab {
  padding: 10px 16px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  color: var(--text-dim);
  font-size: 14px;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.15s;
  position: relative;
}

.module-tab:hover { color: var(--text); }

.module-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.module-tab .module-tab-progress {
  font-size: 11px;
  color: var(--text-muted);
}

.module-tab.active .module-tab-progress { color: var(--accent); }

.module-tab.complete .module-tab-progress { color: var(--success); }

.module-tab .module-tab-delete {
  opacity: 0;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 12px;
  padding: 0 2px;
  border-radius: 3px;
  transition: opacity 0.15s, color 0.15s;
}

.module-tab:hover .module-tab-delete { opacity: 1; }
.module-tab .module-tab-delete:hover { color: var(--danger); }

.module-tab-add {
  padding: 10px 14px;
  cursor: pointer;
  border: 1px dashed var(--border);
  border-radius: 6px;
  color: var(--text-muted);
  font-size: 13px;
  margin-left: 8px;
  margin-bottom: 8px;
  background: none;
  transition: all 0.15s;
}

.module-tab-add:hover { border-color: var(--accent); color: var(--accent); }

.empty-module-hint {
  padding: 60px 32px;
  text-align: center;
  color: var(--text-dim);
}

.empty-module-hint .hint-icon {
  font-size: 48px;
  opacity: 0.3;
  margin-bottom: 16px;
}

.empty-module-hint .hint-btn {
  display: inline-block;
  margin-top: 16px;
  padding: 10px 20px;
  background: var(--accent);
  color: #111;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
}

/* ===== Wizard / Settings Modal ===== */
.modal.wizard {
  width: 560px;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
}

.modal.wizard h3 {
  margin-bottom: 4px;
}

.wizard-steps {
  display: flex;
  gap: 20px;
  margin-bottom: 16px;
  font-size: 12px;
  color: var(--text-muted);
}

.wizard-steps .step-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
}

.wizard-steps .step-indicator.active { color: var(--accent); }
.wizard-steps .step-indicator.done { color: var(--success); }

.wizard-steps .step-dot {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--border);
  color: var(--text-muted);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 600;
}

.wizard-steps .step-indicator.active .step-dot {
  background: var(--accent);
  color: #111;
}

.wizard-steps .step-indicator.done .step-dot {
  background: var(--success);
  color: #111;
}

.wizard-body {
  flex: 1;
  overflow-y: auto;
  margin: 0 -4px;
  padding: 0 4px;
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.form-field {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.form-field.full { grid-column: 1 / -1; }

.form-field label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.form-field input,
.form-field select,
.form-field textarea {
  width: 100%;
  padding: 9px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  outline: none;
  font-family: inherit;
  margin-bottom: 0;
}

.form-field input:focus,
.form-field select:focus,
.form-field textarea:focus { border-color: var(--accent); }

.form-field textarea {
  min-height: 70px;
  resize: vertical;
}

.module-picker-grid {
  display: grid;
  gap: 10px;
}

.module-picker-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
}

.module-picker-item:hover { border-color: var(--text-muted); }

.module-picker-item.selected {
  border-color: var(--accent);
  background: var(--accent-dim);
}

.module-picker-check {
  width: 20px;
  height: 20px;
  min-width: 20px;
  border: 2px solid var(--text-muted);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 1px;
  transition: all 0.15s;
}

.module-picker-item.selected .module-picker-check {
  background: var(--accent);
  border-color: var(--accent);
}

.module-picker-item.selected .module-picker-check::after {
  content: '✓';
  color: #111;
  font-size: 13px;
  font-weight: 700;
}

.module-picker-info {
  flex: 1;
}

.module-picker-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 2px;
}

.module-picker-desc {
  font-size: 12px;
  color: var(--text-dim);
}

.wizard-footer {
  display: flex;
  gap: 8px;
  justify-content: space-between;
  align-items: center;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

.wizard-footer-right {
  display: flex;
  gap: 8px;
}

/* ===== View Switcher (sidebar top) ===== */
.view-switcher {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
  padding: 10px 12px 6px;
  border-bottom: 1px solid var(--border);
}
.view-tab {
  padding: 8px 6px;
  border-radius: 6px;
  border: 1px solid transparent;
  background: none;
  color: var(--text-dim);
  font-size: 12px;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  white-space: nowrap;
}
.view-tab:hover { color: var(--text); }
.view-tab.active {
  background: var(--accent-dim);
  color: var(--accent);
  border-color: rgba(200,164,78,0.3);
}

/* Inline editable cells */
.cell-edit {
  cursor: text;
  position: relative;
}
.cell-edit.cell-select { cursor: pointer; }
.cell-edit:hover {
  background: rgba(200,164,78,0.06);
  outline: 1px solid rgba(200,164,78,0.3);
  outline-offset: -1px;
}
.cell-edit.cell-empty { color: var(--text-muted); font-style: italic; }
.inline-edit-input {
  width: 100%;
  padding: 4px 6px;
  border-radius: 4px;
  border: 1px solid var(--accent);
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  box-sizing: border-box;
}
.inline-edit-input[type="number"] { text-align: right; }

/* Star rating */
.star-bar {
  position: relative;
  display: inline-block;
  font-size: 18px;
  line-height: 1;
  cursor: pointer;
  user-select: none;
  letter-spacing: 1px;
  vertical-align: middle;
}
.star-bar-bg { color: #4a4a4a; }
.star-bar-fg {
  color: #ffc94d;
  position: absolute;
  top: 0; left: 0;
  white-space: nowrap;
  overflow: hidden;
  pointer-events: none;
  text-shadow: 0 0 6px rgba(255,201,77,0.4);
}
.star-bar:hover .star-bar-bg { color: #5a5a5a; }
.star-num {
  margin-left: 8px;
  font-size: 11px;
  color: var(--text-muted);
  vertical-align: middle;
}

/* Calendar */
.calendar-wrap { padding: 16px 20px 40px; }
.cal-toolbar {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 16px;
}
.cal-title { flex: 1; text-align: center; font-size: 18px; font-weight: 600; color: var(--accent); }
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.cal-dow {
  background: var(--bg-elev);
  padding: 8px 6px;
  text-align: center;
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 2px;
}
.cal-cell {
  background: var(--bg);
  min-height: 90px;
  padding: 6px;
  cursor: pointer;
  transition: background 0.15s;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.cal-cell:hover { background: rgba(200,164,78,0.06); }
.cal-muted { opacity: 0.35; }
.cal-today { background: rgba(200,164,78,0.15); box-shadow: inset 0 0 0 2px var(--accent); }
.cal-day { font-size: 14px; font-weight: 600; color: var(--text); }
.cal-today .cal-day { color: var(--accent); }
.cal-events { display: flex; flex-direction: column; gap: 2px; overflow: hidden; }
.cal-event {
  font-size: 11px;
  padding: 2px 4px;
  background: var(--bg-elev);
  border-left: 3px solid var(--accent);
  border-radius: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text-dim);
}
.cal-event-more { font-size: 10px; color: var(--text-muted); padding-left: 4px; }
@media (max-width: 640px) {
  .cal-cell { min-height: 56px; padding: 4px; }
  .cal-event { font-size: 10px; padding: 1px 2px; }
  .cal-dow { padding: 4px 2px; font-size: 10px; letter-spacing: 1px; }
}

/* Links module */
.links-wrap { padding: 16px 20px 40px; }
.links-groups { display: flex; flex-direction: column; gap: 28px; margin-top: 8px; }
.links-group-title {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: var(--text-muted);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.links-group-count {
  background: var(--bg-elev);
  color: var(--text-dim);
  padding: 1px 8px;
  border-radius: 10px;
  font-size: 10px;
  letter-spacing: 0;
}
.links-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
}
.link-card {
  position: relative;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: all 0.2s;
}
.link-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: var(--link-color, var(--accent));
}
.link-card:hover {
  transform: translateY(-2px);
  border-color: var(--link-color, var(--accent));
  box-shadow: 0 6px 18px rgba(0,0,0,0.3);
}
.link-body {
  display: block;
  padding: 18px 16px;
  text-decoration: none;
  color: inherit;
  cursor: pointer;
}
.link-icon {
  width: 44px; height: 44px;
  border-radius: 10px;
  background: rgba(255,255,255,0.04);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 10px;
  font-size: 24px;
  overflow: hidden;
}
.link-fav { width: 28px; height: 28px; border-radius: 6px; }
.link-emoji { font-size: 24px; line-height: 1; }
.link-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.link-desc {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.4;
  margin-bottom: 6px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.link-host {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.link-edit-btn {
  position: absolute;
  top: 6px; right: 6px;
  width: 26px; height: 26px;
  border-radius: 50%;
  background: rgba(0,0,0,0.3);
  color: var(--text-dim);
  border: none;
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  display: flex; align-items: center; justify-content: center;
  z-index: 2;
  opacity: 0;
  transition: opacity 0.15s;
}
.link-card:hover .link-edit-btn { opacity: 1; }
.link-edit-btn:hover { background: var(--accent); color: #000; }
@media (max-width: 640px) {
  .link-edit-btn { opacity: 1; }
  .links-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
}

/* Knowledge Base */
.kb-wrap {
  display: grid;
  grid-template-columns: 280px 1fr;
  height: calc(100vh - 0px);
  gap: 0;
}
.kb-sidebar {
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.kb-sidebar-header {
  padding: 16px 16px 10px;
  border-bottom: 1px solid var(--border);
}
.kb-title { font-size: 18px; font-weight: 600; color: var(--accent); margin-bottom: 4px; }
.kb-title-sub { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
.kb-search-box { padding: 10px 12px; border-bottom: 1px solid var(--border); }
.kb-search-input {
  width: 100%;
  padding: 7px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg-elev);
  color: var(--text);
  font-size: 12px;
}
.kb-cat-list { padding: 8px 0; overflow-y: auto; flex: 1; }
.kb-cat-group { margin-bottom: 6px; }
.kb-cat-header {
  padding: 6px 16px;
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 2px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.kb-cat-count { background: var(--bg-elev); padding: 1px 6px; border-radius: 8px; font-size: 10px; }
.kb-article-item {
  padding: 10px 16px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all 0.12s;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.kb-article-item:hover { background: rgba(200,164,78,0.06); }
.kb-article-item.active {
  background: rgba(200,164,78,0.1);
  border-left-color: var(--accent);
}
.kb-article-title { font-size: 13px; color: var(--text); font-weight: 500; }
.kb-article-meta { font-size: 10px; color: var(--text-muted); }
.kb-sidebar-footer { padding: 10px 12px; border-top: 1px solid var(--border); }

.kb-main { display: flex; flex-direction: column; overflow: hidden; }
.kb-main-header {
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.kb-article-title-input {
  flex: 1;
  font-size: 20px;
  font-weight: 600;
  background: transparent;
  border: none;
  color: var(--text);
  outline: none;
  min-width: 200px;
}
.kb-article-title-display {
  flex: 1;
  font-size: 22px;
  font-weight: 600;
  color: var(--text);
  min-width: 200px;
}
.kb-meta-bar {
  padding: 8px 24px;
  display: flex;
  gap: 8px;
  font-size: 12px;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  align-items: center;
}
.kb-meta-bar select, .kb-meta-bar input {
  padding: 4px 8px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--bg-elev);
  color: var(--text);
  font-size: 12px;
}
.kb-body { flex: 1; overflow-y: auto; padding: 24px; }
.kb-textarea {
  width: 100%;
  height: 100%;
  min-height: 500px;
  padding: 14px;
  font-family: 'SF Mono', Monaco, Consolas, 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.7;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg-elev);
  color: var(--text);
  resize: vertical;
  outline: none;
}
.kb-textarea:focus { border-color: var(--accent); }
.kb-rendered {
  max-width: 780px;
  line-height: 1.75;
  color: var(--text-dim);
  font-size: 14px;
}
.kb-rendered h1, .kb-rendered h2 { color: var(--accent); margin: 28px 0 12px; font-weight: 600; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.kb-rendered h1 { font-size: 24px; }
.kb-rendered h2 { font-size: 20px; }
.kb-rendered h3 { color: var(--text); margin: 20px 0 8px; font-size: 16px; font-weight: 600; }
.kb-rendered h4 { color: var(--text); margin: 14px 0 6px; font-size: 14px; font-weight: 600; }
.kb-rendered p { margin: 10px 0; }
.kb-rendered ul, .kb-rendered ol { margin: 10px 0 10px 24px; }
.kb-rendered li { margin: 4px 0; }
.kb-rendered strong { color: var(--accent); }
.kb-rendered code {
  padding: 2px 6px; background: var(--bg-elev); border-radius: 3px;
  font-family: monospace; font-size: 13px; color: var(--accent);
}
.kb-rendered pre {
  background: var(--bg-elev); padding: 12px; border-radius: 6px;
  overflow-x: auto; margin: 12px 0;
}
.kb-rendered blockquote {
  border-left: 3px solid var(--accent);
  padding: 6px 14px;
  margin: 12px 0;
  background: rgba(200,164,78,0.05);
  color: var(--text-dim);
}
.kb-rendered table {
  width: 100%;
  border-collapse: collapse;
  margin: 14px 0;
  font-size: 13px;
}
.kb-rendered th, .kb-rendered td {
  padding: 8px 10px;
  border: 1px solid var(--border);
  text-align: left;
}
.kb-rendered th { background: var(--bg-elev); color: var(--accent); font-weight: 600; }
.kb-rendered hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
.kb-empty-state {
  text-align: center;
  padding: 80px 24px;
  color: var(--text-muted);
}
.kb-btn-group { display: flex; gap: 6px; }
.kb-btn {
  padding: 6px 12px;
  border: 1px solid var(--border);
  background: var(--bg-elev);
  color: var(--text-dim);
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
}
.kb-btn:hover { color: var(--text); border-color: var(--accent); }
.kb-btn.primary { background: var(--accent); color: #000; border-color: var(--accent); }
.kb-btn.danger { color: var(--danger); }
@media (max-width: 800px) {
  .kb-wrap { grid-template-columns: 1fr; height: auto; }
  .kb-sidebar { max-height: 40vh; }
  .kb-textarea { min-height: 400px; }
}

/* ===== Archive View ===== */
.archive-wrap { padding: 20px 32px 80px; }

.archive-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 12px;
}
.archive-title {
  font-size: 22px;
  font-weight: 700;
}
.archive-title-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
}

.archive-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
}
.stat-card .stat-label {

const KB_SEED_GENERAL = `从光进入镜头到最终成片，每一个环节的原理与影响

## 一、画面形成链路：所有影响画质的因素

从光进入镜头到最终成片，每一个环节都可能成为画质的瓶颈。任何一环的短板都无法被后面的环节补回来。

### 1.1 镜头

光学素质决定画面的起点。分辨率（锐度）、色散（紫边）、畸变、暗角、眩光和鬼影、色彩透过率、对焦呼吸效应，这些全部在光到达传感器之前就已经决定了。光圈大小同时影响景深、进光量和衍射极限。

### 1.2 ND滤镜

在镜头和传感器之间减少进光量。影响色彩（偏色）、锐度（劣质ND会降低分辨率）、曝光策略。可变ND还可能在极端档位产生交叉纹。

### 1.3 传感器尺寸

全画幅、S35、M43。传感器越大，单个像素面积越大，信噪比越好，景深越浅，同焦距下视角越广。裁切模式本质上是在用更小的传感器面积工作。

### 1.4 传感器结构：前照/背照/堆叠

前照式（FSI）：最早的设计。光从上往下先穿过电路层，再到达底下的感光层。电路层的金属连线会遮挡和反射光线，进光量损失。

背照式（BSI）：把整个结构翻转，感光层在上面直接接收光线，电路层移到下面。进光量提升30%以上，信噪比明显改善。制造工艺更复杂、成本更高。现在主流相机基本都是背照式。

堆叠式（Stacked）：在背照式基础上，把电路层完全从感光层剥离出来，做成独立芯片上下叠在一起。感光面积占比从60%提升到90%，电路层可以做得更复杂更快，内置DRAM高速缓存，读取速度大幅提升。直接影响滚动快门严重程度和高帧率能力。

### 1.5 像素数量与像素大小

像素越多分辨率越高，但同面积下单个像素越小，信噪比越差。7K传感器输出4K可以超采样，获得比原生4K更锐利干净的画面。

### 1.6 低通滤波器（抗混叠滤波器）

传感器前的光学滤镜，轻微模糊画面来抑制摩尔纹和伪色。滤镜太强画面偏软，太弱高频纹理容易出伪像。不同机器的平衡策略不同。

### 1.7 传感器技术：DGO与Dual Base ISO

DGO（双增益输出）：每个像素同时用高增益和低增益读取两次，取高增益的干净暗部和低增益的完整高光，像素级合成。本质是实时的、每帧都在做的曝光合成。原理与ARRI ALEXA用了十多年的方法相同。用于C300 III和C70，实现16+档动态范围。代价是处理量大，高帧率时可能失效。

Dual Base ISO：两套增益电路只能选一个用，同一时刻只有一个在工作。比DGO简单，但动态范围不如DGO。

### 1.8 ISO/增益

改变信号放大倍数。基准ISO信噪比最优，偏离基准噪点增加动态范围缩小。拓展ISO到基准以下会降低增益，配合补光可获得更干净的暗部。

### 1.9 白平衡

决定色彩基准。RAW下白平衡是元数据，后期可无损修改。编码格式下白平衡烧进画面，后期修改有质量损失。错误的白平衡会浪费色彩通道的编码精度。

### 1.10 快门角度/快门速度

影响运动模糊。180度快门（帧率的两倍作为快门速度）是电影标准运动模糊量。快门越快运动越清晰但越"数码感"，快门越慢运动越糊。快门速度也参与控制曝光。

### 1.11 Log曲线

Log把高光和暗部压缩，中间调展开，用有限的位深保留最大动态范围。不同Log曲线的压缩策略不同，影响后期调色的起点和容忍度。画面看起来很平很灰，必须后期调色。

### 1.12 色彩空间/色域

定义相机能记录的色彩范围。Cinema Gamut最大，BT.709最小。拍摄时用大色域保留最多色彩信息，后期再转换到交付色域。

### 1.13 位深

每个像素用多少级别描述亮度和颜色。8bit有256级，10bit有1024级，12bit有4096级。位深越高色彩过渡越平滑，调色时越不容易出色带断层。

### 1.14 色度采样

4:4:4每个像素都有完整色彩信息，4:2:2每两个共享，4:2:0每四个共享。影响色彩边缘锐度、绿幕抠像质量和肤色过渡精度。

### 1.15 超采样

用更高分辨率的传感器数据缩到较低分辨率输出，多个像素合成一个，等效提升信噪比和锐度，同时抑制摩尔纹。帧率越高超采样效果可能越弱。

### 1.16 机内降噪与锐化

降噪：抹掉噪点同时也损失高频细节。RAW下不生效，留给后期。编码格式下可调整级别。

锐化：增强边缘对比度，过度锐化会引入伪像、光晕和混叠。Log下建议关掉或调到最低，后期再加。

### 1.17 数字IS（机内防抖）

通过裁切画面边缘补偿抖动，代价是视角变窄。不影响画质本身，但减少了可用传感器面积。

### 1.18 录制介质

不直接影响画质，但写入速度不够会限制可用的最高码率和格式。CFexpress能支持RAW和高码率Intra，SD只能支持较低码率或代理文件。

## 二、动态范围

### 2.1 定义

传感器能同时捕捉的最亮和最暗之间的亮度范围，用"档"（stops）表示。每增加一档，可记录的亮度范围翻倍。

### 2.2 测试指标含义

SNR=2：信号是噪点的两倍，画面明显干净。最接近实际可用的动态范围，是看榴单时最应该关注的列。

SNR=1：信号等于噪点，理论极限。暗部拉出来能看到信息但噪点很重，能不能用取决于后期降噪能力。

Slope-based DR：通过分析信号曲线斜率变化判断动态范围边界，通常给出最高数值，接近传感器物理极限，日常参考意义最小。

### 2.3 CineD数据库

全球最权威的相机动态范围测试数据库，免费公开。地址：cined.com/camera-database/。可以查看所有经过标准化测试的相机数据，支持两台机器并排对比。

### 2.4 看测试时的注意事项

关注测试条件是否统一：RAW还是压缩编码，机内降噪开还是关。有的厂商在RAW里偷偷做降噪，测出来数据好看但暗部细节是糊的。Canon RAW几乎不做降噪，裸数据噪点高，但加后期降噪后实际可用范围很好。

## 三、编码体系

### 3.1 RAW

不是编码格式，是一种数据类型。传感器拍到什么就存什么，不做去马赛克、不做色彩转换。后期空间最大，文件最大。不同厂商封装不同：Canon叫Cinema RAW Light，RED叫REDCODE RAW，Blackmagic叫BRAW。

### 3.2 ProRes

苹果设计的后期友好编码。已经过去马赛克和色彩处理，是"成品视频"，但用非常高质量的帧内压缩。每帧独立编码，时间线拖拽极流畅。有多个档位：Proxy、422 LT、422、422 HQ、4444、4444 XQ。码率比H.264/H.265大很多。好莱坞后期流程的标准交换格式。

### 3.3 ProRes RAW

介于RAW和ProRes之间。保留传感器原始拜耳数据，但用ProRes的压缩算法打包。文件比纯 RAW小，同时保留后期调整ISO、白平衡等RAW级别的能力。通常需要通过外录监视器从相机HDMI口捕获。FCP原生支持，Resolve支持有限。

### 3.4 H.264（AVC）

通用压缩编码，压缩效率适中，兼容性最广。支持帧内和帧间压缩。足够码率下画质很好，但后期调色容忍度不如ProRes和RAW。

### 3.5 H.265（HEVC）

H.264的继承者，压缩效率约为H.264的两倍——同码率下画质更好，或同画质下文件更小。代价是编解码更吃算力。

### 3.6 帧内压缩 vs 帧间压缩

帧内压缩（All-Intra）：每帧独立编码，剪辑时可逐帧精确定位，不需要解码前后帧。文件大但剪辑体验最好。

帧间压缩（Long GOP）：只记录关键帧和帧与帧之间的差异，文件小很多。剪辑时需要解码前后参考帧，更吃性能。现代编码器下画质与帧内差距很小，只有极端运动场景才会显现。

### 3.7 码率对画质的影响

码率是编码器每秒用多少数据描述画面。影响四个方面：细节保留（码率低高频细节被涂抹）、调色容忍度（码率低色彩梯度丢失）、噪点表现（低码率把噪点和细节一起抹）、运动画面（快速运动对码率需求最高）。同一种编码方式内不要主动降码率。

重要区分：码率高不等于画质一定好，还要看编码效率。同码率下H.265比H.264保留更多信息，RAW和编码视频更是完全不同的数据性质。码率只在同一种编码方式内部做比较才有意义。

### 3.8 封装容器

MXF、MP4、MOV不影响画质，只影响文件管理、元数据携带和软件兼容性。MXF偏专业广播，MP4偏通用，MOV偏苹果生态。

## 四、曝光控制底层逻辑

### 4.1 动态范围的水桶比喻

动态范围像一个固定容量的水桶，中灰是桶里的一条标记线。线以上是高光余量，线以下是暗部余量。桶的总容量由传感器和基准ISO决定，你能做的只有一件事：移动中灰线的位置。

### 4.2 移动中灰的三种方式

EI逻辑：增益不变，通过监视器显示引导你调光圈改变进光量。不会出现降低增益+向右曝光的双重效果。

基准ISO上直接调光圈：和EI效果完全一样，只是跳过了监看引导，直接看波形图自己做判断。

降ISO到基准以下：真正降低增益，画面变暗，补光圈回正常的过程本身就在多给光，等于同时完成了降增益和向右曝光。暗部更干净，但高光余量减少。

底层逻辑：不管通过什么过程，最后进光量增加，画面纯净度就会提高。三种方式都是通过一步转接手段引导用户改变其他参数。

### 4.3 向右曝光

故意让画面比正常曝光亮一点，把信号推离噪底，后期再压回。"宁可亮一点录，后期压暗"比"录暗了后期提亮"更好。

## 五、Log与RAW的后期差距

调色深度：RAW可以在去马赛克之前改变底层参数（ISO、白平衡、色温），等于重新冲洗底片。Log是已经冲洗好的成品，能调但有质量损失。

动态范围可用性：两者总动态范围可能接近，但RAW极端推拉时衰减更平滑。Log暗部硬拉3档以上色彩开始断裂，RAW拉同样幅度会出噪点但色彩结构还在。

色彩精度：RAW保留传感器原始光电响应，色彩空间没有被转换过。Log经过了一次色彩空间映射，这个过程是有损的。

实际差距：正常曝光、光比可控、轻度调色时差距很小。极端光比、白平衡设错、精细肤色分离、多机匹配时差距才会拉开。Log是95分，RAW是100分，那5分在你真正需要时就是救命的余量。

## 六、R5 II的SRAW问题

R5 II的SRAW不是真正的RAW。传感器是8K，选4K SRAW时相机读取完整8K，先做去马赛克，再缩小到4K，然后重新打包成RAW格式。经历了"去马赛克→缩放→重新拜耳化"的过程，本质是伪RAW。

问题：细节水平明显低于8K超采样到4K，滚动快门和8K一样慢（没有通过跳行换取速度），高频区域容易出现处理伪像和伪色。

替代方案：想要最好的4K画质，直接录8K后期缩到4K。存储紧张时，H.265压缩编码反而可能比SRAW细节更好，因为那是从完整8K超采样下来的。

## 七、影视基础概念补充

### 7.1 帧率

每秒录制多少帧画面。24p是电影标准，30p是广播标准，60p用于平滑运动或后期做2倍慢动作，120p用于5倍慢动作。帧率越高，对传感器读取速度、处理能力和存储的压力越大，超采样和动态范围都可能受影响。

### 7.2 分辨率

画面的像素尺寸。4K DCI是4096x2160，4K UHD是3840x2160，前者是电影标准略宽，后者是电视标准。更高分辨率提供更多细节和后期裁切空间，但对存储、处理和传输压力更大。

### 7.3 滚动快门（果冻效应）

CMOS传感器逐行读取，不是同时曝光。快速横摇或高速运动物体会出现倾斜变形。读取速度越快（堆叠式传感器），果冻效应越小。用毫秒（ms）衡量，数值越小越好。

### 7.4 曝光宽容度（Latitude）

和动态范围相关但不同。动态范围是传感器能捕捉的亮度范围，曝光宽容度是你故意曝光错误后拉回来还能保持多少细节和色彩。曝光宽容度更接近实际拍摄中的容错空间。

### 7.5 拜耳滤镜与去马赛克

传感器上每个像素只能感应红、绿、蓝中的一种颜色（通过拜耳滤镜实现）。去马赛克是通过算法把单色像素还原成全彩像素的过程。RAW保存的是去马赛克之前的数据，所以后期空间最大。

### 1.1 三种核心格式定位

传感器直出原始数据，未经去马赛克和编码处理，每个像素保留完整位深和光电信息。16档动态范围，后期空间最大。可在后期无损修改ISO、白平衡、色温等底层参数。

推荐设置：S35 RAW LT 30p，约480Mbps。存储和画质的最优平衡。

后期：DaVinci Resolve原生支持Cinema RAW Light，可在RAW层面直接调整。FCP支持有限。M3 Max应对4K RAW LT没问题，多层节点会有压力。

#### XF-AVC Intra-frame（通用工作流底座）

经过完整编码管线的成品视频，H.264帧内压缩，每帧独立编码，剪辑流畅兼容性最好。动态范围约13-14档。最高支持60p。

推荐设置：4096x2160 Intra-frame + CLog2。

适用场景：商业快速交付、需要最大剪辑兼容性的场景（多人协作、交付给不熟悉265的剪辑师）。

#### XF-HEVC S（慢动作 + 省存储）

H.265编码，文件体积最小。是C50上拍120p慢动作的唯一编码选项（H.264最高只到60p）。265的压缩效率约为264的两倍，同码率下画质更好。C50上265只有Long GOP，无帧内压缩选项，但现代编码器下Long GOP画质与帧内差距很小，只有极端运动场景才会显现。

▶ 120p慢动作必须用这个格式。日常拍摄也可以用265配CLog2作为底座，存储压力比264小很多。

### 1.2 格式对比表

| 格式 | 编码 | 动态范围 | 文件大小 | 核心优势 | 最高帧率 | 压缩方式 |
| --- | --- | --- | --- | --- | --- | --- |
| RAW LT | 无编码 | 16档 | 中等 | 极致画质与后期 | 30p | N/A |
| XF-AVC | H.264 | 13-14档 | 较大 | 剪辑流畅、兼容最好 | 60p | 帧内 |
| XF-HEVC S | H.265 | 13-14档 | 最小 | 省空间+120p慢动作 | 120p | Long GOP |

关键结论：正常曝光下三种格式画面差距极小，极端光比下RAW优势明显。

### 1.3 封装容器：XF-AVC vs XF-AVC S

两者编码器、色度采样、位深、压缩方式、码率完全相同。唯一区别是封装容器：XF-AVC用MXF（Canon传统电影机专业封装），XF-AVC S用MP4（文件管理更简单，兼容性更广）。音频设置选项也有差异，MXF封装的音频轨道处理方式与MP4不同。

▶ 不给电视台交活就选XF-AVC S（MP4）。

### 1.4 色度采样与位深

YCC422 vs YCC420：422每两个像素共享一组色彩信息，420每四个共享。422在绿幕抠像、肤色过渡和饱和色边缘更好。

10bit vs 8bit：10bit每通道1024级亮度，8bit只有256级。8bit调色时更容易出色带断层。

▶ 这两个选项对你没有独立位置——省空间有HEVC，通用有XF-AVC Intra 422 10bit，精品有RAW。XF-AVC S底部的420 8bit可以跳过。

### 1.5 码率影响

降低码率主要损失两点：细节保留能力下降（高频细节被更激进量化，出现涂抹感）；调色容忍度收窄（拉曲线时更容易出色带断层）。正常看差别不大，后期一折腾就露底。

▶ 不要主动降码率。要省空间选265，要画质选RAW，264帧内+CLog2作为通用底座已是最优解。

### 1.6 XF-AVC/XF-HEVC S的本质

Canon官方定义它们为"基于H.264/H.265的原创扩展格式"。底层编码算法没有脱离标准，任何支持H.264/H.265解码的软件都能打开。Canon做的是在标准编码器之上包了一层专业化的壳：统一的文件夹结构、完整的Cinema EOS元数据、默认422 10bit配置、针对自家硬件的编码器调优。

## 二、全画幅与S35裁切

### 2.1 RAW下的表现

RAW模式下，全画幅和S35的动态范围和单像素质量完全相同，差异仅体现在分辨率和视角。码率下降是因为像素总量少了，不是单像素被压缩了。动态范围依然完整16档。

思考过程：担心RAW S35码率下降会损失画质→确认不会，RAW没有编码器做"分配"，每个像素信息完整度不变。RAW S35不会损失画质（分辨率下降不算），只是不会吃到编码红利。

### 2.2 XF-AVC下的编码红利

XF-AVC下，S35画质优于全画幅。原因是同样码率分配给更少像素，每个像素分到的比特数增加，编码质量提升。动态范围也略有提升。这个红利只存在于经过编码器的格式。

▶ 用XF-AVC拍摄时，不需要全画幅视角就切S35，白拿一波画质提升。

### 2.3 S35 vs 数码变焦 vs 后期裁切

需要更紧画面且构图固定：直接切S35最优，XF-AVC下还能吃到编码红利。数码变焦的优势只在裁切幅度需要灵活控制，或拍摄中需要实时推拉效果。后期裁切4K永远是最差选项。

## 三、数码变焦与超采样

### 3.1 为什么机内数码变焦比后期裁切更清晰

传感器始终在拍7K。机内数码变焦在编码之前、7K原始数据上截取一块区域再缩采样到4K。后期裁切是在已经压成4K的画面上放大，没有额外信息补充。

通俗理解：机内裁切是「从大池子里舄小碗」，后期裁切是「把小碗里的水硬撑大」。

### 3.2 超采样帧率限制

| 帧率 | 超采样状态 | 数码变焦优势 |
| --- | --- | --- |
| 4K 30p及以下 | 完整7K超采样 | 最大 |
| 4K 60p | 有超采样但质量略降 | 较大 |
| 4K 120p | 无超采样 | 缩小 |

### 3.3 机内数码变焦 vs 7K后期裁切

两者效果近似。原始信息来源一样，只是裁切发生在管线的不同位置。机内变焦把构图锁死在拍摄时；7K录制保留后期重新构图、稳定、输出横竖版的灵活性。

▶ 构图确定用数码变焦；需要后期微调或7K更保险。7K只支持30p，60p只有4K可选，此时数码变焦是唯一利用传感器余量的方式。

### 3.4 S35下数码变焦余量

S35裁切后传感器读取约5K，压成4K输出，余量只剩1.2倍。放大幅度非常有限。需要大幅裁切应切回全画幅。

## 四、双基准ISO、增益与EI曝光逻辑

### 4.1 双基准ISO：800和6400

C50的传感器有两套增益电路（双转换增益设计）。800是低增益电路，噪底最低，动态范围最大（全画幅15+档，S35 16档）。6400是高增益电路，适合低光，动态范围损失约1-1.5档。

中间值的问题：停在1600、3200等中间值，传感器没有对应的最优电路状态，画质不如直接用800或6400。

▶ 光够用800，光不够切6400，不要停在中间。

### 4.2 ISO档位对动态范围的影响

ISO档位通过两条路径影响动态范围。第一，改变总量：偏离基准点总量缩小。第二，改变分布：调ISO后你会调整光圈补偿亮度，这个行为移动了中灰在动态范围中的位置。

底层逻辑：动态范围总量由传感器和基准ISO决定，分布由你通过控光来决定中灰放在哪。

### 4.3 EI的本质

EI（曝光指数）不触碰传感器，不改变信号，不分配动态范围。它只是一个显示参考标记，通过改变监视器显示引导你调整光圈/ND/灯光。你的后续行为才真正改变了动态范围分布。

EI逻辑 vs 非EI逻辑：EI不改变增益，只改变显示，通过"欺骗"引导你调参数。非EI（如降ISO到基准以下）真正改变增益，多了噪点随之变化和动态范围缩小的影响。但底层逻辑一样：都是通过一步转接手段引导用户改变其他参数。

### 4.4 在基准ISO上调光圈 = EI逻辑

在ISO 800不动，直接看波形图调光圈改变进光量，和EI模式的最终效果完全一致。只是跳过了监看显示"欺骗"那一步，直接自己做判断。

▶ 拍摄时不需要切EI模式，固定基准ISO + 看波形图调光圈即可。

### 4.5 拓展ISO（低于基准）的特殊性

Canon的基准ISO 800本身包含12dB增益。降ISO到200是真正降低内建增益，不是EI逻辑。即使光圈快门不变，画面亮度也会直接变化。

关键发现：从800降到200后补光圈回正常亮度，这个补光圈的过程本身就在多给光，等于自动完成了向右曝光。低增益 + 多进光量同时作用，暗部更干净。不需要额外再做一次向右曝光。

代价：高光余量减少。注意监控波形图高光不要擞顶。

### 4.6 向右曝光的本质

故意让画面比正常曝光亮一点，把更多信号推离噪底，后期再压回来。看波形图把中灰从38%推到45-50%，但不要碰顶。

底层逻辑：不管通过什么过程，最后进光量增加，画面纯净度就会提高。

▶ 大多数场景养成向右曝光习惯。高光紧张的场景（大面积天空、强反光）不要向右。

### 4.7 增加增益换取高光

从800升到1600，画面变亮，收光圈减少进光，中灰被压低，高光余量变大。但这是双重代价：暗部空间变小且噪点更多。如果高光压力不是特别大，优先用基准ISO配合收光圈就够。

### 4.8 EI、降ISO、向右曝光的关系总结

EI是"骗你向右曝光"：增益不变，只改显示，不会出现降低增益+向右曝光的双重效果。降ISO到基准以下是"真降增益同时自带向右曝光"：补光圈回正常的过程已经在多给光了。向右曝光是它们共同指向的最终动作。

## 五、降噪与动态范围

降噪不会增加动态范围总量，但会让可用动态范围"看起来"更大——噪点被抹掉后信噪比提高，测试数值上升。代价是高频细节被同时抹掉。

C50有两种机内降噪：Spatial Filter（空间滤波，类似轻微柔焦）和Frame Correlation（帧间对比）。开得越高画面越干净但越软。

RAW下：机内降噪不生效，留给后期在Resolve里精确控制。这是Canon RAW测试数据看起来噪点很高的原因——不是传感器差，而是没做降噪。

XF-AVC下：机内降噪默认介入。光线充足时关掉或调低保留最大细节，低光时适当开一点。不要无脑开到最高。

▶ 看动态范围测试对比时，关注测试条件是否统一：RAW还是压缩编码，机内降噪开还是关。条件不一样数据没有可比性。

## 六、CLog2 vs CLog3

CLog2：动态范围最大（15+档），后期空间最大，但画面非常平，调色敏感度更高。

CLog3：动态范围略少（14档），但中间调分布更自然，套LUT还原更顺滑、操作容错更高。

你的选择：统一用CLog2。Canon的色彩科学让CLog2直接还原后效果也很好，不需要在两套Log之间切换和匹配。需要精修就精修，需要快出就套LUT直接交。一套曲线走天下，工作流最干净。

## 七、ND偏色的RAW校正工作流

铁头可变ND偏色较大，但RAW保留了完整色彩信息，只要没有导致某个通道过曝或严重欠曝，后期都能拉回来。

具体操作：每次装上ND或调整档位后，拍一张白纸或灰卡作为参考帧。后期在Resolve里对参考帧做白平衡校正，记录偏移量，复制到同档位的所有素材。

更简单的方法：C50的自定义按键可以设置为"设置白平衡"，装好ND后对着白纸按一下就完成机内白平衡校正。

▶ 尽量固定一个偏色可控的档位拍，避免拍摄中途调ND。

## 八、后期设备要求

解码负担：RAW每帧需要实时去马赛克和色彩还原，计算量远大于播放H.264。M3 Max应对4K RAW LT没问题，但堆叠多层调色或特效时会有压力。

软件选择：DaVinci Resolve对Cinema RAW Light原生深度支持，FCP支持有限。Resolve是RAW工作流的更合理选择。

## 九、场景决策速查表

| 场景 | 推荐方案 | 理由 |
| --- | --- | --- |
| 叙事短片/个人作品 | RAW LT S35 30p + CLog2 | 后期空间最大，存储与画质最优平衡 |
| 纪录片/纪实 | RAW LT S35 30p + CLog2 | 光线不可控，需后期挝回空间 |
| 商业快速交付 | XF-AVC Intra 4K + CLog2 | 剪辑流畅，兼容性最好 |
| 日常拍摄/存储敏感 | XF-HEVC S 4K + CLog2 | 存储压力小，画质与264差距很小 |
| 120p慢动作 | XF-HEVC S + CLog2 | 264最高只到60p，120p必须用265 |
| 需更紧构图（固定） | 直接切S35 | XF-AVC下有编码红利，画质最优 |
| 需灵活裁切/后期重构图 | 录7K + 后期裁切 | 保留最大灵活性 |
| 60p需裁切 | 4K + 机内数码变焦 | 7K不支持60p，数码变焦是唯一利用余量的方式 |
| 低光/暗部要求极高 | 降ISO至200 + 开大光圈补回正常 | 低增益+多进光自动完成双重优化 |
| 高光压力大 | 基准ISO + 收光圈/加ND | 优先不加增益，避免双重代价 |

// ===== State =====
const STORAGE_KEY = 'workflow-checklist-data';
let state = { projects: [], activeProjectId: null, view: 'workflow', archive: null };

// Template keys that can be used as modules in a project
const MODULE_KEYS = ['preproduction', 'shooting', 'editing', 'distribution'];
const MODULE_SHORT_NAMES = {
  preproduction: '前期筹备',
  shooting: '拍摄',
  editing: '剪辑',
  distribution: '宣发',
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      state = JSON.parse(raw);
      // Migrate old format
      state.projects.forEach(p => migrateProject(p));
      if (!state.view) state.view = 'workflow';
      ensureArchive();
      return;
    }
  } catch(e) {}
  // Default: empty project list, user creates first project via wizard
  state = { projects: [], activeProjectId: null, view: 'workflow', archive: null };
  ensureArchive();
}

function ensureArchive() {
  if (!state.archive || !Array.isArray(state.archive.records)) {
    state.archive = {
      records: ARCHIVE_SEED.map(r => ({
        id: genIdFor(r.name),
        name: r.name,
        amount: r.amount,
        status: r.status,
        date: '',
        type: '',
        client: '',
        note: '',
      })),
      sort: { key: 'order', dir: 'asc' },
    };
  }
  const ensureStore = (k, defaultSort) => {
    if (!state[k] || typeof state[k] !== 'object') state[k] = {};
    if (!Array.isArray(state[k].records)) state[k].records = [];
    if (!state[k].sort || typeof state[k].sort !== 'object') state[k].sort = defaultSort;
  };
  ensureStore('callsheets', { key: 'date', dir: 'desc' });
  ensureStore('shotlogs', { key: 'date', dir: 'desc' });
  ensureStore('equipment', { key: 'name', dir: 'asc' });
  ensureStore('shotlists', { key: 'scene', dir: 'asc' });
  ensureStore('links', { key: 'order', dir: 'asc' });
  // Knowledge base uses { articles: [] } not { records }
  if (!state.knowledge || typeof state.knowledge !== 'object') state.knowledge = {};
  if (!Array.isArray(state.knowledge.articles)) state.knowledge.articles = [];
  if (state.knowledge.articles.length === 0) {
    const now = new Date().toISOString();
    state.knowledge.articles = [
      { id: genIdFor('kb_general'), title: '影视技术通识知识库', category: '通识',
        equipmentId: null, content: KB_SEED_GENERAL, createdAt: now, updatedAt: now },
      { id: genIdFor('kb_c50'), title: 'Canon EOS C50 完整指南', category: '器材指南',
        equipmentId: null, equipmentName: 'Canon EOS C50', content: KB_SEED_C50,
        createdAt: now, updatedAt: now },
    ];
  }
  // Seed the portfolio link if links is empty
  if (state.links.records.length === 0) {
    state.links.records.push({
      id: genIdFor('portfolio'),
      title: '作品集',
      url: 'https://ddphotography.xyz',
      icon: '📸',
      description: 'DD Photography 个人作品集',
      category: '作品集',
      color: '#c8a44e',
    });
  }
  // Also harden archive
  if (!Array.isArray(state.archive?.records)) {
    state.archive = state.archive || {};
    state.archive.records = state.archive?.records || [];
  }
  if (!state.archive.sort) state.archive.sort = { key: 'order', dir: 'asc' };
}

function genIdFor(seed) {
  return (Date.now().toString(36) + Math.random().toString(36).slice(2, 6) + (seed||'').length);
}

// ===== Amount parser: supports 1w=10000, 1.5k=1500, 万/千, commas =====
function parseAmount(s) {
  if (s === null || s === undefined) return null;
  let str = String(s).trim().toLowerCase().replace(/[,，\s¥￥元]/g, '');
  if (str === '') return null;
  str = str.replace(/万/g, 'w').replace(/千/g, 'k');
  const m = str.match(/^(-?\d*\.?\d+)([wk])?$/);
  if (!m) { const n = Number(str); return isNaN(n) ? null : n; }
  const n = Number(m[1]);
  if (isNaN(n)) return null;
  if (m[2] === 'w') return n * 10000;
  if (m[2] === 'k') return n * 1000;
  return n;
}

// ===== Generic inline-editable cell =====
function makeCellEditable(td, { getValue, setValue, type = 'text', options, optionsFn, placeholder }) {
  td.classList.add('cell-edit');
  if (type === 'select' || type === 'project') td.classList.add('cell-select');
  td.addEventListener('click', (e) => {
    if (td.querySelector('input, select')) return;
    const cur = getValue();
    let input;
    if (type === 'select' || type === 'project') {
      input = document.createElement('select');
      let opts = optionsFn ? optionsFn() : (options || []);
      if (type === 'project') {
        // Merge project names from projects + archive records + existing value
        const names = new Set(['']);
        (state.projects || []).forEach(p => { if (p.title) names.add(p.title); });
        (state.archive?.records || []).forEach(r => { if (r.name) names.add(r.name); });
        if (cur) names.add(cur);
        opts = Array.from(names);
      }
      opts.forEach(o => {
        const opt = document.createElement('option');
        opt.value = o;
        opt.textContent = o === '' ? '（未选）' : o;
        if (String(o) === String(cur ?? '')) opt.selected = true;
        input.appendChild(opt);
      });
    } else {
      input = document.createElement('input');
      if (type === 'number' || type === 'amount') {
        input.type = 'text';
        input.inputMode = 'decimal';
      } else {
        input.type = (type === 'date') ? 'date' : 'text';
      }
      input.value = (cur === null || cur === undefined) ? '' : cur;
      if (placeholder) input.placeholder = placeholder;
    }
    input.className = 'inline-edit-input';
    td.innerHTML = '';
    td.appendChild(input);
    input.focus();
    if (input.select && type !== 'date') input.select();
    let committed = false;
    const commit = () => {
      if (committed) return;
      committed = true;
      let v = input.value;
      if (type === 'number' || type === 'amount') v = parseAmount(v);
      setValue(v);
    };
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', (ev) => {
      if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); }
      else if (ev.key === 'Escape') { committed = true; input.blur(); }
    });
    if (type === 'select' || type === 'project') {
      input.addEventListener('change', () => input.blur());
    }
  });
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function todayISO() {
  return new Date().toISOString().split('T')[0];
}

// Migrate old project format (sections directly on project) to new modules format
function migrateProject(p) {
  if (p.modules) return; // already new format
  const oldSections = p.sections || [];
  const oldNotes = p.notes || [];
  // Guess module key from category
  let key = 'editing';
  const cat = (p.category || '').toUpperCase();
  if (cat.includes('PRE-PRODUCTION')) key = 'preproduction';
  else if (cat.includes('PRODUCTION') && !cat.includes('POST')) key = 'shooting';
  else if (cat.includes('DISTRIBUTION') || cat.includes('MARKETING')) key = 'distribution';

  p.modules = [{
    id: genId(),
    key: key,
    category: p.category || '',
    title: p.title || '未命名',
    subtitle: p.subtitle || '',
    sections: oldSections,
    notes: oldNotes,
  }];
  p.activeModuleId = p.modules[0].id;
  // Add default metadata
  if (!p.createdDate) p.createdDate = todayISO();
  if (!p.projectType) p.projectType = '';
  if (!p.director) p.director = '';
  if (!p.producer) p.producer = '';
  if (!p.client) p.client = '';
  if (!p.budget) p.budget = '';
  if (!p.shootingStart) p.shootingStart = '';
  if (!p.shootingEnd) p.shootingEnd = '';
  if (!p.deliveryDate) p.deliveryDate = '';
  if (!p.runtime) p.runtime = '';
  if (!p.status) p.status = '筹备中';
  if (!p.description) p.description = '';
  delete p.sections;
  delete p.notes;
  delete p.category;
  delete p.subtitle;
  delete p.note;
}

// Create a module instance from a template
function createModuleFromTemplate(key) {
  const tpl = JSON.parse(JSON.stringify(TEMPLATES[key]));
  const mod = {
    id: genId(),
    key: key,
    category: tpl.category || '',
    title: tpl.title || MODULE_SHORT_NAMES[key] || '模块',
    subtitle: tpl.subtitle || '',
    sections: tpl.sections || [],
    notes: tpl.notes || [],
  };
  mod.sections.forEach(s => {
    s.id = genId();
    s.steps.forEach(st => { st.id = genId(); });
  });
  mod.notes.forEach(n => { n.id = genId(); });
  return mod;
}

// Create a new project with metadata and selected modules
function createProject(meta, moduleKeys) {
  const project = {
    id: genId(),
    title: meta.title || '未命名项目',
    createdDate: meta.createdDate || todayISO(),
    projectType: meta.projectType || '',
    genre: meta.genre || '',
    director: meta.director || '',
    producer: meta.producer || '',
    client: meta.client || '',
    budget: meta.budget || '',
    shootingStart: meta.shootingStart || '',
    shootingEnd: meta.shootingEnd || '',
    deliveryDate: meta.deliveryDate || '',
    runtime: meta.runtime || '',
    status: meta.status || '筹备中',
    description: meta.description || '',
    modules: [],
    activeModuleId: null,
  };
  moduleKeys.forEach(key => {
    project.modules.push(createModuleFromTemplate(key));
  });
  if (project.modules.length > 0) project.activeModuleId = project.modules[0].id;
  return project;
}

function getActiveModule(project) {
  if (!project || !project.modules) return null;
  return project.modules.find(m => m.id === project.activeModuleId) || project.modules[0] || null;
}

function getActiveProject() {
  return state.projects.find(p => p.id === state.activeProjectId);
}

// ===== Rendering =====
function render() {
  applyView();
  renderSidebar();
  if (state.view === 'archive') renderArchive();
  else if (state.view === 'callsheet') renderCallsheet();
  else if (state.view === 'shotlog') renderShotlog();
  else if (state.view === 'equipment') renderEquipment();
  else if (state.view === 'shotlist') renderShotlist();
  else if (state.view === 'calendar') renderCalendar();
  else if (state.view === 'links') renderLinks();
  else if (state.view === 'kb') renderKB();
  else renderMain();
  saveState();
}

function applyView() {
  const views = {
    workflow: { el: 'workflowView', heading: '项目列表', addBtn: '+ 新建项目' },
    archive: { el: 'archiveView', heading: '项目档案', addBtn: '+ 新增记录' },
    callsheet: { el: 'callsheetView', heading: '通告单', addBtn: '+ 新增通告' },
    shotlog: { el: 'shotlogView', heading: '场记', addBtn: '+ 新增场记' },
    equipment: { el: 'equipmentView', heading: '器材清单', addBtn: '+ 新增器材' },
    shotlist: { el: 'shotlistView', heading: '镜头清单', addBtn: '+ 新增镜头' },
    calendar: { el: 'calendarView', heading: '日历', addBtn: '+ 新增项目' },
    links: { el: 'linksView', heading: '常用链接', addBtn: '+ 新增链接' },
    kb: { el: 'kbView', heading: '知识库', addBtn: '+ 新建文章' },
  };
  const newProjBtn = document.getElementById('newProjectBtn');
  const heading = document.getElementById('sidebarHeading');
  document.querySelectorAll('.view-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.view === state.view);
  });
  Object.entries(views).forEach(([k, v]) => {
    const el = document.getElementById(v.el);
    if (el) el.style.display = (state.view === k) ? '' : 'none';
  });
  const cur = views[state.view] || views.workflow;
  if (newProjBtn) newProjBtn.textContent = cur.addBtn;
  if (heading) heading.textContent = cur.heading;
}

function renderSidebar() {
  const list = document.getElementById('sidebarList');
  list.innerHTML = '';

  if (state.view !== 'workflow') {
    const summary = document.createElement('div');
    summary.style.cssText = 'padding: 16px; color: var(--text-dim); font-size: 13px; line-height: 1.9;';
    let html = `<div style="color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px;">概览</div>`;
    if (state.view === 'archive') {
      const recs = state.archive?.records || [];
      const total = recs.reduce((s, r) => s + (Number(r.amount) || 0), 0);
      const paid = recs.filter(r => r.status === '已收款').length;
      const unpaid = recs.filter(r => r.status !== '已收款').length;
      html += `
        <div>共 <b style="color:var(--text)">${recs.length}</b> 个项目</div>
        <div>已收款 <b style="color:var(--success)">${paid}</b> · 未收款 <b style="color:var(--danger)">${unpaid}</b></div>
        <div style="margin-top:6px">收款总额 <b style="color:var(--accent)">¥${total.toLocaleString()}</b></div>`;
    } else if (state.view === 'callsheet') {
      const recs = state.callsheets?.records || [];
      html += `<div>共 <b style="color:var(--text)">${recs.length}</b> 条通告</div>`;
    } else if (state.view === 'shotlog') {
      const recs = state.shotlogs?.records || [];
      const ok = recs.filter(r => r.take_ok === 'OK').length;
      html += `<div>共 <b style="color:var(--text)">${recs.length}</b> 条场记</div><div>OK: <b style="color:var(--success)">${ok}</b></div>`;
    } else if (state.view === 'equipment') {
      const recs = state.equipment?.records || [];
      const owned = recs.filter(r => r.ownership === '自有').length;
      const rented = recs.filter(r => r.ownership === '租赁').length;
      html += `<div>共 <b style="color:var(--text)">${recs.length}</b> 件器材</div><div>自有 <b>${owned}</b> · 租赁 <b>${rented}</b></div>`;
    } else if (state.view === 'shotlist') {
      const recs = state.shotlists?.records || [];
      const done = recs.filter(r => r.done).length;
      html += `<div>共 <b>${recs.length}</b> 个镜头</div><div>已拍 <b style="color:var(--success)">${done}</b> · 剩余 <b style="color:var(--danger)">${recs.length - done}</b></div>`;
    } else if (state.view === 'calendar') {
      html += `<div style="color:var(--text-muted)">日历显示所有通告、档案收款日期和项目截止日。</div>`;
    } else if (state.view === 'links') {
      const recs = state.links?.records || [];
      const cats = new Set(recs.map(r => r.category).filter(Boolean));
      html += `<div>共 <b>${recs.length}</b> 个链接</div><div>分类 <b>${cats.size}</b></div>`;
    } else if (state.view === 'kb') {
      const arts = state.knowledge?.articles || [];
      const cats = new Set(arts.map(a => a.category).filter(Boolean));
      html += `<div>共 <b>${arts.length}</b> 篇文章</div><div>分类 <b>${cats.size}</b></div>`;
    }
    summary.innerHTML = html;
    list.appendChild(summary);
    return;
  }

  const isFinished = p => p.status === '已完成' || p.status === '已归档';
  const active = state.projects.filter(p => !isFinished(p));
  const done = state.projects.filter(p => isFinished(p));

  function renderGroup(label, projects) {
    if (projects.length === 0) return;
    const groupLabel = document.createElement('div');
    groupLabel.className = 'sidebar-group-label';
    groupLabel.textContent = label;
    list.appendChild(groupLabel);

    projects.forEach(p => {
      const item = document.createElement('div');
      item.className = 'sidebar-item'
        + (p.id === state.activeProjectId ? ' active' : '')
        + (isFinished(p) ? ' completed-project' : '');
      item.innerHTML = `
        <span class="project-name">${esc(p.title)}</span>
        <button class="delete-project" title="删除项目">×</button>
      `;
      const nameEl = item.querySelector('.project-name');
      nameEl.addEventListener('dblclick', (e) => {
        e.stopPropagation();
        nameEl.contentEditable = 'true';
        nameEl.focus();
        selectAll(nameEl);
      });
      nameEl.addEventListener('blur', () => {
        nameEl.contentEditable = 'false';
        p.title = nameEl.textContent.trim() || '未命名项目';
        saveState();
        renderSidebar();
      });
      nameEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); nameEl.blur(); }
      });
      item.querySelector('.delete-project').addEventListener('click', (e) => {
        e.stopPropagation();
        if (state.projects.length === 1) return alert('至少保留一个项目');
        if (!confirm(`确定删除「${p.title}」？`)) return;
        state.projects = state.projects.filter(x => x.id !== p.id);
        if (state.activeProjectId === p.id) {
          state.activeProjectId = state.projects[0].id;
        }
        render();
      });
      item.addEventListener('click', () => {
        state.activeProjectId = p.id;
        render();
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').classList.remove('active');
      });
      list.appendChild(item);
    });
  }

  renderGroup('进行中', active);
  renderGroup('已完成', done);
}

// ===== Data Grids (档案/通告/场记/器材) =====
const gridFilters = {
  archive: { q: '', status: 'all', year: 'all', client: 'all' },
  callsheet: { q: '' },
  shotlog: { q: '' },
  equipment: { q: '', type: 'all' },
  shotlist: { q: '' },
};

// Generic grid renderer — builds stats + toolbar + editable table/cards
function renderGrid({ wrapId, store, columns, statsFn, matchFn, filters, header, addNew, extraToolbar, rowActions, groupBy }) {
  ensureArchive();
  const wrap = document.getElementById(wrapId);
  const recs = (store && store.records) || [];
  if (store && !store.sort) store.sort = { key: columns[0]?.key || 'id', dir: 'asc' };
  let view = recs.slice();
  if (matchFn) view = view.filter(r => matchFn(r, filters));

  const sortKey = store.sort?.key;
  const sortDir = store.sort?.dir || 'asc';
  if (sortKey) {
    view.sort((a, b) => {
      let va = a[sortKey], vb = b[sortKey];
      if (va === null || va === undefined) va = '';
      if (vb === null || vb === undefined) vb = '';
      if (typeof va === 'number' || typeof vb === 'number') { va = Number(va)||0; vb = Number(vb)||0; }
      if (va < vb) return sortDir === 'asc' ? -1 : 1;
      if (va > vb) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });
  }

  const stats = statsFn ? statsFn(recs) : [];
  const statsHtml = stats.length ? `<div class="archive-stats">${stats.map(s => `
    <div class="stat-card ${s.color||''}">
      <div class="stat-label">${s.label}</div>
      <div class="stat-value">${s.value}</div>
    </div>`).join('')}</div>` : '';

  const arrow = (k) => sortKey === k ? `<span class="sort-arrow">${sortDir === 'asc' ? '▲' : '▼'}</span>` : `<span class="sort-arrow">⇅</span>`;
  const sortActive = (k) => sortKey === k ? ' sort-active' : '';

  wrap.innerHTML = `
    <div class="archive-header">
      <div>
        <div class="archive-title">${header.icon} ${header.title}</div>
        <div class="archive-title-sub">${header.subtitle}</div>
      </div>
    </div>
    ${statsHtml}
    <div class="archive-toolbar">
      <input type="text" class="archive-search" id="${wrapId}Search" placeholder="🔍 搜索..." value="${esc(filters.q || '')}">
      ${extraToolbar || ''}
      <button class="archive-btn" data-act="export">📥 导出CSV</button>
      <button class="archive-btn" data-act="paste" title="从 Excel/表格粘贴多行">📋 粘贴</button>
      <button class="archive-btn primary" data-act="add">${header.addLabel || '+ 新增'}</button>
    </div>
    ${view.length === 0 ? `<div class="archive-empty">${recs.length === 0 ? '暂无记录，点击右上 "+" 新增一条' : '没有匹配的记录'}</div>` : `
    <table class="archive-table">
      <thead>
        <tr>
          ${columns.map(c => `<th data-sort="${c.key}" class="${sortActive(c.key)}" style="${c.width?'width:'+c.width+';':''}${c.align?'text-align:'+c.align+';':''}">${c.label} ${arrow(c.key)}</th>`).join('')}
          <th style="width: 80px; cursor: default;"></th>
        </tr>
      </thead>
      <tbody id="${wrapId}Tbody"></tbody>
    </table>
    <div class="archive-cards" id="${wrapId}Cards"></div>
    `}
  `;

  // Render rows with editable cells — with optional groupBy
  const tbody = document.getElementById(wrapId + 'Tbody');
  const cards = document.getElementById(wrapId + 'Cards');

  // If groupBy, inject group header rows before groups of records
  if (groupBy && tbody && view.length > 0) {
    const groups = new Map();
    view.forEach(r => {
      const k = groupBy(r);
      if (!groups.has(k)) groups.set(k, []);
      groups.get(k).push(r);
    });
    const collapsedKey = wrapId + '_collapsed';
    const collapsed = (() => { try { return new Set(JSON.parse(localStorage.getItem(collapsedKey) || '[]')); } catch(e) { return new Set(); } })();
    const saveCollapsed = () => localStorage.setItem(collapsedKey, JSON.stringify([...collapsed]));
    const colCount = columns.length + 1;
    groups.forEach((recs, gkey) => {
      const headerTr = document.createElement('tr');
      headerTr.className = 'grid-group-row';
      const isCollapsed = collapsed.has(gkey);
      headerTr.innerHTML = `<td colspan="${colCount}" style="background: rgba(200,164,78,0.08); padding: 10px 12px; cursor: pointer; font-weight: 600; color: var(--accent); user-select: none;">
        <span style="display:inline-block; width:14px">${isCollapsed ? '▶' : '▼'}</span>
        ${esc(gkey)} <span style="color:var(--text-muted); font-weight:normal; font-size:12px; margin-left:8px">${recs.length} 条</span>
      </td>`;
      headerTr.addEventListener('click', () => {
        if (collapsed.has(gkey)) collapsed.delete(gkey); else collapsed.add(gkey);
        saveCollapsed(); render();
      });
      tbody.appendChild(headerTr);
      if (!isCollapsed) recs.forEach(rec => appendRowAndCard(rec, { tableOnly: true }));
    });
    // Cards for mobile (flat, no grouping)
    if (cards) view.forEach(rec => appendRowAndCard(rec, { cardOnly: true }));
    // Wire toolbar/sort below skipping per-record handling
    bindToolbar();
    return;
  }

  view.forEach(rec => appendRowAndCard(rec));
  bindToolbar();
  return;

  function appendRowAndCard(rec, opts) {
    opts = opts || {};
    if (tbody && !opts.cardOnly) {
      const tr = document.createElement('tr');
      tr.dataset.id = rec.id;
      columns.forEach(col => {
        const td = document.createElement('td');
        if (col.align) td.style.textAlign = col.align;
        const v = rec[col.key];
        td.innerHTML = col.render ? col.render(v, rec) : (v ? esc(String(v)) : '<span style="color:var(--text-muted)">—</span>');
        if (col.edit !== false) {
          makeCellEditable(td, {
            getValue: () => rec[col.key],
            setValue: (nv) => { rec[col.key] = nv; if (col.afterSet) col.afterSet(rec, nv); saveState(); render(); },
            type: col.type || 'text',
            options: col.options,
            optionsFn: col.optionsFn,
          });
        }
        tr.appendChild(td);
      });
      const actions = document.createElement('td');
      const rowActs = (rowActions || []).map((ra, i) =>
        `<button class="row-action-btn" data-ract="${i}" title="${ra.title||ra.label}">${ra.label}</button>`).join('');
      actions.innerHTML = `<div class="row-actions">${rowActs}<button class="row-action-btn delete" data-act="delete">删</button></div>`;
      actions.querySelectorAll('button[data-ract]').forEach(btn => {
        btn.addEventListener('click', (e) => { e.stopPropagation(); rowActions[+btn.dataset.ract].action(rec); });
      });
      actions.querySelector('button[data-act="delete"]').addEventListener('click', (e) => {
        e.stopPropagation();
        if (!confirm('确定删除这条记录？')) return;
        store.records = store.records.filter(r => r.id !== rec.id);
        saveState();
        render();
      });
      tr.appendChild(actions);
      tbody.appendChild(tr);
    }
    if (cards && !opts.tableOnly) {
      const card = document.createElement('div');
      card.className = 'archive-card';
      card.dataset.id = rec.id;
      let inner = '';
      columns.forEach(col => {
        const v = rec[col.key];
        const disp = col.render ? col.render(v, rec) : (v !== null && v !== undefined && v !== '' ? esc(String(v)) : '<span style="color:var(--text-muted)">—</span>');
        inner += `<div style="display:flex; justify-content:space-between; align-items:center; gap:10px; padding:6px 0; border-bottom: 1px dashed var(--border);">
          <span style="color:var(--text-muted); font-size:11px; text-transform:uppercase; letter-spacing:1px;">${col.label}</span>
          <span data-field="${col.key}" class="${col.edit !== false ? 'cell-edit' : ''} ${col.type==='select'?'cell-select':''}" style="flex:1; text-align:right; padding:4px 6px; border-radius:4px;">${disp}</span>
        </div>`;
      });
      const cardRowActs = (rowActions || []).map((ra, i) =>
        `<button class="row-action-btn" data-ract="${i}">${ra.label}</button>`).join('');
      inner += `<div class="archive-card-actions">${cardRowActs}<button class="row-action-btn delete" data-act="delete">删除记录</button></div>`;
      card.innerHTML = inner;
      columns.forEach(col => {
        if (col.edit === false) return;
        const span = card.querySelector(`[data-field="${col.key}"]`);
        if (span) makeCellEditable(span, {
          getValue: () => rec[col.key],
          setValue: (nv) => { rec[col.key] = nv; if (col.afterSet) col.afterSet(rec, nv); saveState(); render(); },
          type: col.type || 'text',
          options: col.options,
          optionsFn: col.optionsFn,
        });
      });
      card.querySelectorAll('button[data-ract]').forEach(btn => {
        btn.addEventListener('click', (e) => { e.stopPropagation(); rowActions[+btn.dataset.ract].action(rec); });
      });
      card.querySelector('button[data-act="delete"]').addEventListener('click', (e) => {
        e.stopPropagation();
        if (!confirm('确定删除这条记录？')) return;
        store.records = store.records.filter(r => r.id !== rec.id);
        saveState();
        render();
      });
      cards.appendChild(card);
    }
  }

  function bindToolbar() {
    const search = document.getElementById(wrapId + 'Search');
    if (search) {
      search.addEventListener('input', (e) => {
        filters.q = e.target.value;
        render();
        const s = document.getElementById(wrapId + 'Search');
        if (s) { s.focus(); s.setSelectionRange(s.value.length, s.value.length); }
      });
    }
    wrap.querySelectorAll('.archive-btn[data-act="add"]').forEach(b => b.addEventListener('click', addNew));
    wrap.querySelectorAll('.archive-btn[data-act="export"]').forEach(b => b.addEventListener('click', () => exportGridCSV(header.title, columns, recs)));
    wrap.querySelectorAll('.archive-btn[data-act="paste"]').forEach(b => b.addEventListener('click', () => openPasteDialog(store, columns, header.title)));
    wrap.querySelectorAll('th[data-sort]').forEach(th => {
      th.addEventListener('click', () => {
        const key = th.dataset.sort;
        if (store.sort.key === key) store.sort.dir = store.sort.dir === 'asc' ? 'desc' : 'asc';
        else { store.sort.key = key; store.sort.dir = 'asc'; }
        saveState();
        render();
      });
    });
  }
}

function exportGridCSV(title, columns, recs) {
  const header = columns.map(c => c.label);
  const rows = recs.map(r => columns.map(c => {
    const v = r[c.key];
    return (v === null || v === undefined) ? '' : v;
  }));
  const escapeCsv = (v) => {
    const s = (v === null || v === undefined) ? '' : String(v);
    if (/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
    return s;
  };
  const csv = '\uFEFF' + [header, ...rows].map(row => row.map(escapeCsv).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${title}_${todayISO()}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ===== Paste Excel rows =====
function openPasteDialog(store, columns, title) {
  const cols = columns.filter(c => c.edit !== false);
  const colList = cols.map(c => c.label).join(' | ');
  const text = prompt(`从 Excel/表格复制数据后粘贴到这里：\n每行一条记录，列用 Tab 或逗号分隔。\n列顺序需要匹配：\n\n${colList}\n\n（空行忽略）`);
  if (!text) return;
  const rows = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  let added = 0;
  rows.forEach(line => {
    const parts = line.includes('\t') ? line.split('\t') : line.split(/[,，]/);
    const rec = { id: genId() };
    cols.forEach((c, i) => {
      let v = (parts[i] || '').trim();
      if (c.type === 'number' || c.type === 'amount') v = parseAmount(v);
      else if (c.type === 'date' && /^\d{4}\/\d{1,2}\/\d{1,2}$/.test(v)) v = v.replace(/\//g, '-').split('-').map((p, i) => i === 0 ? p : p.padStart(2, '0')).join('-');
      rec[c.key] = v;
    });
    // Set common defaults by store
    if (store === state.archive && !rec.status) rec.status = rec.amount > 0 ? '已收款' : '未收款';
    store.records.unshift(rec);
    added++;
  });
  if (added > 0) {
    saveState();
    render();
    alert(`已导入 ${added} 条记录`);
  }
}

// ===== Local JSON backup (export / import) =====
function exportBackup() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `workflow-checklist-backup_${todayISO()}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function importBackup(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data || typeof data !== 'object') throw new Error('invalid json');
      if (!confirm('导入将覆盖当前所有数据（包括云端），确定？')) return;
      state = data;
      ensureArchive();
      if (!state.view) state.view = 'workflow';
      saveState();
      render();
      alert('导入成功');
    } catch (e) {
      alert('导入失败：' + e.message);
    }
  };
  reader.readAsText(file);
}
function openBackupMenu() {
  const choice = prompt('本地备份：输入 1 导出，2 导入，其他取消');
  if (choice === '1') exportBackup();
  else if (choice === '2') {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = '.json,application/json';
    input.onchange = () => { if (input.files[0]) importBackup(input.files[0]); };
    input.click();
  }
}

      <div><div style="color: #8a7b4f; font-size: 12px; letter-spacing: 2px; margin-bottom: 4px;">拍摄地点</div><div style="font-size: 18px; font-weight: 600;">${esc(rec.location || '—')}</div></div>
