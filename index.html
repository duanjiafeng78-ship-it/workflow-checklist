<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="检查单">
<meta name="theme-color" content="#111111">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>工作流检查单</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #111111;
  --sidebar-bg: #181818;
  --card-bg: #1e1e1e;
  --border: #2a2a2a;
  --text: #e5e5e5;
  --text-dim: #888;
  --text-muted: #555;
  --accent: #c8a44e;
  --accent-dim: rgba(200,164,78,0.15);
  --danger: #e74c3c;
  --success: #2ecc71;
  --hover: #252525;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
}

/* ===== Sidebar ===== */
.sidebar {
  width: 260px;
  min-width: 260px;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  transition: transform 0.3s;
  z-index: 100;
}

.sidebar-header {
  padding: 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.sidebar-header h2 {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
}

.sidebar-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.sidebar-item {
  padding: 12px 16px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2px;
  transition: background 0.15s;
}

.sidebar-item:hover { background: var(--hover); }
.sidebar-item.active { background: var(--accent-dim); color: var(--accent); }

.sidebar-item .project-name {
  flex: 1;
  font-size: 14px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.sidebar-item .project-name[contenteditable="true"] {
  outline: none;
  border-bottom: 1px solid var(--accent);
}

.sidebar-item .delete-project {
  opacity: 0;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 16px;
  padding: 2px 6px;
  border-radius: 4px;
  transition: opacity 0.15s, color 0.15s;
}

.sidebar-item:hover .delete-project { opacity: 1; }
.sidebar-item .delete-project:hover { color: var(--danger); }

.sidebar-group-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 12px 16px 4px;
  user-select: none;
}
.sidebar-group-label:first-child { padding-top: 8px; }

.sidebar-item.completed-project .project-name {
  color: var(--text-muted);
  text-decoration: line-through;
  text-decoration-color: rgba(200,164,78,0.3);
}

.sidebar-footer {
  padding: 12px;
  border-top: 1px solid var(--border);
}

.sidebar-footer .btn + .btn { margin-top: 6px; }

.sync-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-muted);
  padding: 6px 12px 0;
}
.sync-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #888;
  flex-shrink: 0;
}
.sync-dot.connected { background: #2ecc71; }
.sync-dot.syncing { background: #f1c40f; animation: pulse-dot 1s infinite; }
.sync-dot.error { background: #e74c3c; }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Sync modal form */
.sync-form label { display: block; font-size: 12px; color: var(--text-muted); margin: 10px 0 4px; }
.sync-form input[type="text"] {
  width: 100%; padding: 8px 10px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 13px;
}
.sync-form input[type="text"]:focus { outline: none; border-color: var(--accent); }
.sync-form .hint { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
.sync-instructions {
  background: rgba(200,164,78,0.08); border: 1px solid rgba(200,164,78,0.2);
  border-radius: 8px; padding: 12px 14px; margin-bottom: 12px; font-size: 12px; line-height: 1.7;
  color: var(--text-dim);
}
.sync-instructions b { color: var(--accent); }
.sync-instructions ol { padding-left: 18px; }
.sync-connected-info {
  text-align: center; padding: 16px 0;
}
.sync-connected-info .big-check { font-size: 40px; margin-bottom: 8px; }
.sync-connected-info .connected-text { color: #2ecc71; font-size: 15px; font-weight: 600; }
.sync-connected-info .db-url { font-size: 11px; color: var(--text-muted); margin-top: 6px; word-break: break-all; }
.sync-disconnect-btn {
  margin-top: 14px; padding: 8px 20px; border-radius: 6px;
  border: 1px solid rgba(231,76,60,0.4); background: none; color: #e74c3c;
  cursor: pointer; font-size: 13px; transition: all 0.2s;
}
.sync-disconnect-btn:hover { background: rgba(231,76,60,0.15); }

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  padding: 10px;
  border: 1px dashed var(--border);
  border-radius: 8px;
  background: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
}

.btn:hover { border-color: var(--accent); color: var(--accent); }

/* ===== Main ===== */
.main {
  flex: 1;
  overflow-y: auto;
  height: 100vh;
}

.main-header {
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 50;
  padding: 24px 32px 16px;
  border-bottom: 1px solid var(--border);
}

.main-header .category {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.main-header .category[contenteditable="true"] {
  outline: none;
  border-bottom: 1px solid var(--accent);
  color: var(--text-dim);
}

.main-header h1 {
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 6px;
}

.main-header h1[contenteditable="true"] {
  outline: none;
  border-bottom: 1px solid var(--accent);
}

.main-header .subtitle {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 12px;
}

.main-header .subtitle[contenteditable="true"] {
  outline: none;
  border-bottom: 1px solid var(--accent);
}

.progress-bar-wrapper {
  display: flex;
  align-items: center;
  gap: 12px;
}

.progress-bar-track {
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s ease;
  width: 0%;
}

.progress-text {
  font-size: 13px;
  color: var(--text-dim);
  white-space: nowrap;
}

/* ===== Content ===== */
.content {
  padding: 0 32px 80px;
}

/* ===== Section ===== */
.section {
  margin-top: 24px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
}

.section.dragging-over { border-top: 2px solid var(--accent); }

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  cursor: pointer;
  user-select: none;
}

.section-header-left {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
  min-width: 0;
}

.section-drag-handle {
  cursor: grab;
  color: var(--text-muted);
  font-size: 14px;
  padding: 4px;
  opacity: 0;
  transition: opacity 0.15s;
}

.section:hover .section-drag-handle { opacity: 1; }
.section-drag-handle:active { cursor: grabbing; }

.section-titles {
  flex: 1;
  min-width: 0;
}

.section-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.section-label[contenteditable="true"] {
  outline: none;
  border-bottom: 1px solid var(--accent);
  color: var(--text-dim);
}

.section-title {
  font-size: 18px;
  font-weight: 600;
}

.section-title[contenteditable="true"] {
  outline: none;
  border-bottom: 1px solid var(--accent);
}

.section-header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.section-count {
  font-size: 14px;
  color: var(--text-dim);
}

.section-toggle {
  font-size: 12px;
  color: var(--text-muted);
  transition: transform 0.2s;
}

.section.collapsed .section-toggle { transform: rotate(-90deg); }
.section.collapsed .section-body { display: none; }

.section-delete {
  opacity: 0;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
  padding: 4px 6px;
  border-radius: 4px;
  transition: opacity 0.15s, color 0.15s;
}

.section:hover .section-delete { opacity: 1; }
.section-delete:hover { color: var(--danger); }

/* ===== Step ===== */
.step {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 8px;
  border-radius: 8px;
  transition: background 0.15s;
  position: relative;
}

.step:hover { background: var(--hover); }
.step.completed .step-text .step-name { color: var(--text-muted); text-decoration: line-through; }
.step.completed .step-text .step-desc { color: var(--text-muted); }

.step-drag-handle {
  cursor: grab;
  color: var(--text-muted);
  font-size: 12px;
  padding: 4px 2px;
  opacity: 0;
  transition: opacity 0.15s;
  margin-top: 2px;
}

.step:hover .step-drag-handle { opacity: 1; }
.step-drag-handle:active { cursor: grabbing; }

.step.dragging { opacity: 0.4; }
.step.drag-over { border-top: 2px solid var(--accent); margin-top: -2px; }

/* Checkbox */
.checkbox {
  width: 22px;
  height: 22px;
  min-width: 22px;
  border: 2px solid var(--text-muted);
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  margin-top: 1px;
}

.checkbox:hover { border-color: var(--accent); }

.checkbox.checked {
  background: var(--accent);
  border-color: var(--accent);
}

.checkbox.checked::after {
  content: '✓';
  color: #111;
  font-size: 14px;
  font-weight: 700;
}

.step-text {
  flex: 1;
  min-width: 0;
}

.step-name {
  font-size: 14px;
  color: var(--text);
  line-height: 1.5;
}

.step-name[contenteditable="true"] {
  outline: none;
  border-bottom: 1px solid var(--accent);
}

.step-desc {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 2px;
  line-height: 1.5;
}

.step-desc[contenteditable="true"] {
  outline: none;
  border-bottom: 1px solid var(--accent);
}

.step-delete {
  opacity: 0;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
  padding: 4px 6px;
  border-radius: 4px;
  transition: opacity 0.15s, color 0.15s;
  margin-top: 1px;
}

.step:hover .step-delete { opacity: 1; }
.step-delete:hover { color: var(--danger); }

/* Add buttons */
.add-step-btn, .add-section-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  margin: 8px 0;
  border: 1px dashed var(--border);
  border-radius: 8px;
  background: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
  width: 100%;
}

.add-step-btn:hover, .add-section-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.add-section-btn {
  margin-top: 24px;
}

/* Note box */
.notes-area { margin-top: 24px; }

.note-box {
  margin-bottom: 12px;
  padding: 16px 20px;
  border-radius: 8px;
  border-left: 3px solid var(--accent);
  background: rgba(200,164,78,0.08);
  position: relative;
  transition: opacity 0.3s, transform 0.3s;
}

.note-box[data-type="warning"] { border-left-color: #e67e22; background: rgba(230,126,34,0.08); }
.note-box[data-type="danger"]  { border-left-color: #e74c3c; background: rgba(231,76,60,0.08); }
.note-box[data-type="info"]    { border-left-color: #3498db; background: rgba(52,152,219,0.08); }
.note-box[data-type="success"] { border-left-color: #2ecc71; background: rgba(46,204,113,0.08); }
.note-box[data-type="note"]    { border-left-color: #c8a44e; background: rgba(200,164,78,0.08); }

.note-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.note-type-btn {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: none;
  cursor: pointer;
  color: var(--text-dim);
  transition: all 0.15s;
}

.note-type-btn:hover { border-color: var(--text-dim); color: var(--text); }

.note-box .note-title {
  font-size: 14px;
  font-weight: 600;
  flex: 1;
}

.note-box[data-type="warning"] .note-title { color: #e67e22; }
.note-box[data-type="danger"]  .note-title { color: #e74c3c; }
.note-box[data-type="info"]    .note-title { color: #3498db; }
.note-box[data-type="success"] .note-title { color: #2ecc71; }
.note-box[data-type="note"]    .note-title { color: #c8a44e; }

.note-box .note-title[contenteditable="true"] {
  outline: none;
  border-bottom: 1px solid currentColor;
}

.note-delete {
  opacity: 0;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
  padding: 2px 6px;
  border-radius: 4px;
  transition: opacity 0.15s, color 0.15s;
}

.note-box:hover .note-delete { opacity: 1; }
.note-delete:hover { color: var(--danger); }

.note-box .note-text {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.7;
}

.note-box .note-text[contenteditable="true"] {
  outline: none;
  border-bottom: 1px solid var(--text-muted);
}

.add-note-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  margin: 8px 0;
  border: 1px dashed var(--border);
  border-radius: 8px;
  background: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
  width: 100%;
}

.add-note-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Section complete celebration */
.section.section-complete .section-header {
  background: linear-gradient(90deg, rgba(200,164,78,0.08), rgba(46,204,113,0.08));
  border-radius: 8px;
  padding-left: 8px;
  padding-right: 8px;
}

.section.section-complete .section-count { color: var(--success); }

.section-complete-badge {
  display: inline-block;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  background: rgba(46,204,113,0.15);
  color: var(--success);
  margin-left: 8px;
  font-weight: 600;
}

/* Progress bar glow */
.progress-bar-fill.glow {
  box-shadow: 0 0 12px rgba(200,164,78,0.6);
}

/* Celebration overlay */
.confetti-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 9999;
}

/* Crossfade transition */
.main-fade {
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Checkbox pop animation */
.checkbox.pop {
  animation: checkPop 0.3s ease;
}

@keyframes checkPop {
  0% { transform: scale(1); }
  40% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

/* Mobile hamburger */
.hamburger {
  display: none;
  position: fixed;
  top: 16px;
  left: 16px;
  z-index: 200;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
  color: var(--text);
  cursor: pointer;
  font-size: 18px;
}

.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 90;
}

/* New project modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 300;
  align-items: center;
  justify-content: center;
}

.modal-overlay.active { display: flex; }

.modal {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  width: 380px;
  max-width: 90vw;
}

.modal h3 {
  font-size: 18px;
  margin-bottom: 16px;
}

.modal input {
  width: 100%;
  padding: 10px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 14px;
  margin-bottom: 12px;
  outline: none;
}

.modal input:focus { border-color: var(--accent); }

.modal-template-list {
  margin-bottom: 16px;
}

.modal-template-item {
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 6px;
  font-size: 13px;
  color: var(--text-dim);
  transition: all 0.15s;
}

.modal-template-item:hover { border-color: var(--accent); color: var(--text); }
.modal-template-item.selected { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

.modal-actions button {
  padding: 8px 20px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-size: 13px;
}

.modal-actions .cancel-btn {
  background: var(--border);
  color: var(--text-dim);
}

.modal-actions .confirm-btn {
  background: var(--accent);
  color: #111;
  font-weight: 600;
}

/* ===== Project Metadata Card ===== */
.project-meta {
  padding: 20px 32px 0;
  background: var(--bg);
}

.project-meta-inner {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
}

.project-meta-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.project-meta-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
}

.project-meta-title[contenteditable="true"] {
  outline: none;
  border-bottom: 1px solid var(--accent);
}

.project-meta-actions {
  display: flex;
  gap: 8px;
}

.icon-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
}

.icon-btn:hover { border-color: var(--accent); color: var(--accent); }

.project-meta-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 6px 20px;
}

.meta-field {
  font-size: 12px;
  display: flex;
  align-items: baseline;
  gap: 6px;
  white-space: nowrap;
  overflow: hidden;
}

.meta-field .meta-label {
  color: var(--text-muted);
  flex-shrink: 0;
}

.meta-field .meta-value {
  color: var(--text-dim);
  overflow: hidden;
  text-overflow: ellipsis;
}

.meta-field .meta-value.empty { color: var(--text-muted); font-style: italic; }

.status-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
}
.status-badge[data-status="筹备中"] { background: rgba(52,152,219,0.15); color: #3498db; }
.status-badge[data-status="拍摄中"] { background: rgba(230,126,34,0.15); color: #e67e22; }
.status-badge[data-status="后期中"] { background: rgba(155,89,182,0.15); color: #9b59b6; }
.status-badge[data-status="已交付"] { background: rgba(46,204,113,0.15); color: #2ecc71; }
.status-badge[data-status="已搁置"] { background: rgba(127,127,127,0.15); color: #888; }

.module-tab {

.module-tab.complete .module-tab-progress { color: var(--success); }

  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 12px;
  padding: 0 2px;
  border-radius: 3px;
  transition: opacity 0.15s, color 0.15s;

.module-tab:hover .module-tab-delete { opacity: 1; }
.module-tab .module-tab-delete:hover { color: var(--danger); }

.module-tab-add {
  padding: 10px 14px;
  cursor: pointer;
  border: 1px dashed var(--border);
  border-radius: 6px;
  color: var(--text-muted);
  font-size: 13px;
  margin-left: 8px;
  margin-bottom: 8px;
  background: none;
  transition: all 0.15s;

.module-tab-add:hover { border-color: var(--accent); color: var(--accent); }

.empty-module-hint {
  padding: 60px 32px;

}

.empty-module-hint .hint-icon {

  height: 18px;

.wizard-steps .step-indicator.done .step-dot {

.wizard-body {

.form-grid {

.form-field {

  gap: 4px;

.form-field.full { grid-column: 1 / -1; }

.form-field label {

  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.form-field input,
.form-field select,

  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  outline: none;
  font-family: inherit;
  margin-bottom: 0;
}

.form-field input:focus,
.form-field select:focus,
.form-field textarea:focus { border-color: var(--accent); }

.form-field textarea {

.module-picker-grid {

  gap: 10px;
}

.module-picker-item {

  font-weight: 700;

.module-picker-info {

}

.module-picker-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 2px;
}

.module-picker-desc {
  font-size: 12px;
  color: var(--text-dim);
}

.wizard-footer {

  gap: 8px;

  align-items: center;
  margin-top: 16px;

  gap: 8px;

// ===== State =====
const STORAGE_KEY = 'workflow-checklist-data';
let state = { projects: [], activeProjectId: null };

// Template keys that can be used as modules in a project
const MODULE_KEYS = ['preproduction', 'shooting', 'editing', 'distribution'];
const MODULE_SHORT_NAMES = {
  preproduction: '前期筹备',
  shooting: '拍摄',
  editing: '剪辑',
  distribution: '宣发',
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      state = JSON.parse(raw);
      // Migrate old format
      state.projects.forEach(p => migrateProject(p));
      return;
    }
  } catch(e) {}
  // Default: empty project list, user creates first project via wizard
  state = { projects: [], activeProjectId: null };
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function todayISO() {
  return new Date().toISOString().split('T')[0];
}

// Migrate old project format (sections directly on project) to new modules format
function migrateProject(p) {
  if (p.modules) return; // already new format
  const oldSections = p.sections || [];
  const oldNotes = p.notes || [];
  // Guess module key from category
  let key = 'editing';
  const cat = (p.category || '').toUpperCase();
  if (cat.includes('PRE-PRODUCTION')) key = 'preproduction';
  else if (cat.includes('PRODUCTION') && !cat.includes('POST')) key = 'shooting';
  else if (cat.includes('DISTRIBUTION') || cat.includes('MARKETING')) key = 'distribution';

  p.modules = [{
    id: genId(),
    key: key,
    category: p.category || '',
    title: p.title || '未命名',
    subtitle: p.subtitle || '',
    sections: oldSections,
    notes: oldNotes,
  }];
  p.activeModuleId = p.modules[0].id;
  // Add default metadata
  if (!p.createdDate) p.createdDate = todayISO();
  if (!p.projectType) p.projectType = '';
  if (!p.director) p.director = '';
  if (!p.producer) p.producer = '';
  if (!p.client) p.client = '';
  if (!p.budget) p.budget = '';
  if (!p.shootingStart) p.shootingStart = '';
  if (!p.shootingEnd) p.shootingEnd = '';
  if (!p.deliveryDate) p.deliveryDate = '';
  if (!p.runtime) p.runtime = '';
  if (!p.status) p.status = '筹备中';
  if (!p.description) p.description = '';
  delete p.sections;
  delete p.notes;
  delete p.category;
  delete p.subtitle;
  delete p.note;
}

// Create a module instance from a template
function createModuleFromTemplate(key) {
  const tpl = JSON.parse(JSON.stringify(TEMPLATES[key]));
  const mod = {
    id: genId(),
    key: key,
    category: tpl.category || '',
    title: tpl.title || MODULE_SHORT_NAMES[key] || '模块',
    subtitle: tpl.subtitle || '',
    sections: tpl.sections || [],
    notes: tpl.notes || [],
  };
  mod.sections.forEach(s => {
    s.id = genId();
    s.steps.forEach(st => { st.id = genId(); });
  });
  mod.notes.forEach(n => { n.id = genId(); });
  return mod;
}

// Create a new project with metadata and selected modules
function createProject(meta, moduleKeys) {
  const project = {
    id: genId(),
    title: meta.title || '未命名项目',
    createdDate: meta.createdDate || todayISO(),
    projectType: meta.projectType || '',
    genre: meta.genre || '',
    director: meta.director || '',
    producer: meta.producer || '',
    client: meta.client || '',
    budget: meta.budget || '',
    shootingStart: meta.shootingStart || '',
    shootingEnd: meta.shootingEnd || '',
    deliveryDate: meta.deliveryDate || '',
    runtime: meta.runtime || '',
    status: meta.status || '筹备中',
    description: meta.description || '',
    modules: [],
    activeModuleId: null,
  };
  moduleKeys.forEach(key => {
    project.modules.push(createModuleFromTemplate(key));
  });
  if (project.modules.length > 0) project.activeModuleId = project.modules[0].id;
  return project;
}

function getActiveModule(project) {
  if (!project || !project.modules) return null;
  return project.modules.find(m => m.id === project.activeModuleId) || project.modules[0] || null;
}

function getActiveProject() {
  return state.projects.find(p => p.id === state.activeProjectId);
}

// ===== Rendering =====
function render() {
  renderSidebar();
  renderMain();
  saveState();
}

function renderSidebar() {
  const list = document.getElementById('sidebarList');
  list.innerHTML = '';

  const isFinished = p => p.status === '已完成' || p.status === '已归档';
  const active = state.projects.filter(p => !isFinished(p));
  const done = state.projects.filter(p => isFinished(p));

  function renderGroup(label, projects) {
    if (projects.length === 0) return;
    const groupLabel = document.createElement('div');
    groupLabel.className = 'sidebar-group-label';
    groupLabel.textContent = label;
    list.appendChild(groupLabel);

    projects.forEach(p => {
      const item = document.createElement('div');
      item.className = 'sidebar-item'
        + (p.id === state.activeProjectId ? ' active' : '')
        + (isFinished(p) ? ' completed-project' : '');
      item.innerHTML = `
        <span class="project-name">${esc(p.title)}</span>
        <button class="delete-project" title="删除项目">×</button>
      `;
      const nameEl = item.querySelector('.project-name');
      nameEl.addEventListener('dblclick', (e) => {
        e.stopPropagation();
        nameEl.contentEditable = 'true';
        nameEl.focus();
        selectAll(nameEl);
      });
      nameEl.addEventListener('blur', () => {
        nameEl.contentEditable = 'false';
        p.title = nameEl.textContent.trim() || '未命名项目';
        saveState();
        renderSidebar();
      });
      nameEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); nameEl.blur(); }
      });
      item.querySelector('.delete-project').addEventListener('click', (e) => {
        e.stopPropagation();
        if (state.projects.length === 1) return alert('至少保留一个项目');
        if (!confirm(`确定删除「${p.title}」？`)) return;
        state.projects = state.projects.filter(x => x.id !== p.id);
        if (state.activeProjectId === p.id) {
          state.activeProjectId = state.projects[0].id;
        }
        render();
      });
      item.addEventListener('click', () => {
        state.activeProjectId = p.id;
        render();
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').classList.remove('active');
      });
      list.appendChild(item);
    });
  }

  renderGroup('进行中', active);
  renderGroup('已完成', done);
}

function renderMain() {
  const project = getActiveProject();
  const metaEl = document.getElementById('projectMeta');
  const tabsEl = document.getElementById('moduleTabsBar');
  const header = document.getElementById('mainHeader');
  const content = document.getElementById('content');

  if (!project) {
    metaEl.innerHTML = '';
    tabsEl.innerHTML = '';
    header.innerHTML = '';
    content.innerHTML = `
      <div class="empty-module-hint">
        <div class="hint-icon">📋</div>
        <div>还没有项目</div>
        <button class="hint-btn" id="emptyNewProject">+ 新建第一个项目</button>
      </div>
    `;
    const btn = document.getElementById('emptyNewProject');
    if (btn) btn.addEventListener('click', openWizard);
    return;
  }

  renderProjectMeta(project);
  renderModuleTabs(project);

  const module = getActiveModule(project);
  if (!module) {
    header.innerHTML = '';
    content.innerHTML = `
      <div class="empty-module-hint">
        <div class="hint-icon">📂</div>
        <div>这个项目还没有任何工作流板块</div>
        <button class="hint-btn" id="emptyAddModule">+ 添加板块</button>
      </div>
    `;
    const btn = document.getElementById('emptyAddModule');
    if (btn) btn.addEventListener('click', () => openModulePicker(project));
    return;
  }

  renderModuleContent(project, module);
}

function renderProjectMeta(project) {
  const metaEl = document.getElementById('projectMeta');

  // Overall progress across all modules
  let total = 0, done = 0;
  (project.modules || []).forEach(m => {
    m.sections.forEach(sec => {
      total += sec.steps.length;
      done += sec.steps.filter(st => st.done).length;
    });
  });
  const pct = total ? Math.round(done / total * 100) : 0;

  const fmtDate = d => d || '—';
  const fmtField = v => v || '<span class="meta-value empty">未填写</span>';

  metaEl.innerHTML = `
    <div class="project-meta-inner">
      <div class="project-meta-top">
        <div class="project-meta-title" title="双击编辑项目名">${esc(project.title)}</div>
        <div class="project-meta-actions">
          <span class="status-badge" data-status="${esc(project.status)}">${esc(project.status)}</span>
          ${project.status === '已完成' || project.status === '已归档'
            ? '<button class="reopen-project-btn" id="reopenProjectBtn">重新开启</button>'
            : '<button class="complete-project-btn" id="completeProjectBtn">✓ 完成项目</button>'}
          <button class="icon-btn" id="editProjectBtn">⚙ 项目信息</button>
        </div>
      </div>
      <div class="project-meta-grid">
        <div class="meta-field"><span class="meta-label">类型</span><span class="meta-value">${fmtField(esc(project.projectType))}</span></div>
        <div class="meta-field"><span class="meta-label">题材</span><span class="meta-value">${fmtField(esc(project.genre))}</span></div>
        <div class="meta-field"><span class="meta-label">导演</span><span class="meta-value">${fmtField(esc(project.director))}</span></div>
        <div class="meta-field"><span class="meta-label">制片</span><span class="meta-value">${fmtField(esc(project.producer))}</span></div>
        <div class="meta-field"><span class="meta-label">出品</span><span class="meta-value">${fmtField(esc(project.client))}</span></div>
        <div class="meta-field"><span class="meta-label">预算</span><span class="meta-value">${fmtField(esc(project.budget))}</span></div>
        <div class="meta-field"><span class="meta-label">开机</span><span class="meta-value">${esc(fmtDate(project.shootingStart))}</span></div>
        <div class="meta-field"><span class="meta-label">关机</span><span class="meta-value">${esc(fmtDate(project.shootingEnd))}</span></div>
        <div class="meta-field"><span class="meta-label">交付</span><span class="meta-value">${esc(fmtDate(project.deliveryDate))}</span></div>
        <div class="meta-field"><span class="meta-label">片长</span><span class="meta-value">${fmtField(esc(project.runtime))}</span></div>
        <div class="meta-field"><span class="meta-label">建档</span><span class="meta-value">${esc(fmtDate(project.createdDate))}</span></div>
      </div>
      <div class="overall-progress">
        <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        <div class="progress-text">总进度 ${done} / ${total} (${pct}%)</div>
      </div>
    </div>
  `;

  // Editable title
  const titleEl = metaEl.querySelector('.project-meta-title');
  makeEditable(titleEl, val => { project.title = val || '未命名项目'; saveState(); renderSidebar(); });

  // Edit button
  metaEl.querySelector('#editProjectBtn').addEventListener('click', () => openProjectSettings(project));

  // Complete / Reopen button
  const completeBtn = metaEl.querySelector('#completeProjectBtn');
  if (completeBtn) {
    completeBtn.addEventListener('click', () => {
      if (!confirm(`确定将「${project.title}」标记为已完成吗？`)) return;
      project.status = '已完成';
      SFX.sectionComplete();
      launchConfetti();
      saveState();
      render();
    });
  }
  const reopenBtn = metaEl.querySelector('#reopenProjectBtn');
  if (reopenBtn) {
    reopenBtn.addEventListener('click', () => {
      if (!confirm(`确定重新开启「${project.title}」吗？`)) return;
      project.status = '进行中';
      SFX.click();
      saveState();
      render();
    });
  }
}

function renderModuleTabs(project) {
  const bar = document.getElementById('moduleTabsBar');
  bar.innerHTML = '';

  (project.modules || []).forEach(mod => {
    const total = mod.sections.reduce((s, sec) => s + sec.steps.length, 0);
    const done = mod.sections.reduce((s, sec) => s + sec.steps.filter(st => st.done).length, 0);
    const complete = total > 0 && done === total;

    const tab = document.createElement('div');
    tab.className = 'module-tab' + (mod.id === project.activeModuleId ? ' active' : '') + (complete ? ' complete' : '');
    tab.innerHTML = `
      <span>${esc(MODULE_SHORT_NAMES[mod.key] || mod.title)}</span>
      <span class="module-tab-progress">${done}/${total}</span>
      <button class="module-tab-delete" title="移除此板块">×</button>
    `;
    tab.addEventListener('click', (e) => {
      if (e.target.closest('.module-tab-delete')) return;
      project.activeModuleId = mod.id;
      SFX.click();
      render();
    });
    tab.querySelector('.module-tab-delete').addEventListener('click', (e) => {
      e.stopPropagation();
      if (!confirm(`确定移除「${MODULE_SHORT_NAMES[mod.key] || mod.title}」板块？所有进度将丢失。`)) return;
      project.modules = project.modules.filter(m => m.id !== mod.id);
      if (project.activeModuleId === mod.id) {
        project.activeModuleId = project.modules[0] ? project.modules[0].id : null;
      }
      render();
    });
    bar.appendChild(tab);
  });

  // Add module button (only if not all modules added)
  const existingKeys = (project.modules || []).map(m => m.key);
  const canAdd = MODULE_KEYS.some(k => !existingKeys.includes(k));
  if (canAdd) {
    const addBtn = document.createElement('button');
    addBtn.className = 'module-tab-add';
    addBtn.textContent = '+ 添加板块';
    addBtn.addEventListener('click', () => openModulePicker(project));
    bar.appendChild(addBtn);
  }
}

function renderModuleContent(project, module) {
  const header = document.getElementById('mainHeader');
  const content = document.getElementById('content');

  const totalSteps = module.sections.reduce((s, sec) => s + sec.steps.length, 0);
  const doneSteps = module.sections.reduce((s, sec) => s + sec.steps.filter(st => st.done).length, 0);
  const pct = totalSteps ? Math.round(doneSteps / totalSteps * 100) : 0;

  header.innerHTML = `
    <div class="category">${esc(module.category || '')}</div>
    <h1>${esc(module.title)}</h1>
    <div class="subtitle">${esc(module.subtitle || '')} · 共 ${totalSteps} 个步骤</div>
    <div class="progress-bar-wrapper">
      <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="progress-text">${doneSteps} / ${totalSteps} 已完成</div>
    </div>
  `;

  const catEl = header.querySelector('.category');
  makeEditable(catEl, val => { module.category = val; saveState(); });
  const h1El = header.querySelector('h1');
  makeEditable(h1El, val => { module.title = val || '未命名'; saveState(); render(); });
  const subEl = header.querySelector('.subtitle');
  makeEditable(subEl, val => { module.subtitle = val; saveState(); });

  content.innerHTML = '';

  module.sections.forEach((sec, si) => {
    const secEl = document.createElement('div');
    secEl.className = 'section' + (sec.collapsed ? ' collapsed' : '');
    secEl.dataset.sectionId = sec.id;
    secEl.draggable = false; // handled by drag handle

    const doneInSec = sec.steps.filter(st => st.done).length;
    const secComplete = sec.steps.length > 0 && doneInSec === sec.steps.length;
    if (secComplete) secEl.classList.add('section-complete');

    secEl.innerHTML = `
      <div class="section-header">
        <div class="section-header-left">
          <span class="section-drag-handle" draggable="true" title="拖拽排序">⠿</span>
          <div class="section-titles">
            <div class="section-label">${esc(sec.label)}</div>
            <div class="section-title">${esc(sec.title)}${secComplete ? '<span class="section-complete-badge">已完成</span>' : ''}</div>
          </div>
        </div>
        <div class="section-header-right">
          <button class="section-delete" title="删除分组">×</button>
          <span class="section-count">${doneInSec}/${sec.steps.length}</span>
          <span class="section-toggle">▼</span>
        </div>
      </div>
      <div class="section-body"></div>
    `;

    // Toggle collapse
    const toggleArea = secEl.querySelector('.section-header');
    toggleArea.addEventListener('click', (e) => {
      if (e.target.closest('.section-drag-handle') || e.target.closest('.section-delete') ||
          e.target.closest('[contenteditable="true"]')) return;
      sec.collapsed = !sec.collapsed;
      render();
    });

    // Editable labels
    const labelEl = secEl.querySelector('.section-label');
    makeEditable(labelEl, val => { sec.label = val; saveState(); });

    const titleEl = secEl.querySelector('.section-title');
    makeEditable(titleEl, val => { sec.title = val; saveState(); });

    // Delete section
    secEl.querySelector('.section-delete').addEventListener('click', (e) => {
      e.stopPropagation();
      if (!confirm(`确定删除「${sec.title}」及其所有步骤？`)) return;
      module.sections.splice(si, 1);
      render();
    });

    // Section drag
    const secDragHandle = secEl.querySelector('.section-drag-handle');
    secDragHandle.addEventListener('dragstart', (e) => {
      e.stopPropagation();
      e.dataTransfer.setData('text/plain', JSON.stringify({ type: 'section', sectionId: sec.id }));
      e.dataTransfer.effectAllowed = 'move';
      secEl.style.opacity = '0.4';
    });
    secDragHandle.addEventListener('dragend', () => { secEl.style.opacity = ''; });

    secEl.addEventListener('dragover', (e) => {
      e.preventDefault();
      try {
        // We can't read data during dragover, so just show indicator
        secEl.classList.add('dragging-over');
      } catch(err) {}
    });
    secEl.addEventListener('dragleave', () => { secEl.classList.remove('dragging-over'); });
    secEl.addEventListener('drop', (e) => {
      e.preventDefault();
      secEl.classList.remove('dragging-over');
      try {
        const data = JSON.parse(e.dataTransfer.getData('text/plain'));
        if (data.type === 'section' && data.sectionId !== sec.id) {
          const fromIdx = module.sections.findIndex(s => s.id === data.sectionId);
          const toIdx = module.sections.findIndex(s => s.id === sec.id);
          if (fromIdx !== -1 && toIdx !== -1) {
            const [moved] = module.sections.splice(fromIdx, 1);
            module.sections.splice(toIdx, 0, moved);
            render();
          }
        }
      } catch(err) {}
    });

    // Steps
    const body = secEl.querySelector('.section-body');
    sec.steps.forEach((step, sti) => {
      const stepEl = document.createElement('div');
      stepEl.className = 'step' + (step.done ? ' completed' : '');
      stepEl.dataset.stepId = step.id;

      stepEl.innerHTML = `
        <span class="step-drag-handle" draggable="true" title="拖拽排序">⠿</span>
        <div class="checkbox ${step.done ? 'checked' : ''}"></div>
        <div class="step-text">
          <div class="step-name">${esc(step.name)}</div>
          <div class="step-desc">${esc(step.desc)}</div>
        </div>
        <button class="step-delete" title="删除步骤">×</button>
      `;

      // Checkbox
      stepEl.querySelector('.checkbox').addEventListener('click', (e) => {
        e.stopPropagation();
        const wasDone = step.done;
        step.done = !step.done;
        if (step.done) {
          SFX.check();
          // Check if this completes the section
          const allDone = sec.steps.every(st => st.done);
          if (allDone) {
            setTimeout(() => { SFX.sectionComplete(); launchConfetti(); }, 200);
          }
        } else {
          SFX.uncheck();
        }
        render();
        // Animate checkbox
        const cb = document.querySelector(`[data-step-id="${step.id}"] .checkbox`);
        if (cb) { cb.classList.add('pop'); setTimeout(() => cb.classList.remove('pop'), 300); }
        // Glow progress bar
        const fill = document.querySelector('.progress-bar-fill');
        if (fill) { fill.classList.add('glow'); setTimeout(() => fill.classList.remove('glow'), 800); }
      });

      // Editable name & desc
      const nameEl = stepEl.querySelector('.step-name');
      makeEditable(nameEl, val => { step.name = val; saveState(); });

      const descEl = stepEl.querySelector('.step-desc');
      makeEditable(descEl, val => { step.desc = val; saveState(); });

      // Delete step
      stepEl.querySelector('.step-delete').addEventListener('click', (e) => {
        e.stopPropagation();
        sec.steps.splice(sti, 1);
        render();
      });

      // Step drag
      const stepDragHandle = stepEl.querySelector('.step-drag-handle');
      stepDragHandle.addEventListener('dragstart', (e) => {
        e.stopPropagation();
        e.dataTransfer.setData('text/plain', JSON.stringify({ type: 'step', sectionId: sec.id, stepId: step.id }));
        e.dataTransfer.effectAllowed = 'move';
        stepEl.classList.add('dragging');
      });
      stepDragHandle.addEventListener('dragend', () => { stepEl.classList.remove('dragging'); });

      stepEl.addEventListener('dragover', (e) => {
        e.preventDefault();
        // Remove drag-over from siblings
        body.querySelectorAll('.step.drag-over').forEach(el => el.classList.remove('drag-over'));
        stepEl.classList.add('drag-over');
      });
      stepEl.addEventListener('dragleave', () => { stepEl.classList.remove('drag-over'); });
      stepEl.addEventListener('drop', (e) => {
        e.preventDefault();
        e.stopPropagation();
        stepEl.classList.remove('drag-over');
        try {
          const data = JSON.parse(e.dataTransfer.getData('text/plain'));
          if (data.type === 'step') {
            // Find source
            const srcSec = module.sections.find(s => s.id === data.sectionId);
            if (!srcSec) return;
            const srcIdx = srcSec.steps.findIndex(st => st.id === data.stepId);
            if (srcIdx === -1) return;
            const [moved] = srcSec.steps.splice(srcIdx, 1);
            // Insert at target position
            const tgtIdx = sec.steps.findIndex(st => st.id === step.id);
            sec.steps.splice(tgtIdx, 0, moved);
            render();
          }
        } catch(err) {}
      });

      body.appendChild(stepEl);
    });

    // Add step button
    const addStepBtn = document.createElement('button');
    addStepBtn.className = 'add-step-btn';
    addStepBtn.textContent = '+ 添加步骤';
    addStepBtn.addEventListener('click', () => {
      sec.steps.push({ id: genId(), name: '新步骤', desc: '描述', done: false });
      sec.collapsed = false;
      SFX.addStep();
      render();
    });
    body.appendChild(addStepBtn);

    content.appendChild(secEl);
  });

  // Add section button
  const addSecBtn = document.createElement('button');
  addSecBtn.className = 'add-section-btn';
  addSecBtn.textContent = '+ 添加分组';
  addSecBtn.addEventListener('click', () => {
    module.sections.push({
      id: genId(),
      label: 'NEW SECTION',
      title: '新分组',
      collapsed: false,
      steps: [{ id: genId(), name: '新步骤', desc: '描述', done: false }]
    });
    SFX.addStep();
    render();
  });
  content.appendChild(addSecBtn);

  // Notes area
  if (!module.notes) module.notes = [];
  const notesArea = document.createElement('div');
  notesArea.className = 'notes-area';

  const NOTE_TYPES = [
    { key: 'note', label: '备注' },
    { key: 'warning', label: '警告' },
    { key: 'danger', label: '危险' },
    { key: 'info', label: '提示' },
    { key: 'success', label: '成功' },
  ];
  const TYPE_LABELS = { note: '备注', warning: '警告', danger: '危险', info: '提示', success: '成功' };

  module.notes.forEach((note, ni) => {
    const noteEl = document.createElement('div');
    noteEl.className = 'note-box';
    noteEl.dataset.type = note.type || 'note';
    noteEl.innerHTML = `
      <div class="note-header">
        <button class="note-type-btn">${TYPE_LABELS[note.type] || '备注'}</button>
        <div class="note-title">${esc(note.title)}</div>
        <button class="note-delete" title="删除备注">×</button>
      </div>
      <div class="note-text">${esc(note.text)}</div>
    `;

    // Cycle note type
    noteEl.querySelector('.note-type-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      const keys = NOTE_TYPES.map(t => t.key);
      const idx = keys.indexOf(note.type || 'note');
      note.type = keys[(idx + 1) % keys.length];
      SFX.click();
      saveState();
      render();
    });

    // Editable title
    const titleEl = noteEl.querySelector('.note-title');
    makeEditable(titleEl, val => { note.title = val || '备注'; saveState(); });

    // Editable text
    const textEl = noteEl.querySelector('.note-text');
    makeEditable(textEl, val => { note.text = val; saveState(); });

    // Delete note
    noteEl.querySelector('.note-delete').addEventListener('click', (e) => {
      e.stopPropagation();
      module.notes.splice(ni, 1);
      SFX.click();
      render();
    });

    notesArea.appendChild(noteEl);
  });

  // Add note button
  const addNoteBtn = document.createElement('button');
  addNoteBtn.className = 'add-note-btn';
  addNoteBtn.textContent = '+ 添加备注';
  addNoteBtn.addEventListener('click', () => {
    module.notes.push({ id: genId(), type: 'note', title: '备注', text: '在这里写内容' });
    SFX.click();
    render();
  });
  notesArea.appendChild(addNoteBtn);
  content.appendChild(notesArea);

  // Crossfade animation
  content.classList.remove('main-fade');
  void content.offsetWidth;
  content.classList.add('main-fade');
}

// ===== Utilities =====
function esc(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function selectAll(el) {
  const range = document.createRange();
  range.selectNodeContents(el);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}

function makeEditable(el, onSave) {
  el.addEventListener('dblclick', (e) => {
    e.stopPropagation();
    el.contentEditable = 'true';
    el.focus();
    selectAll(el);
  });
  el.addEventListener('blur', () => {
    el.contentEditable = 'false';
    onSave(el.textContent.trim());
  });
  el.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
  });
}

// ===== Project Wizard (new project + edit settings) =====
// Wizard supports two "modes":
//   - mode = 'create': step 1 metadata -> step 2 pick modules -> create project
//   - mode = 'edit'  : step 1 metadata only, updates the given project
let wizardState = {
  mode: 'create',
  step: 1,
  targetProject: null, // used in edit mode
  meta: {},
  selectedModuleKeys: ['preproduction', 'shooting', 'editing', 'distribution'],
};

const MODULE_DESCRIPTIONS = {
  preproduction: { icon: '📝', label: '前期筹备', desc: '剧本、预算、选角、勘景、场务等开机前准备' },
  shooting:      { icon: '🎬', label: '拍摄',     desc: '开机、现场执行、每日收工、杀青等现场工作' },
  editing:       { icon: '✂️', label: '剪辑',     desc: '素材整理、粗剪、精剪、声音、调色、终审' },
  distribution:  { icon: '📢', label: '宣发',     desc: '物料、发行、首映、媒体、复盘等宣发工作' },
};

  wizardState.mode = mode || 'create';
  wizardState.step = 1;
  wizardState.targetProject = project || null;

  if (wizardState.mode === 'edit' && project) {
    wizardState.meta = {
      title: project.title,
      createdDate: project.createdDate,
      projectType: project.projectType,
      genre: project.genre,
      director: project.director,
      producer: project.producer,
      client: project.client,
      budget: project.budget,
      shootingStart: project.shootingStart,
      shootingEnd: project.shootingEnd,
      deliveryDate: project.deliveryDate,
      runtime: project.runtime,
      status: project.status,
      description: project.description,
    };
  } else {
    wizardState.meta = {
      title: '',
      createdDate: todayISO(),
      projectType: '',
      genre: '',
      director: '',
      producer: '',
      client: '',
      budget: '',
      shootingStart: '',
      shootingEnd: '',
      deliveryDate: '',
      runtime: '',
      status: '筹备中',
      description: '',

    wizardState.selectedModuleKeys = ['preproduction', 'shooting', 'editing', 'distribution'];

// ===== Sound Effects (Web Audio API) =====
const SFX = (() => {
  let ctx;
  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    return ctx;
  }

  function playTone(freq, duration, type = 'sine', gain = 0.15, decay = true) {
    const c = getCtx();
    const osc = c.createOscillator();
    const g = c.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, c.currentTime);
    g.gain.setValueAtTime(gain, c.currentTime);
    if (decay) g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + duration);
    osc.connect(g).connect(c.destination);
    osc.start(c.currentTime);
    osc.stop(c.currentTime + duration);
  }

  function playChime(freqs, interval, duration, type = 'sine', gain = 0.12) {
    freqs.forEach((f, i) => {
      setTimeout(() => playTone(f, duration, type, gain), i * interval);
    });
  }

  return {
    // Checkbox checked — bright short ding
    check() {
      playTone(880, 0.15, 'sine', 0.12);
      setTimeout(() => playTone(1320, 0.12, 'sine', 0.08), 60);
    },
    // Checkbox unchecked — soft low tone
    uncheck() {
      playTone(440, 0.12, 'sine', 0.06);
    },
    // Section complete — celebratory ascending chime (bell-like)
    sectionComplete() {
      playChime([523, 659, 784, 1047], 100, 0.4, 'sine', 0.15);
      // Add shimmer overtone
      setTimeout(() => playChime([1568, 2093], 80, 0.5, 'sine', 0.06), 350);
    },
    // Generic click — subtle tick
    click() {
      playTone(660, 0.06, 'sine', 0.05);
    },
    // Add step — quick ascending pair
    addStep() {
      playTone(600, 0.08, 'sine', 0.07);
      setTimeout(() => playTone(800, 0.08, 'sine', 0.07), 60);
    },
  };
})();

// ===== Confetti =====
function launchConfetti() {
  const canvas = document.createElement('canvas');
  canvas.className = 'confetti-canvas';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  document.body.appendChild(canvas);
  const ctx2 = canvas.getContext('2d');

  const colors = ['#c8a44e', '#2ecc71', '#3498db', '#e67e22', '#e74c3c', '#9b59b6', '#f1c40f'];
  const particles = Array.from({ length: 60 }, () => ({
    x: Math.random() * canvas.width,
    y: -20 - Math.random() * 80,
    w: 4 + Math.random() * 6,
    h: 3 + Math.random() * 4,
    vx: (Math.random() - 0.5) * 4,
    vy: 2 + Math.random() * 4,
    rot: Math.random() * Math.PI * 2,
    rotV: (Math.random() - 0.5) * 0.2,
    color: colors[Math.floor(Math.random() * colors.length)],
    life: 1,
  }));

  let frame = 0;
  function draw() {
    ctx2.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    particles.forEach(p => {
      if (p.life <= 0) return;
      alive = true;
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.08;
      p.rot += p.rotV;
      p.life -= 0.008;
      ctx2.save();
      ctx2.globalAlpha = Math.max(0, p.life);
      ctx2.translate(p.x, p.y);
      ctx2.rotate(p.rot);
      ctx2.fillStyle = p.color;
      ctx2.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx2.restore();
    });
    frame++;
    if (alive && frame < 180) {
      requestAnimationFrame(draw);
    } else {
      canvas.remove();
    }
  }
  requestAnimationFrame(draw);
}

// ===== Cloud Sync (Firebase) =====
const SYNC_CONFIG_KEY = 'workflow-sync-config';
let syncDb = null;
let syncRef = null;
let syncListener = null;
let syncStatus = 'disconnected'; // disconnected | connected | syncing | error
let _skipNextRemote = false; // prevent echo after local save

function getSyncConfig() {
  try { return JSON.parse(localStorage.getItem(SYNC_CONFIG_KEY)); } catch(e) { return null; }
}

function setSyncConfig(cfg) {
  localStorage.setItem(SYNC_CONFIG_KEY, JSON.stringify(cfg));
}

function clearSyncConfig() {
  localStorage.removeItem(SYNC_CONFIG_KEY);
}

function updateSyncStatus(status) {
  syncStatus = status;
  const el = document.getElementById('syncStatus');
  if (!el) return;
  if (status === 'disconnected') {
    el.innerHTML = '';
    return;
  }
  const labels = { connected: '已同步', syncing: '同步中…', error: '同步失败' };
  el.innerHTML = `<div class="sync-status"><span class="sync-dot ${status}"></span>${labels[status] || ''}</div>`;
}

function connectFirebase(config) {
  try {
    // Avoid reinitializing if already connected with same config
    if (syncDb) {
      try { firebase.app().delete(); } catch(e) {}
      syncDb = null;
      syncRef = null;
      if (syncListener) syncListener();
      syncListener = null;
    }
    const app = firebase.initializeApp(config);
    syncDb = firebase.database();
    syncRef = syncDb.ref('checklistData');

    // Listen for remote changes
    syncListener = syncRef.on('value', (snap) => {
      if (_skipNextRemote) { _skipNextRemote = false; return; }
      const remoteData = snap.val();
      if (remoteData && remoteData.projects) {
        // Merge: use remote data
        state = remoteData;
        state.projects.forEach(p => migrateProject(p));
        if (!state.activeProjectId && state.projects.length > 0) {
          state.activeProjectId = state.projects[0].id;
        }
        // Save locally too
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        render();
      }
      updateSyncStatus('connected');
    }, (err) => {
      console.error('Sync error:', err);
      updateSyncStatus('error');
    });

    // Monitor connection state
    firebase.database().ref('.info/connected').on('value', (snap) => {
      updateSyncStatus(snap.val() ? 'connected' : 'disconnected');
    });

    updateSyncStatus('connected');
    setSyncConfig(config);
    return true;
  } catch(e) {
    console.error('Firebase init error:', e);
    updateSyncStatus('error');
    return false;
  }
}

function disconnectFirebase() {
  if (syncListener && syncRef) {
    syncRef.off('value', syncListener);
    syncListener = null;
  }
  try { firebase.app().delete(); } catch(e) {}
  syncDb = null;
  syncRef = null;
  clearSyncConfig();
  updateSyncStatus('disconnected');
}

function pushToCloud() {
  if (!syncRef) return;
  _skipNextRemote = true;
  updateSyncStatus('syncing');
  syncRef.set(state).then(() => {
    updateSyncStatus('connected');
  }).catch((err) => {
    console.error('Push error:', err);
    _skipNextRemote = false;
    updateSyncStatus('error');
  });
}

// Patch saveState to also push to cloud
const _origSaveState = saveState;
saveState = function() {
  _origSaveState();
  pushToCloud();
};

function openSyncSettings() {

function renderSyncModal() {
  const body = document.getElementById('syncModalBody');
  const config = getSyncConfig();
  const isConnected = !!syncDb;

  if (isConnected && config) {
    body.innerHTML = `
      <div class="sync-connected-info">

        <div class="connected-text">云同步已开启</div>

    `;
    document.getElementById('syncDisconnectBtn').addEventListener('click', () => {
      if (!confirm('断开后此设备将不再同步，本地数据保留。确定？')) return;
      disconnectFirebase();
      renderSyncModal();
    });
    document.getElementById('syncPushBtn').addEventListener('click', () => {
      pushToCloud();
      SFX.check();
      closeSyncSettings();
    });
  } else {
    body.innerHTML = `
      <div class="sync-instructions">
        <b>首次设置（免费，约 3 分钟）：</b>
        <ol>
          <li>打开 <b>console.firebase.google.com</b></li>
          <li>创建一个项目（名称随意，如 "我的检查单"）</li>
          <li>进入项目 → 左侧 <b>构建 → Realtime Database</b> → 创建数据库 → 选 <b>测试模式</b></li>
          <li>点左上 ⚙ → <b>项目设置</b> → 滚到底部 "您的应用" → 点 <b>Web（&lt;/&gt;）</b> 图标注册应用</li>
          <li>复制下方三个值粘贴到对应输入框</li>
        </ol>
        <div style="margin-top:6px;">所有设备填同样的配置即可自动同步。</div>
      </div>
      <div class="sync-form">
        <label>API Key</label>
        <input type="text" id="syncApiKey" placeholder="AIzaSy...">
        <label>Database URL</label>
        <input type="text" id="syncDbUrl" placeholder="https://xxx-default-rtdb.firebaseio.com">
        <div class="hint">在 Realtime Database 页面顶部可以看到此 URL</div>
        <label>Project ID</label>
        <input type="text" id="syncProjectId" placeholder="my-checklist-12345">
      </div>
      <div style="margin-top:14px;">
        <button class="confirm-btn" id="syncConnectBtn" style="width:100%">连接</button>
      </div>
    `;
    document.getElementById('syncConnectBtn').addEventListener('click', () => {
      const apiKey = document.getElementById('syncApiKey').value.trim();
      const dbUrl = document.getElementById('syncDbUrl').value.trim();
      const projectId = document.getElementById('syncProjectId').value.trim();
      if (!apiKey || !dbUrl) {
        alert('请至少填写 API Key 和 Database URL');
        return;
      }
      const config = {
        apiKey: apiKey,
        databaseURL: dbUrl,
        projectId: projectId || undefined,
      };
      const ok = connectFirebase(config);
      if (ok) {
        // Push current local data to cloud on first connect
        pushToCloud();
        SFX.sectionComplete();
        renderSyncModal();
      } else {
        alert('连接失败，请检查配置是否正确');
      }
    });
  }
}
